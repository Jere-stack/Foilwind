<title>FoilSpot v7</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin></script>
<style>
/* ============================================================
   CSS VARIABLES & RESET
   ============================================================ */
:root {
  --bg:     #060912;
  --panel:  rgba(6,9,18,0.88);
  --border: rgba(255,255,255,0.09);
  --accent: #00cfff;
  --accent-glow: rgba(0,207,255,0.15);
  --text:   #ddeeff;
  --muted:  rgba(180,215,255,0.45);
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
  --sheet-radius: 24px;
  --spring: cubic-bezier(.32,.72,.24,1);
}
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}
html {
  height: -webkit-fill-available; background: var(--bg);
  overscroll-behavior: none;
}
body {
  width: 100%; height: 100%; min-height: -webkit-fill-available;
  background: var(--bg); color: var(--text);
  font-family: 'Syne', sans-serif;
  overflow: hidden; position: fixed; inset: 0;
  -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
  overscroll-behavior: none;
  touch-action: none;
}
#app { position: absolute; inset: 0; }

/* ============================================================
MAP  z:1
============================================================ */
#map { position: absolute; inset: 0; z-index: 1; background: var(–bg); }
.leaflet-container { background: var(–bg) !important; -webkit-transform: translateZ(0); transform: translateZ(0); }
.leaflet-tile-pane { -webkit-filter: brightness(2.0) contrast(1.05) saturate(1.15); filter: brightness(2.0) contrast(1.05) saturate(1.15); }
.leaflet-control-zoom { display: none !important; }
.leaflet-control-attribution { background: rgba(6,9,18,.75) !important; color: rgba(255,255,255,.18) !important; font-size: 8px !important; }
.leaflet-control-attribution a { color: rgba(255,255,255,.22) !important; }
.leaflet-popup { display: none !important; }

/* ============================================================
WIND CANVASES  z:2-3
============================================================ */
#c-wind {
position: absolute; top: 0; left: 0;
pointer-events: none;
-webkit-transform: translate3d(0,0,0); transform: translate3d(0,0,0);
will-change: contents;
-webkit-backface-visibility: hidden; backface-visibility: hidden;
}
#c-wind { z-index: 3; transition: opacity 0.15s; }
.heatmap-overlay {
opacity: 0.88;
filter: blur(14px); -webkit-filter: blur(14px);
image-rendering: auto;
transition: filter 0.3s, -webkit-filter 0.3s;
}

/* ============================================================
TOPBAR  z:20
============================================================ */
#topbar {
position: absolute; top: 0; left: 0; right: 0; z-index: 20;
padding: calc(var(–sat) + 10px) calc(var(–sar) + 16px) 48px calc(var(–sal) + 16px);
background: linear-gradient(to bottom, rgba(6,9,18,.96) 0%, transparent 100%);
display: flex; align-items: flex-end; justify-content: space-between;
pointer-events: none;
}

/* Wind readout */
#crosshair-readout {
position: fixed; top: calc(var(–sat) + 12px); left: 50%; z-index: 22;
transform: translateX(-50%);
pointer-events: none;
text-align: center;
transition: opacity 0.3s;
}
#crosshair-readout.hidden { opacity: 0; }
.cr-speed {
font-family: ‘DM Mono’, monospace;
font-size: 28px; font-weight: 500;
line-height: 1; letter-spacing: -0.5px;
text-shadow: 0 1px 6px rgba(0,0,0,0.7), 0 0 20px rgba(0,0,0,0.4);
display: flex; align-items: baseline; justify-content: center; gap: 3px;
}
.cr-speed-unit { font-size: 11px; font-weight: 400; color: var(–muted); letter-spacing: 0.5px; }
.cr-details {
display: flex; gap: 6px; justify-content: center; margin-top: 3px;
font-family: ‘DM Mono’, monospace; font-size: 10px;
color: var(–muted); letter-spacing: 0.3px;
text-shadow: 0 1px 4px rgba(0,0,0,0.6);
align-items: center;
}
.cr-dir-arrow { font-size: 13px; line-height: 1; }
.cr-gust {
font-size: 10px; margin-top: 2px;
font-family: ‘DM Mono’, monospace;
color: var(–muted); letter-spacing: 0.3px;
text-shadow: 0 1px 4px rgba(0,0,0,0.6);
text-align: center;
}

#timebox { pointer-events: none; display: flex; align-items: flex-end; margin-left: auto; }
.topbar-scale { display: flex; align-items: center; gap: 4px; pointer-events: none; }
.topbar-scale-bar { width: 8px; height: 110px; border-radius: 4px; }
.topbar-scale-ticks { display: flex; flex-direction: column; justify-content: space-between; height: 110px; }
.topbar-scale-ticks .ws-tick { font-family: ‘DM Mono’, monospace; font-size: 8px; line-height: 1; text-align: right; }

/* ============================================================
MAP CONTROLS — bottom bar row
============================================================ */
#bottom-bar {
display: flex; align-items: center; gap: 10px; margin-bottom: 6px; pointer-events: all;
}
.mctl {
width: 46px; height: 46px; border-radius: 0; border: none;
background: none;
color: rgba(255,255,255,0.85); display: flex; align-items: center; justify-content: center;
cursor: pointer; font-size: 22px; line-height: 1; flex-shrink: 0;
-webkit-user-select: none; user-select: none; touch-action: manipulation;
transition: opacity .15s, transform .12s;
-webkit-transform: translate3d(0,0,0); transform: translate3d(0,0,0);
}
.mctl:active { opacity: 0.5; transform: scale(0.88); }
.mctl.playing { color: var(–accent); }
#bottom-bar-spacer { flex: 1; }

/* ============================================================
SETTINGS — Apple Liquid Glass popover
============================================================ */
#settings-popup {
position: fixed; z-index: 30;
background: rgba(255,255,255,.08);
border: 1px solid rgba(255,255,255,.15);
border-radius: 16px;
-webkit-backdrop-filter: blur(24px) saturate(1.4);
backdrop-filter: blur(24px) saturate(1.4);
padding: 14px 16px;
box-shadow:
0 0 0 0.5px rgba(255,255,255,.06) inset,
0 12px 40px rgba(0,0,0,.45),
0 2px 8px rgba(0,0,0,.2);
transform: translateY(8px) scale(0.95);
opacity: 0; pointer-events: none;
transition: transform .25s cubic-bezier(.2,.9,.3,1.2), opacity .2s ease;
transform-origin: bottom left;
}
#settings-popup.open {
transform: translateY(0) scale(1);
opacity: 1; pointer-events: all;
}
.sp-section { margin-bottom: 12px; }
.sp-section:last-child { margin-bottom: 0; }
.sp-label {
font-family: ‘DM Mono’, monospace; font-size: 9px; font-weight: 500;
color: rgba(255,255,255,.4); letter-spacing: 1.2px; text-transform: uppercase;
margin-bottom: 8px;
}
.sp-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.sp-chip {
height: 32px; border-radius: 16px; padding: 0 12px;
border: 1px solid rgba(255,255,255,.1);
background: rgba(255,255,255,.04);
color: rgba(255,255,255,.6);
font-family: ‘DM Mono’, monospace; font-size: 10px; font-weight: 500;
display: flex; align-items: center; gap: 4px; cursor: pointer;
transition: all .15s ease;
-webkit-user-select: none; user-select: none;
}
.sp-chip:active { transform: scale(0.93); }
.sp-chip.active {
background: rgba(0,207,255,.15);
border-color: rgba(0,207,255,.4);
color: var(–accent);
}
.sp-chip .l-icon { font-size: 11px; }

/* ============================================================
WEATHER WIDGET
============================================================ */
#wx-widget {
position: absolute; bottom: calc(var(–sab) + 194px); left: calc(var(–sal) + 14px); z-index: 20;
pointer-events: none; display: flex; align-items: center; gap: 8px;
background: rgba(6,9,18,.65);
border: 1px solid var(–border);
-webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
border-radius: 12px; padding: 6px 10px;
transition: opacity 0.3s;
}
#wx-widget.hidden { opacity: 0; }
#wx-icon { font-size: 22px; line-height: 1; }
#wx-temp { font-family: ‘DM Mono’, monospace; font-size: 16px; font-weight: 500; color: var(–text); line-height: 1; }
#wx-desc { font-family: ‘DM Mono’, monospace; font-size: 9px; color: var(–muted); line-height: 1.2; max-width: 80px; }

/* ============================================================
BOTTOM PANEL  z:20
============================================================ */
#bottom {
position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
padding: 0 calc(var(–sar) + 12px) calc(var(–sab) + 12px) calc(var(–sal) + 12px);
background: linear-gradient(to top, rgba(6,9,18,.98) 0%, rgba(6,9,18,.80) 55%, transparent 100%);
pointer-events: none;
}
#layers { display: flex; gap: 5px; pointer-events: all; }

#tl-wrap {
position: relative; pointer-events: all; height: 72px;
overflow: visible; padding-top: 28px;
}
#tl-scroll {
display: flex; gap: 0; overflow-x: auto; overflow-y: hidden;
-webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 0;
-webkit-mask-image: linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%);
mask-image: linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%);
overscroll-behavior-x: contain; height: 100%;
touch-action: pan-x; align-items: flex-end;
}
#tl-scroll::-webkit-scrollbar { display: none; }

.htick {
flex: 0 0 24px; display: flex; flex-direction: column; align-items: center;
justify-content: flex-end; height: 100%;
-webkit-user-select: none; user-select: none; cursor: pointer;
position: relative; padding-bottom: 14px;
}
.htick-bar {
width: 14px; border-radius: 4px 4px 0 0; min-height: 3px;
transition: opacity 0.15s;
}
.htick:active .htick-bar { opacity: 0.7; }
.htick-lbl {
position: absolute; bottom: 0; font-family: ‘DM Mono’, monospace;
font-size: 7px; color: var(–muted); white-space: nowrap;
pointer-events: none; opacity: 0.55;
}
.htick.show-lbl .htick-lbl { opacity: 0.85; font-weight: 500; }

#tl-indicator {
position: absolute; top: 0; left: 50%; width: 3px; height: 100%;
transform: translateX(-50%); pointer-events: none; z-index: 2;
background: var(–accent);
box-shadow: 0 0 10px rgba(0,207,255,0.6), 0 0 4px rgba(0,207,255,0.3);
border-radius: 1.5px;
}
#tl-time-bubble {
position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
margin-bottom: 6px;
background: rgba(6,9,18,0.92);
border: 1px solid rgba(0,207,255,0.35);
color: #fff; font-family: ‘DM Mono’, monospace;
padding: 5px 14px; border-radius: 10px; white-space: nowrap;
box-shadow: 0 2px 16px rgba(0,0,0,.5), 0 0 0 1px rgba(0,207,255,.08);
text-align: center; line-height: 1.25;
-webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
}
#tl-time-bubble::after {
content: ‘’; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
border: 5px solid transparent; border-top-color: rgba(0,207,255,0.35);
}
.tl-now-marker {
flex: 0 0 2px; height: 100%; background: rgba(255,255,255,.7);
position: relative; z-index: 1;
box-shadow: 0 0 6px rgba(255,255,255,.3);
}
.tl-now-label {
position: absolute; bottom: 1px; left: 50%; transform: translateX(-50%);
font-family: ‘DM Mono’, monospace; font-size: 7px; font-weight: 600;
color: rgba(255,255,255,.8); white-space: nowrap; letter-spacing: 0.5px;
}
.htick.past .htick-bar { opacity: 0.45; }

.day-sep {
flex: 0 0 40px; display: flex; align-items: flex-end; justify-content: center;
height: 100%; padding-bottom: 14px;
font-family: ‘DM Mono’, monospace; font-size: 9px; font-weight: 500;
color: var(–accent); letter-spacing: 0.3px; white-space: nowrap;
border-left: 1px solid rgba(0,207,255,.25);
opacity: 0.7;
}

.htick-bar.foilable { box-shadow: 0 0 6px rgba(80,237,120,0.5); }
.gi-steady  { color: rgb(80,237,120); }
.gi-gusty   { color: rgb(240,220,0); }
.gi-extreme { color: rgb(255,90,90); }
.spot-trend { font-size: 8px; color: var(–muted); margin-top: 1px; text-align: center; }

/* ============================================================
LOCATION DOT — Apple Maps style
============================================================ */
.loc-dot-outer {
width: 22px; height: 22px; border-radius: 50%;
background: rgba(0,122,255,.15);
display: flex; align-items: center; justify-content: center;
position: relative;
}
.loc-dot-inner {
width: 12px; height: 12px; border-radius: 50%;
background: #007AFF;
border: 2.5px solid #fff;
box-shadow: 0 0 8px rgba(0,122,255,.5);
}
.loc-dot-pulse {
position: absolute; inset: -8px; border-radius: 50%;
background: rgba(0,122,255,.12);
animation: loc-pulse 2.5s ease-out infinite;
}
@keyframes loc-pulse {
0% { transform: scale(0.6); opacity: 1; }
100% { transform: scale(2.2); opacity: 0; }
}

/* ============================================================
SPOT LIST — Ranked spots panel
============================================================ */
#spot-list {
position: absolute; bottom: 0; left: 0; right: 0; z-index: 30;
background: rgba(10,14,26,.97);
border-top: 1px solid rgba(0,207,255,.2);
border-radius: var(–sheet-radius) var(–sheet-radius) 0 0;
-webkit-backdrop-filter: blur(24px); backdrop-filter: blur(24px);
box-shadow: 0 -8px 40px rgba(0,0,0,.6);
-webkit-transform: translate3d(0,100%,0); transform: translate3d(0,100%,0);
transition: transform .38s var(–spring);
max-height: 65vh;
overflow-y: auto; -webkit-overflow-scrolling: touch;
overscroll-behavior: contain;
padding-bottom: calc(var(–sab) + 16px);
will-change: transform;
touch-action: pan-y;
}
#spot-list.open { -webkit-transform: translate3d(0,0,0); transform: translate3d(0,0,0); }
#spot-list.dragging { transition: none; }
#spot-list-handle {
display: flex; justify-content: center; padding: 14px 0 8px;
position: sticky; top: 0; background: rgba(10,14,26,.97); z-index: 1;
cursor: grab;
}
#spot-list-handle:active { cursor: grabbing; }
#spot-list-handle::after {
content: ‘’; width: 40px; height: 4px; border-radius: 2px;
background: rgba(255,255,255,.25);
transition: background .15s;
}
#spot-list-handle:active::after { background: rgba(255,255,255,.45); }
.sl-header {
padding: 4px 20px 14px; display: flex; justify-content: space-between; align-items: center;
}
.sl-title { font-size: 17px; font-weight: 800; letter-spacing: -.3px; }
.sl-count { font-family: ‘DM Mono’, monospace; font-size: 10px; color: var(–muted); }
.sl-item {
display: flex; align-items: center; gap: 12px;
padding: 12px 20px; border-bottom: 1px solid var(–border);
cursor: pointer; transition: background .12s;
touch-action: manipulation;
}
.sl-item:active { background: rgba(0,207,255,.08); }
.sl-rank {
font-family: ‘DM Mono’, monospace; font-size: 11px; font-weight: 700;
color: var(–muted); width: 20px; text-align: center; flex-shrink: 0;
}
.sl-dot {
width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
border: 1.5px solid rgba(255,255,255,.4);
}
.sl-info { flex: 1; min-width: 0; }
.sl-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sl-desc { font-family: ‘DM Mono’, monospace; font-size: 9px; color: var(–muted); margin-top: 1px; }
.sl-wind { text-align: right; flex-shrink: 0; }
.sl-wind-val {
font-family: ‘DM Mono’, monospace; font-size: 18px; font-weight: 500;
line-height: 1;
}
.sl-wind-sub { font-family: ‘DM Mono’, monospace; font-size: 9px; color: var(–muted); margin-top: 2px; }
.sl-badge-foilable {
display: inline-block; font-family: ‘DM Mono’, monospace; font-size: 8px;
background: rgba(80,237,120,.15); color: rgb(80,237,120);
border: 1px solid rgba(80,237,120,.3); border-radius: 4px;
padding: 1px 5px; margin-left: 6px; vertical-align: middle;
}

/* ============================================================
CROSSHAIR
============================================================ */
#crosshair {
position: fixed; top: 50%; left: 50%; z-index: 20;
transform: translate(-50%, -50%);
pointer-events: none;
transition: opacity 0.3s;
}
#crosshair.panning { opacity: 0.3; }
.ch-ring {
width: 44px; height: 44px; border-radius: 50%;
border: 1.5px solid rgba(255,255,255,0.45);
position: relative;
box-shadow: 0 0 12px rgba(0,0,0,0.5), inset 0 0 8px rgba(0,0,0,0.15);
}
.ch-dot {
position: absolute; top: 50%; left: 50%;
width: 5px; height: 5px; border-radius: 50%;
background: #fff;
transform: translate(-50%, -50%);
box-shadow: 0 0 6px rgba(255,255,255,0.6);
}
.ch-tick { position: absolute; background: rgba(255,255,255,0.4); border-radius: 1px; }
.ch-tick-n { width: 1.5px; height: 10px; top: -14px; left: 50%; transform: translateX(-50%); }
.ch-tick-s { width: 1.5px; height: 10px; bottom: -14px; left: 50%; transform: translateX(-50%); }
.ch-tick-e { width: 10px; height: 1.5px; right: -14px; top: 50%; transform: translateY(-50%); }
.ch-tick-w { width: 10px; height: 1.5px; left: -14px; top: 50%; transform: translateY(-50%); }
.ch-wind-arrow {
position: absolute; top: 50%; left: 50%;
width: 44px; height: 44px;
margin-top: -22px; margin-left: -22px;
transition: transform 0.4s cubic-bezier(.2,.8,.3,1);
pointer-events: none;
}
.ch-wind-arrow::after {
content: ‘’;
position: absolute; top: -4px; left: 50%; transform: translateX(-50%);
width: 0; height: 0;
border-left: 4px solid transparent;
border-right: 4px solid transparent;
border-bottom: 7px solid var(–accent);
filter: drop-shadow(0 0 4px rgba(0,207,255,0.5));
}

/* ============================================================
BOTTOM SHEET  z:30  — swipe-to-dismiss
============================================================ */
#sheet-overlay {
position: absolute; inset: 0; z-index: 29;
background: rgba(0,0,0,0); pointer-events: none;
transition: background .35s;
}
#sheet-overlay.open { background: rgba(0,0,0,.45); pointer-events: all; }

#sheet {
position: absolute; bottom: 0; left: 0; right: 0; z-index: 30;
background: rgba(10,14,26,.98);
border-top: 1px solid rgba(0,207,255,.15);
border-radius: var(–sheet-radius) var(–sheet-radius) 0 0;
-webkit-backdrop-filter: blur(28px); backdrop-filter: blur(28px);
box-shadow: 0 -12px 60px rgba(0,0,0,.7), 0 -1px 0 rgba(0,207,255,.08);
-webkit-transform: translate3d(0,100%,0); transform: translate3d(0,100%,0);
transition: transform .38s var(–spring);
max-height: 72vh;
overflow-y: auto; -webkit-overflow-scrolling: touch;
overscroll-behavior: contain;
padding-bottom: calc(var(–sab) + 24px);
will-change: transform;
touch-action: pan-y;
}
#sheet.open { -webkit-transform: translate3d(0,0,0); transform: translate3d(0,0,0); }
#sheet.dragging { transition: none; }

#sheet-handle {
display: flex; justify-content: center; padding: 14px 0 8px;
position: sticky; top: 0;
background: rgba(10,14,26,.98);
-webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
z-index: 1;
cursor: grab;
}
#sheet-handle:active { cursor: grabbing; }
#sheet-handle::after {
content: ‘’; width: 40px; height: 4px; border-radius: 2px;
background: rgba(255,255,255,.2);
transition: background .15s, width .15s;
}
#sheet-handle:active::after { background: rgba(255,255,255,.45); width: 56px; }

#sheet-content { padding: 2px 20px 20px; }

/* ============================================================
SPOT CARD — v6 redesign
============================================================ */

/* Hero wind display */
/* Hero: stacked layout — name/desc top, wind number row below */
.sh-hero {
display: flex; flex-direction: column; margin-bottom: 16px;
}
.sh-hero-top {
display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.sh-hero-left { flex: 1; min-width: 0; }
.sh-datetime { display: inline-flex; align-items: center; gap: 4px; font-family: ‘DM Mono’, monospace; font-size: 10px; font-weight: 500; color: var(–accent); background: rgba(0,207,255,.10); border: 1px solid rgba(0,207,255,.25); border-radius: 6px; padding: 2px 8px; margin-bottom: 12px; }
.sh-name {
font-size: 20px; font-weight: 800; letter-spacing: -.4px;
margin-bottom: 2px; line-height: 1.15; word-break: break-word;
}
.sh-desc {
font-family: ‘DM Mono’, monospace; font-size: 10px; color: var(–muted);
}
.sh-hero-right { text-align: right; flex-shrink: 0; }
.sh-big-wind {
font-family: ‘DM Mono’, monospace; font-size: 48px; font-weight: 500;
line-height: 0.9; letter-spacing: -2px;
}
.sh-big-unit {
font-family: ‘DM Mono’, monospace; font-size: 12px; color: var(–muted);
display: block; margin-top: 4px; letter-spacing: 0.5px;
}

/* Foilability badge — full-width prominent */
.sh-foil-badge {
display: flex; align-items: center; justify-content: center; gap: 10px;
padding: 14px 20px; border-radius: 14px;
font-size: 14px; font-weight: 800; letter-spacing: .8px; text-transform: uppercase;
margin-bottom: 16px; position: relative; overflow: hidden;
}
.sh-foil-badge::before {
content: ‘’; position: absolute; inset: 0;
background: linear-gradient(135deg, rgba(255,255,255,.04) 0%, transparent 60%);
}
.sh-foil-badge .badge-icon { font-size: 20px; }

/* Stats row */
.sh-stats {
display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px;
}
.sh-stat {
background: rgba(255,255,255,.035);
border: 1px solid rgba(255,255,255,.07);
border-radius: 12px; padding: 10px 8px;

}

font-family: ‘DM Mono’, monospace; font-size: 16px; font-weight: 500;
line-height: 1; letter-spacing: -0.5px;
}

font-family: ‘DM Mono’, monospace; font-size: 8px;

}

/* Conditions row */
.sh-conditions {

}
.sh-cond-card {
background: rgba(255,255,255,.035);
border: 1px solid rgba(255,255,255,.07);
border-radius: 12px; padding: 10px 12px;
display: flex; align-items: center; gap: 8px;
}
.sh-cond-icon { font-size: 18px; flex-shrink: 0; }
.sh-cond-info {}
.sh-cond-label {
font-family: ‘DM Mono’, monospace; font-size: 8px;
color: var(–muted); text-transform: uppercase; letter-spacing: 0.8px;
margin-bottom: 2px;
}
.sh-cond-val {
font-family: ‘DM Mono’, monospace; font-size: 13px; font-weight: 500;
line-height: 1;
}

/* 12h forecast chart */
.sh-chart-section { margin-bottom: 2px; }
.sh-chart-header {
display: flex; justify-content: space-between; align-items: center;
margin-bottom: 8px;
}
.sh-chart-title {
font-family: ‘DM Mono’, monospace; font-size: 9px; color: var(–muted);

}
.sh-chart-peak {
font-family: ‘DM Mono’, monospace; font-size: 9px;
color: var(–accent);
}
.sh-chart {
display: flex; align-items: flex-end; gap: 3px; height: 64px;
background: rgba(255,255,255,.02); border-radius: 10px; padding: 8px;
}
.sh-bar {
flex: 1; min-width: 4px; border-radius: 3px 3px 0 0;
position: relative; cursor: default;
transition: opacity .15s;
}
.sh-bar.foilable { box-shadow: 0 0 4px rgba(80,237,120,0.35); }
.sh-chart-labels {
display: flex; justify-content: space-between; margin-top: 5px;
padding: 0 8px;
}
.sh-chart-labels span {
font-family: ‘DM Mono’, monospace; font-size: 8px; color: var(–muted);
}

/* Wind rose */
.sh-windrose { display: flex; justify-content: center; margin: 14px 0 4px; }
.sh-windrose svg { filter: drop-shadow(0 0 8px rgba(0,207,255,.1)); }

/* Badge variants */
.b-calm    { background: rgba(4,26,130,.18); color: rgb(80,160,255);  border: 1px solid rgba(80,160,255,.2); }

/* ============================================================
ERROR TOAST  z:50
============================================================ */
/* v6: rate-limit banner */
#rl-banner { position: fixed; bottom: calc(var(–sab) + 148px); left: 12px; right: 12px; z-index: 50; background: rgba(255,160,0,.12); border: 1px solid rgba(255,160,0,.35); -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px); border-radius: 12px; padding: 10px 14px; display: none; align-items: center; gap: 10px; }

/* ============================================================
LOADING  z:999
============================================================ */

REFRESH INDICATOR

<script>
'use strict';

/* ╔══════════════════════════════════════════════════════════════╗
   ║  FoilSpot v6 — Visual spot cards · Swipe-to-dismiss ·        ║
   ║  Haptic feedback · Spring sheet physics                      ║
   ╚══════════════════════════════════════════════════════════════╝ */

const Config = {
  MAX_MS: 20,
  INERTIA: 0.78,
  GEO_SPEED: 0.003,
  WIND_SAMPLE_INTERVAL: 2,
  FADE_OPACITY: 0.94,
  DROP_RATE: 0.003,
  DROP_RATE_BUMP: 0.008,
  DATA_REFRESH_MS: 60 * 60 * 1000,
  PLAY_INTERVAL_MS: 800,
};

/* ── HAPTICS ──────────────────────────────────────────────────── */
const Haptics = {
  /* iOS: uses AudioContext-based click + vibration API fallback */
  _ctx: null,
  _getCtx() {
    if (!this._ctx) {
      try { this._ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    return this._ctx;
  },
  /** Light tap — buttons, chips */
  light() {
    try {
      if (navigator.vibrate) { navigator.vibrate(8); return; }
      /* iOS: silent haptic via oscillator click */
      const ctx = this._getCtx();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 1400;
      gain.gain.setValueAtTime(0.08, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.04);
    } catch(e) {}
  },
  /** Medium — sheet open/close, timeline hour change */
  medium() {
    try {
      if (navigator.vibrate) { navigator.vibrate([12, 4, 8]); return; }
      const ctx = this._getCtx(); if (!ctx) return;
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 800;
      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.08);
    } catch(e) {}
  },
  /** Selection — timeline tick scroll */
  selection() {
    try {
      if (navigator.vibrate) { navigator.vibrate(4); return; }
      const ctx = this._getCtx(); if (!ctx) return;
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 1800;
      gain.gain.setValueAtTime(0.05, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.025);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.025);
    } catch(e) {}
  },
  /** Error/dismiss */
  error() {
    try {
      if (navigator.vibrate) { navigator.vibrate([20, 10, 20]); }
    } catch(e) {}
  }
};

/* ── SWIPE-TO-DISMISS — Reusable for any bottom sheet ─────────── */
function makeSwipeable(sheetEl, onDismiss, opts) {
  const o = Object.assign({ threshold: 100, velocityThreshold: 0.4 }, opts || {});
  let startY = 0, currentY = 0, isDragging = false, startScrollTop = 0;

  function onTouchStart(e) {
    /* Only start drag from handle OR if sheet is scrolled to top */
    const isHandle = e.target.closest('#sheet-handle, #spot-list-handle');
    const scrolledToTop = sheetEl.scrollTop <= 0;
    if (!isHandle && !scrolledToTop) return;

    startY = e.touches[0].clientY;
    startScrollTop = sheetEl.scrollTop;
    isDragging = false;
    sheetEl.addEventListener('touchmove', onTouchMove, { passive: false });
    sheetEl.addEventListener('touchend', onTouchEnd, { passive: true });
  }

  function onTouchMove(e) {
    const dy = e.touches[0].clientY - startY;
    if (!isDragging && Math.abs(dy) < 6) return;
    if (dy < 0) { /* Scrolling up — let native handle */ isDragging = false; return; }

    isDragging = true;
    e.preventDefault();

    /* Rubber-band resistance above 0 */
    const resistance = 1 - Math.min(0.5, dy / 800);
    currentY = dy * resistance;

    sheetEl.classList.add('dragging');
    sheetEl.style.transform = 'translateY(' + currentY + 'px)';

    /* Overlay opacity feedback */
    const progress = Math.min(1, currentY / o.threshold);
    const overlay = document.getElementById('sheet-overlay');
    if (overlay && overlay.classList.contains('open')) {
      overlay.style.background = 'rgba(0,0,0,' + (0.45 * (1 - progress)) + ')';
    }
  }

  function onTouchEnd(e) {
    sheetEl.removeEventListener('touchmove', onTouchMove);
    sheetEl.removeEventListener('touchend', onTouchEnd);
    if (!isDragging) return;

    sheetEl.classList.remove('dragging');
    sheetEl.style.transform = '';

    const velocity = currentY / (Date.now() - _touchStartTime + 1) * 1000;
    const shouldDismiss = currentY > o.threshold || velocity > o.velocityThreshold * 1000;

    if (shouldDismiss) {
      Haptics.medium();
      onDismiss();
    } else {
      /* Snap back */
      sheetEl.style.transition = 'transform .35s var(--spring)';
      sheetEl.style.transform = 'translateY(0)';
      setTimeout(() => { sheetEl.style.transform = ''; sheetEl.style.transition = ''; }, 380);
      const overlay = document.getElementById('sheet-overlay');
      if (overlay) overlay.style.background = '';
    }
    isDragging = false; currentY = 0;
  }

  let _touchStartTime = 0;
  sheetEl.addEventListener('touchstart', (e) => {
    _touchStartTime = Date.now();
    onTouchStart(e);
  }, { passive: true });
}

/* ── UNITS ────────────────────────────────────────────────────── */
const Units = {
  _active: 'ms',
  _defs: {
    ms:  { label: 'm/s',  factor: 1,      decimals: 1 },
    kmh: { label: 'km/h', factor: 3.6,    decimals: 0 },
    kts: { label: 'kts',  factor: 1.9438, decimals: 1 },
    bft: { label: 'bft',  factor: 0,      decimals: 0 }
  },
  _bft: [0.3,1.6,3.4,5.5,8.0,10.8,13.9,17.2,20.8,24.5,28.5,32.7],
  init() {
    try { const s = localStorage.getItem('fs_unit'); if (s && this._defs[s]) this._active = s; } catch(e) {}
    document.querySelectorAll('#units .sp-chip').forEach(c => {
      c.classList.toggle('active', c.dataset.unit === this._active);
    });
  },
  set(unit) {
    if (!this._defs[unit]) return;
    this._active = unit;
    try { localStorage.setItem('fs_unit', unit); } catch(e) {}
    document.querySelectorAll('#units .sp-chip').forEach(c => {
      c.classList.toggle('active', c.dataset.unit === unit);
    });
  },
  get() { return this._active; },
  label() { return this._defs[this._active].label; },
  convert(ms) {
    if (this._active === 'bft') {
      for (let i = 0; i < this._bft.length; i++) { if (ms < this._bft[i]) return i; }
      return 12;
    }
    return ms * this._defs[this._active].factor;
  },
  fmt(ms) {
    const v = this.convert(ms);
    return v.toFixed(this._defs[this._active].decimals);
  },
  fmtUnit(ms) { return this.fmt(ms) + ' ' + this.label(); }
};

/* ── COLOUR RAMP ──────────────────────────────────────────────── */
const ColorRamp = (() => {
  const RAMP = [
    { t: 0.00, r: 20,  g: 40,  b: 80  },
    { t: 0.05, r: 30,  g: 70,  b: 140 },
    { t: 0.12, r: 0,   g: 120, b: 255 },
    { t: 0.22, r: 0,   g: 200, b: 255 },
    { t: 0.34, r: 0,   g: 245, b: 175 },
    { t: 0.46, r: 30,  g: 245, b: 70  },
    { t: 0.56, r: 170, g: 245, b: 5   },
    { t: 0.64, r: 255, g: 220, b: 0   },
    { t: 0.72, r: 255, g: 120, b: 0   },
    { t: 0.75, r: 255, g: 40,  b: 0   },
    { t: 0.85, r: 220, g: 0,   b: 20  },
    { t: 0.93, r: 180, g: 0,   b: 100 },
    { t: 1.00, r: 130, g: 0,   b: 180 }
  ];
  function msToT(ms) { return Math.pow(Math.min(1, Math.max(0, ms / Config.MAX_MS)), 0.55); }
  function interpolate(ramp, t) {
    for (let i = 1; i < ramp.length; i++) {
      if (t <= ramp[i].t) {
        const a = ramp[i - 1], b = ramp[i], f = (t - a.t) / (b.t - a.t);
        return { r: Math.round(a.r + f * (b.r - a.r)), g: Math.round(a.g + f * (b.g - a.g)), b: Math.round(a.b + f * (b.b - a.b)) };
      }
    }
    const last = ramp[ramp.length - 1];
    return { r: last.r, g: last.g, b: last.b };
  }
  const LUT_SIZE = 201;
  const _rgbLUT = new Array(LUT_SIZE);
  const _cssLUT = new Array(LUT_SIZE);
  for (let i = 0; i < LUT_SIZE; i++) {
    const ms = i * 0.1;
    const c = interpolate(RAMP, msToT(ms));
    _rgbLUT[i] = c;
    _cssLUT[i] = 'rgb(' + c.r + ',' + c.g + ',' + c.b + ')';
  }
  const ALPHA_STEPS = 10;
  const _cssAlphaLUT = new Array(ALPHA_STEPS);
  for (let a = 0; a < ALPHA_STEPS; a++) {
    _cssAlphaLUT[a] = new Array(LUT_SIZE);
    const alpha = (a + 1) / ALPHA_STEPS;
    for (let i = 0; i < LUT_SIZE; i++) {
      const c = _rgbLUT[i];
      _cssAlphaLUT[a][i] = 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + alpha.toFixed(2) + ')';
    }
  }
  function _lutIdx(ms) { return Math.min(LUT_SIZE - 1, Math.max(0, Math.round(ms * 10))); }
  function rgb(ms) { return _rgbLUT[_lutIdx(ms)]; }
  function css(ms, alpha) {
    const idx = _lutIdx(ms);
    if (alpha === undefined || alpha >= 0.99) return _cssLUT[idx];
    const ai = Math.min(ALPHA_STEPS - 1, Math.max(0, Math.round(alpha * ALPHA_STEPS) - 1));
    return _cssAlphaLUT[ai][idx];
  }
  return { rgb, css, msToT };
})();

/* ── VIEWPORT GRID ────────────────────────────────────────────── */
const ViewportGrid = {
  _points: new Map(),
  _globalBase: new Map(),
  TILE_DEG: 10,
  CACHE_TTL: 90 * 60 * 1000,

  gridStep(zoom) {
    if (zoom <= 3) return 4;
    if (zoom <= 5) return 2;
    if (zoom <= 7) return 0.8;
    if (zoom <= 9) return 0.35;
    return 0.15;
  },
  _tileKey(lat, lng) {
    const d = this.TILE_DEG;
    return 'fg_' + State.activeModel + '_' + (Math.floor(lat/d)*d) + '_' + (Math.floor(lng/d)*d);
  },
  _ptKey(lat, lng) { return lat.toFixed(2) + ',' + lng.toFixed(2); },

  async loadGlobalCoarse(onProgress) {
    const step = 15;
    const pts = [];
    for (let lat = -55; lat <= 70; lat += step) {
      for (let lng = -180; lng <= 175; lng += step) {
        const pk = this._ptKey(lat, lng);
        if (!this._globalBase.has(pk)) pts.push({ lat, lng });
      }
    }
    if (!pts.length) { if (onProgress) onProgress(1, 1); return; }
    const cacheKey = 'fg_global_' + State.activeModel;
    try {
      const raw = localStorage.getItem(cacheKey);
      if (raw) {
        const data = JSON.parse(raw);
        if (Date.now() - data.ts < this.CACHE_TTL * 2) {
          let restored = 0;
          for (const [pk, wx] of Object.entries(data.pts)) {
            const [la, lo] = pk.split(',').map(Number);
            const p = { lat: la, lng: lo, wx };
            this._globalBase.set(pk, p);
            restored++;
          }
          if (restored > 20) {
            if (onProgress) onProgress(restored, restored);
            return;
          }
        }
      }
    } catch(e) {}

    const batchSize = 80;
    const batches = [];
    for (let i = 0; i < pts.length; i += batchSize) batches.push(pts.slice(i, i + batchSize));
    let done = 0;
    const total = pts.length;
    const loadPromise = Promise.allSettled(batches.map(b =>
      loadBatch(b, 1).then(() => {
        b.forEach(p => { if (p.wx) this._globalBase.set(this._ptKey(p.lat, p.lng), p); });
        done += b.length;
        if (onProgress) onProgress(done, total);
      })
    ));
    const bail = new Promise(resolve => setTimeout(() => resolve(), 10000));
    await Promise.race([loadPromise, bail]);

    if (this._globalBase.size > 0) {
      try {
        const toSave = {};
        this._globalBase.forEach((p, pk) => { if (p.wx) toSave[pk] = p.wx; });
        localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), pts: toSave }));
      } catch(e) {}
    }
  },

  getViewportPoints(bounds, zoom) {
    const step = this.gridStep(zoom);
    const pad = step * 2;
    const s = Math.max(-80, bounds.getSouth() - pad);
    const n = Math.min(80, bounds.getNorth() + pad);
    const w = bounds.getWest() - pad;
    const e = bounds.getEast() + pad;
    const pts = [];
    for (let lat = Math.floor(s / step) * step; lat <= n; lat += step) {
      for (let lng = Math.floor(w / step) * step; lng <= e; lng += step) {
        pts.push({ lat: Math.round(lat * 100) / 100, lng: Math.round(lng * 100) / 100 });
      }
    }
    if (pts.length > 600) {
      const every = Math.ceil(pts.length / 600);
      return pts.filter((_, i) => i % every === 0);
    }
    return pts;
  },

  _restoreCache(points) {
    const tiles = {};
    points.forEach(p => {
      const tk = this._tileKey(p.lat, p.lng);
      if (!tiles[tk]) tiles[tk] = [];
      tiles[tk].push(p);
    });
    let restored = 0;
    for (const [tk, pts] of Object.entries(tiles)) {
      try {
        const raw = localStorage.getItem(tk);
        if (!raw) continue;
        const data = JSON.parse(raw);
        if (Date.now() - data.ts > this.CACHE_TTL) { localStorage.removeItem(tk); continue; }
        pts.forEach(p => {
          const pk = this._ptKey(p.lat, p.lng);
          if (data.pts && data.pts[pk]) {
            p.wx = data.pts[pk];
            this._points.set(pk, p);
            restored++;
          }
        });
      } catch(e) {}
    }
    if (restored > 0) this.invalidateCache();
    return restored;
  },

  _saveCache(points) {
    const tiles = {};
    points.forEach(p => {
      const tk = this._tileKey(p.lat, p.lng);
      if (!tiles[tk]) tiles[tk] = {};
      const pk = this._ptKey(p.lat, p.lng);
      const pt = this._points.get(pk);
      if (pt && pt.wx) tiles[tk][pk] = pt.wx;
    });
    for (const [tk, pts] of Object.entries(tiles)) {
      if (!Object.keys(pts).length) continue;
      try { localStorage.setItem(tk, JSON.stringify({ ts: Date.now(), pts })); }
      catch(e) { this._pruneOldCache(); }
    }
  },

  _pruneOldCache() {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('fg_')) keys.push(k);
    }
    keys.slice(0, Math.ceil(keys.length / 2)).forEach(k => localStorage.removeItem(k));
  },

  async loadViewport(map, onProgress) {
    const bounds = map.getBounds(), zoom = map.getZoom();
    const gridPoints = this.getViewportPoints(bounds, zoom);
    this._restoreCache(gridPoints);
    const toLoad = gridPoints.filter(p => !this._points.has(this._ptKey(p.lat, p.lng)));
    if (!toLoad.length) { if (onProgress) onProgress(gridPoints.length, gridPoints.length); return; }
    const batchSize = 80, batches = [];
    for (let i = 0; i < toLoad.length; i += batchSize) batches.push(toLoad.slice(i, i + batchSize));
    let done = 0;
    for (let i = 0; i < batches.length; i += 6) {
      const wave = batches.slice(i, i + 6);
      await Promise.allSettled(wave.map(b =>
        loadBatch(b).then(() => {
          b.forEach(p => { if (p.wx) this._points.set(this._ptKey(p.lat, p.lng), p); });
          done += b.length;
          if (onProgress) onProgress(done, toLoad.length);
        })
      ));
    }
    this._saveCache(gridPoints);
  },

  async loadSpots() {
    const toLoad = SPOTS.filter(s => !s.wx);
    if (!toLoad.length) return;
    const batches = [];
    for (let i = 0; i < toLoad.length; i += 80) batches.push(toLoad.slice(i, i + 80));
    for (const b of batches) await loadBatch(b, 7);
  },

  getAllPoints() {
    if (this._allPtsCache) return this._allPtsCache;
    const merged = new Map(this._globalBase);
    this._points.forEach((p, pk) => merged.set(pk, p));
    this._allPtsCache = Array.from(merged.values()).concat(SPOTS).filter(p => p.wx && p.wx.hourly);
    return this._allPtsCache;
  },

  invalidateCache() { this._allPtsCache = null; },

  clearAll() {
    this._points.clear();
    SPOTS.forEach(s => { s.wx = null; });
    for (let i = localStorage.length - 1; i >= 0; i--) {
      const k = localStorage.key(i);
      if (k && k.startsWith('fg_') && !k.startsWith('fg_global_')) localStorage.removeItem(k);
    }
  }
};

/* ── SPATIAL INDEX ────────────────────────────────────────────── */
const SpatialIndex = {
  cells: {}, cellSize: 0.35,
  build(wf) {
    this.cells = {};
    if (wf.length >= 4) {
      const sample = wf.slice(0, Math.min(50, wf.length));
      let minD = 999;
      for (let i = 0; i < sample.length - 1; i++) {
        for (let j = i + 1; j < Math.min(i + 5, sample.length); j++) {
          const d = Math.abs(sample[i].lat - sample[j].lat) + Math.abs(sample[i].lng - sample[j].lng);
          if (d > 0.01 && d < minD) minD = d;
        }
      }
      this.cellSize = Math.max(0.3, Math.min(5, minD * 1.2));
    }
    for (let i = 0; i < wf.length; i++) {
      const f = wf[i], k = this._key(f.lat, f.lng);
      if (!this.cells[k]) this.cells[k] = [];
      this.cells[k].push(f);
    }
  },
  _key(lat, lng) { return (Math.floor(lat / this.cellSize) << 16) | (Math.floor(lng / this.cellSize) & 0xFFFF); },
  nearby(lat, lng, r) {
    const r0 = Math.floor(lat / this.cellSize), c0 = Math.floor(lng / this.cellSize), out = [];
    for (let dr = -r; dr <= r; dr++) for (let dc = -r; dc <= r; dc++) {
      const cell = this.cells[((r0+dr)<<16)|((c0+dc)&0xFFFF)];
      if (cell) for (let i = 0; i < cell.length; i++) out.push(cell[i]);
    }
    return out;
  }
};

/* ── SURFACE TYPE ─────────────────────────────────────────────── */
function isMarine(lat, lng) {
  function coastGrad(pos, coastVal, seaDir) {
    const d = (pos - coastVal) * seaDir;
    if (d > 0.20) return 1.0;
    if (d > 0.0)  return 0.5 + 0.5 * (d / 0.20);
    if (d > -0.15) return 0.5 * (1.0 + d / 0.15);
    if (d > -0.30) return 0.15 * (1.0 + (d + 0.15) / 0.15);
    return 0.0;
  }
  if (lng >= 23.0 && lng <= 28.5 && lat <= 60.8) {
    const finCoast = lng < 24.5 ? 60.12 : lng < 26.0 ? 60.14 : lng < 27.5 ? 60.10 : 60.06;
    const fin = coastGrad(lat, finCoast, -1);
    const estCoast = lng < 25.0 ? 59.50 : lng < 26.5 ? 59.45 : 59.40;
    const est = coastGrad(lat, estCoast, 1);
    return Math.min(fin, est);
  }
  if (lng >= 22.0 && lng < 23.0 && lat <= 61.0) {
    const finCoast = 60.12 + (23.0 - lng) * 0.30;
    return coastGrad(lat, finCoast, -1);
  }
  if (lng >= 19.5 && lng < 22.0 && lat < 60.7) {
    const coastLat = 60.30 + (lng - 19.5) * 0.06;
    if (lat > coastLat + 0.25) return 0.0;
    if (lat > coastLat) return 0.5 * (1.0 - (lat - coastLat) / 0.25);
    if (lat > 59.5) return 0.7 + 0.3 * Math.min(1, (coastLat - lat) / 0.5);
    return 1.0;
  }
  if (lat >= 60.7 && lat < 63.0 && lng <= 22.5) {
    const coastLng = lat < 61.0 ? 21.5 : lat < 61.8 ? 21.4 : 21.0 + (lat - 61.8) * 0.3;
    return coastGrad(lng, coastLng, -1);
  }
  if (lat >= 63.0 && lat < 64.0 && lng <= 23.5) {
    const coastLng = 21.3 + (lat - 63.0) * 1.7;
    return coastGrad(lng, coastLng, -1);
  }
  if (lat >= 64.0 && lat <= 65.8 && lng <= 26.0) {
    const coastLng = 23.5 + (lat - 64.0) * 0.83;
    return coastGrad(lng, coastLng, -1);
  }
  if (lng < 19.5 && lat < 60.5) return 1.0;
  if (lat >= 60.5 && lat < 63.0 && lng < 20.5) return 1.0;
  /* Global heuristics */
  if (lng > -60 && lng < -5 && lat > 10 && lat < 60) return 1.0;
  if (lng > 130 && lng < 180 && lat > -50 && lat < 50) return 1.0;
  if (lng > -180 && lng < -120 && lat > -50 && lat < 50) return 1.0;
  if (lng > 50 && lng < 100 && lat > -40 && lat < 0) return 1.0;
  if (lat < -55) return 1.0;
  if (lng > -6 && lng < 36 && lat > 30 && lat < 42) return 0.85;
  if (lng > -5 && lng < 12 && lat > 50 && lat < 62) return 0.8;
  if (lng > 10 && lng < 40 && lat > -10 && lat < 15) return 0.0;
  if (lng > 50 && lng < 90 && lat > 30 && lat < 50) return 0.0;
  if (lng > -110 && lng < -80 && lat > 30 && lat < 50) return 0.0;
  if (lng > 60 && lng < 140 && lat > 55 && lat < 70) return 0.0;
  return 0.5;
}

function idw(lat, lng) {
  let nb = SpatialIndex.nearby(lat, lng, 3);
  if (!nb.length) nb = SpatialIndex.nearby(lat, lng, 8);
  if (!nb.length) return { u: 0, v: 0, ms: 0 };
  let sw = 0, su = 0, sv = 0;
  const cos2 = Math.cos(lat * Math.PI / 180) ** 2;
  const querySurface = isMarine(lat, lng);
  for (let i = 0; i < nb.length; i++) {
    const f = nb[i], dlat = lat - f.lat, dlng = lng - f.lng;
    const d2 = dlat * dlat + dlng * dlng * cos2;
    if (d2 < 1e-6) return { u: f.u, v: f.v, ms: f.ms };
    const d = Math.sqrt(d2), distW = 1.0 / (d * d);
    const ptSurface = f.marine !== undefined ? f.marine : isMarine(f.lat, f.lng);
    const similarity = 1.0 - Math.abs(querySurface - ptSurface);
    const surfaceW = 0.5 + similarity * 1.5;
    const w = distW * surfaceW;
    sw += w; su += f.u * w; sv += f.v * w;
  }
  const u = su / sw, v = sv / sw;
  return { u, v, ms: Math.sqrt(u * u + v * v) };
}

function px2ll(x, y) { const ll = State.map.containerPointToLatLng(L.point(x, y)); return { lat: ll.lat, lng: ll.lng }; }

/* ── WIND TEXTURE ─────────────────────────────────────────────── */
const WindTexture = {
  canvas: null, ctx: null,
  uData: null, vData: null, msData: null,
  cols: 0, rows: 0,
  latMin: 0, latMax: 0, lngMin: 0, lngMax: 0,

  build(windField, viewportBounds) {
    return new Promise((resolve) => {
      if (!windField.length) { resolve(); return; }
      const zoom = State.map ? State.map.getZoom() : 5;
      let laMin, laMax, loMin, loMax;
      if (viewportBounds) {
        const vPad = zoom <= 5 ? 2 : 0.5;
        laMin = Math.max(-85, viewportBounds.getSouth() - vPad);
        laMax = Math.min(85, viewportBounds.getNorth() + vPad);
        loMin = viewportBounds.getWest() - vPad;
        loMax = viewportBounds.getEast() + vPad;
      } else {
        laMin = -60; laMax = 70; loMin = -180; loMax = 180;
      }
      this.latMin = laMin; this.latMax = laMax;
      this.lngMin = loMin; this.lngMax = loMax;
      const latSpan = this.latMax - this.latMin, lngSpan = this.lngMax - this.lngMin;
      const isMobileDevice = (window.devicePixelRatio || 1) > 1.5;
      let maxDim;
      if (zoom <= 4) maxDim = isMobileDevice ? 120 : 180;
      else if (zoom <= 6) maxDim = isMobileDevice ? 200 : 300;
      else maxDim = isMobileDevice ? 300 : 500;
      const baseRES = zoom <= 5
        ? Math.min(40, Math.max(15, Math.round(Math.sqrt(windField.length) * 1.5)))
        : Math.min(200, Math.max(60, Math.round(80 + (zoom - 5) * 25)));
      this.cols = Math.min(maxDim, Math.ceil(lngSpan * baseRES));
      this.rows = Math.min(maxDim, Math.ceil(latSpan * baseRES));
      if (!this.canvas) { this.canvas = document.createElement('canvas'); this.ctx = this.canvas.getContext('2d'); }
      this.canvas.width = this.cols; this.canvas.height = this.rows;
      const n = this.cols * this.rows;
      this.uData = new Float32Array(n);
      this.vData = new Float32Array(n);
      this.msData = new Float32Array(n);
      const img = this.ctx.createImageData(this.cols, this.rows);
      const d = img.data;
      const latStep = latSpan / this.rows, lngStep = lngSpan / this.cols;
      const self = this;

      function buildAll() {
        for (let r = 0; r < self.rows; r++) {
          const lat = self.latMax - r * latStep;
          for (let c = 0; c < self.cols; c++) {
            const lng = self.lngMin + c * lngStep;
            const w = idw(lat, lng);
            const idx = r * self.cols + c;
            self.uData[idx] = w.u; self.vData[idx] = w.v; self.msData[idx] = w.ms;
            const base = idx * 4;
            const rgb = ColorRamp.rgb(w.ms);
            const t = w.ms / Config.MAX_MS;
            const a = w.ms < 0.3 ? 0.08 : Math.min(0.65, 0.10 + 0.55 * (1 - Math.exp(-2.5 * t)));
            d[base] = rgb.r; d[base+1] = rgb.g; d[base+2] = rgb.b; d[base+3] = Math.round(a * 255);
          }
        }
        self.ctx.putImageData(img, 0, 0);
        resolve();
      }
      if (n < 80000) buildAll(); else setTimeout(buildAll, 0);
    });
  },

  sampleWind(lat, lng) {
    if (!this.msData) return { u: 0, v: 0, ms: 0 };
    const fc = (lng - this.lngMin) / (this.lngMax - this.lngMin) * this.cols;
    const fr = (this.latMax - lat) / (this.latMax - this.latMin) * this.rows;
    const c0 = Math.floor(fc), r0 = Math.floor(fr);
    if (r0 < 0 || r0 >= this.rows - 1 || c0 < 0 || c0 >= this.cols - 1) {
      const cc = Math.max(0, Math.min(this.cols - 1, Math.round(fc)));
      const rr = Math.max(0, Math.min(this.rows - 1, Math.round(fr)));
      const idx = rr * this.cols + cc;
      return { u: this.uData[idx], v: this.vData[idx], ms: this.msData[idx] };
    }
    const a = fc - c0, b = fr - r0;
    const i00 = r0 * this.cols + c0;
    const i10 = i00 + this.cols, i01 = i00 + 1, i11 = i10 + 1;
    const w00 = (1-a)*(1-b), w01 = a*(1-b), w10 = (1-a)*b, w11 = a*b;
    const u = w00*this.uData[i00] + w01*this.uData[i01] + w10*this.uData[i10] + w11*this.uData[i11];
    const v = w00*this.vData[i00] + w01*this.vData[i01] + w10*this.vData[i10] + w11*this.vData[i11];
    return { u, v, ms: Math.sqrt(u*u + v*v) };
  }
};
