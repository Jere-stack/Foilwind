<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy Debug</title>
<style>
body{font-family:monospace;background:#111;color:#0cf;padding:16px;font-size:12px}
button{display:block;width:100%;padding:14px;margin:8px 0;background:#0cf2;border:1px solid #0cf;color:#0cf;border-radius:10px;font-size:14px;cursor:pointer}
#out{background:#0002;padding:12px;border-radius:8px;margin-top:12px;white-space:pre-wrap;word-break:break-all;color:#aef}
</style>
</head>
<body>
<h3 style="color:#fff;margin:0 0 8px">Proxy + Historia Debug</h3>
<button onclick="testProxy()">1. Testaa proxy suoraan</button>
<button onclick="testBri3()">2. Testaa bri3.fvh.io suoraan</button>
<div id="out">Paina nappia...</div>
<script>
const ID = '70B3D57050001AB9';

async function testProxy() {
const out = document.getElementById(‘out’);
out.textContent = ‘Haetaan proxylta…\n’;
const url = ‘https://foilwind.vercel.app/api/uiras?id=’ + ID;
out.textContent += ’URL: ’ + url + ‘\n\n’;
try {
const r = await fetch(url);
out.textContent += ’Status: ’ + r.status + ‘\n’;
const txt = await r.text();
out.textContent += ‘Koko: ’ + txt.length + ’ merkkiä\n\n’;
try {
const json = JSON.parse(txt);
out.textContent += ’count: ’ + json.count + ‘\n’;
out.textContent += ’years: ’ + JSON.stringify(json.years) + ‘\n’;
out.textContent += ’error: ’ + json.error + ‘\n’;
if (json.data && json.data.length > 0) {
out.textContent += ’\nEnsimmäinen piste: ’ + JSON.stringify(json.data[0]) + ‘\n’;
out.textContent += ’Viimeisin piste: ’ + JSON.stringify(json.data[json.data.length-1]) + ‘\n’;
}
} catch(pe) {
out.textContent += ’JSON parse virhe: ’ + pe.message + ‘\n’;
out.textContent += ‘Raw (500 merkkiä):\n’ + txt.slice(0, 500);
}
} catch(e) {
out.textContent += ’VIRHE: ’ + e.message;
}
}

async function testBri3() {
const out = document.getElementById(‘out’);
out.textContent = ‘Haetaan bri3:lta suoraan…\n’;
const url = ‘https://bri3.fvh.io/opendata/uiras/’ + ID + ‘.geojson’;
out.textContent += ’URL: ’ + url + ‘\n\n’;
try {
const r = await fetch(url);
out.textContent += ’Status: ’ + r.status + ‘\n’;
const json = await r.json();
const raw = json.properties && json.properties.data && json.properties.data.raw || [];
out.textContent += ’Raw-pisteitä: ’ + raw.length + ‘\n’;
if (raw.length > 0) {
out.textContent += ’Ensimmäinen: ’ + JSON.stringify(raw[0]) + ‘\n’;
out.textContent += ’Viimeisin: ’ + JSON.stringify(raw[raw.length-1]) + ‘\n’;
}
} catch(e) {
out.textContent += ’VIRHE: ’ + e.message;
}
}
</script>

</body>
</html>
