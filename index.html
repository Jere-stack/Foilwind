<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UiRas Periods Debug</title>
<style>
body{font-family:monospace;background:#111;color:#0cf;padding:16px;font-size:12px}
button{display:block;width:100%;padding:14px;margin:8px 0;background:#0cf2;border:1px solid #0cf;color:#0cf;border-radius:10px;font-size:14px;cursor:pointer}
#out{background:#0002;padding:12px;border-radius:8px;margin-top:12px;white-space:pre-wrap;word-break:break-all;color:#aef}
</style>
</head>
<body>
<h3 style="color:#fff;margin:0 0 8px">UiRas — Testaa periodeja</h3>
<button onclick="test('P7D')">Testaa P7D (7 vrk)</button>
<button onclick="test('P30D')">Testaa P30D (30 vrk)</button>
<button onclick="test('P730D')">Testaa P730D (730 vrk / 2v)</button>
<div id="out">Paina nappia...</div>
<script>
const ID = '70B3D57050001AB9';
async function test(period){
  const out=document.getElementById('out');
  out.textContent='Haetaan '+period+'...\n';
  try{
    const url='https://bri3.fvh.io/opendata/uiras/'+ID+'.geojson?period='+period;
    out.textContent+='URL: '+url+'\n';
    const r=await fetch(url);
    out.textContent+='Status: '+r.status+'\n';
    const txt=await r.text();
    out.textContent+='Koko: '+txt.length+' merkkiä\n';
    const gj=JSON.parse(txt);
    const raw=(gj.properties&&gj.properties.data&&gj.properties.data.raw)||[];
    out.textContent+='Mittauksia: '+raw.length+'\n';
    if(raw.length>0){
      out.textContent+='Ensimmäinen: '+raw[0].time+' → '+raw[0].temp_water+'°C\n';
      out.textContent+='Viimeisin: '+raw[raw.length-1].time+' → '+raw[raw.length-1].temp_water+'°C\n';
    }
  }catch(e){
    out.textContent+='VIRHE: '+e.message+'\n';
  }
}
</script>
</body>
</html>
