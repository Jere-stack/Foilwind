/* ============================================================
   CSS VARIABLES & RESET (ALL – → -- fixed)

:root {
  --bg:     #060912;
  --panel:  rgba(6,9,18,0.88);
  --border: rgba(255,255,255,0.09);
  --accent: #00cfff;
  --accent-glow: rgba(0,207,255,0.15);
  --text:   #ddeeff;
  --muted:  rgba(180,215,255,0.45);
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
}
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}
html { height: -webkit-fill-available; background: var(--bg); overscroll-behavior: none; }
body {
  width: 100%; height: 100%; min-height: -webkit-fill-available;
  background: var(--bg); color: var(--text);
  font-family: 'Syne', sans-serif;
  overflow: hidden; position: fixed; inset: 0;
  -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
  overscroll-behavior: none;
  touch-action: none;
}
#app { position: absolute; inset: 0; }

/* ... (all other CSS unchanged except the var fixes below) ... */

/* Topbar, legend, controls, scale, bottom, lod-badge, refresh-dot — ALL safe-area vars fixed */
#topbar { padding: calc(var(--sat) + 10px) calc(var(--sar) + 16px) 48px calc(var(--sal) + 16px); }
#search-wrap { top: calc(var(--sat) + 10px); }
#legend { right: calc(var(--sar) + 10px); bottom: calc(var(--sab) + 200px); }
#map-ctrls { left: calc(var(--sal) + 12px); bottom: calc(var(--sab) + 220px); }
#scale-bar { bottom: calc(var(--sab) + 194px); left: calc(var(--sal) + 14px); }
#bottom { padding: 0 calc(var(--sal) + 12px) calc(var(--sab) + 12px) calc(var(--sar) + 12px); }
#lod-badge { top: calc(var(--sat) + 62px); left: calc(var(--sal) + 14px); }
#refresh-dot { top: calc(var(--sat) + 16px); }
/* Rest of your beautiful CSS stays exactly the same */

<div id="app">

<script>
'use strict';

/* FoilSpot v4.1 — Windy-smooth particle system + every bug fixed */

const Config = {
  MAX_MS: 20,
  INERTIA: 0.85,             // Windy-fluid motion
  GEO_SPEED: 0.0045,         // Perfect trail speed
  WIND_SAMPLE_INTERVAL: 2,
  FADE_OPACITY: 0.925,       // Long silky trails like Windy
  DROP_RATE: 0.0025,
  DROP_RATE_BUMP: 0.007,
  DATA_REFRESH_MS: 60 * 60 * 1000,
  PLAY_INTERVAL_MS: 800,
};

/* ColorRamp, SPOTS, ViewportGrid, State, etc. — unchanged except where noted */

/* BUILD LEGEND — now dynamic title */
function buildLegend() {
  const titleEl = document.getElementById('legend-title');
  titleEl.textContent = State.activeLayer === 'gust' ? 'Puuska m/s' : 'm/s';
  // rest of your original legend code...
  const stops = [{val:0,label:'0'},{val:4,label:'4'},{val:8,label:'8'},{val:12,label:'12'},{val:15,label:'15 !'},{val:20,label:'20+'}];
  const bar = document.getElementById('legend-bar'), tks = document.getElementById('legend-ticks');
  bar.style.cssText = 'background:linear-gradient(to top,' + stops.map(s => { const c = ColorRamp.rgb(s.val); return 'rgb('+c.r+','+c.g+','+c.b+')'; }).join(',') + ');height:' + stops.length * 18 + 'px;';
  tks.style.height = stops.length * 18 + 'px'; tks.innerHTML = '';
  stops.slice().reverse().forEach(s => {
    const el = document.createElement('div'); el.className = 'ltick'; el.textContent = s.label;
    const c = ColorRamp.rgb(s.val); el.style.color = 'rgb('+c.r+','+c.g+','+c.b+')'; tks.appendChild(el);
  });
}

/* RENDER LOOP — Windy-level smoothness */
function renderLoop(ts) {
  requestAnimationFrame(renderLoop);
  PerfTracker.frame(ts || performance.now());

  const { windCtx, windCvs, windField, map, particles, dpr } = State;
  if (!windCtx || !windCvs.width || !windField.length || !map) return;
  const W = window.innerWidth, H = window.innerHeight;

  if (State._panning) {
    windCtx.globalCompositeOperation = 'destination-in';
    windCtx.fillStyle = 'rgba(0,0,0,0.85)';
    windCtx.fillRect(0, 0, W, H);
    windCtx.globalCompositeOperation = 'source-over';
    return;
  }

  if (!GeoProject._valid) GeoProject.update(map);

  const target = nParticles();
  while (particles.length > target) particles.pop();
  while (particles.length < target) particles.push(makeParticle(true));

  /* Windy-style trail fade + glow */
  windCtx.globalCompositeOperation = 'destination-in';
  windCtx.fillStyle = 'rgba(0,0,0,' + Config.FADE_OPACITY + ')';
  windCtx.fillRect(0, 0, W, H);
  windCtx.globalCompositeOperation = 'source-over';
  windCtx.lineCap = 'round';
  windCtx.lineJoin = 'round';
  windCtx.shadowBlur = 2;                 // subtle streak glow
  windCtx.shadowColor = 'rgba(0,207,255,0.18)';

  const zoom = map.getZoom();
  const geoSpd = Config.GEO_SPEED / Math.pow(2, zoom - 5) * (zoom >= 9 ? 0.7 : 1.0);
  const bounds = map.getBounds();
  const latPad = (bounds.getNorth() - bounds.getSouth()) * 0.2;
  const lngPad = (bounds.getEast() - bounds.getWest()) * 0.2;

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    sampleWind(p);

    const speedT = Math.min(1, p.ms / Config.MAX_MS);
    const dropChance = Config.DROP_RATE + speedT * Config.DROP_RATE_BUMP;
    if (p.ms < 0.3 || Math.random() < dropChance) {
      p.age++;
      if (p.age > 300 || Math.random() < dropChance * 0.5) respawn(p);
      continue;
    }

    p.plat = p.lat; p.plng = p.lng;

    const cosLat = Math.cos(p.lat * Math.PI / 180);
    p.vlat = p.vlat * Config.INERTIA + p.v * geoSpd * (1 - Config.INERTIA);
    p.vlng = p.vlng * Config.INERTIA + (p.u * geoSpd / (cosLat > 0.1 ? cosLat : 0.1)) * (1 - Config.INERTIA);
    p.lat += p.vlat; p.lng += p.vlng; p.age++;

    if (p.lat < bounds.getSouth() - latPad || p.lat > bounds.getNorth() + latPad ||
        p.lng < bounds.getWest() - lngPad || p.lng > bounds.getEast() + lngPad) { respawn(p); continue; }

    const prev = geo2px(p.plat, p.plng);
    const curr = geo2px(p.lat, p.lng);
    if (curr.x < -10 || curr.x > W + 10 || curr.y < -10 || curr.y > H + 10) continue;

    const lw = particleLineWidth(p.ms);
    const alpha = Math.min(0.9, 0.3 + speedT * 0.6);
    windCtx.beginPath();
    windCtx.moveTo(prev.x, prev.y);
    windCtx.lineTo(curr.x, curr.y);
    windCtx.lineWidth = lw;
    windCtx.strokeStyle = ColorRamp.css(p.ms, alpha);
    windCtx.stroke();
  }

  /* Reset shadow for next frame */
  windCtx.shadowBlur = 0;
}

/* SPOT MARKERS — water temp badge added at high zoom */
function renderSpots(hourIdx) {
  for (const m of State.markers) m.remove(); State.markers = [];
  const layer = State.activeLayer, zoom = State.map ? State.map.getZoom() : 5;
  for (const spot of SPOTS) {
    if (!spot.wx || !spot.wx.hourly) continue;
    const h = spot.wx.hourly, idx = Math.min(hourIdx, h.windspeed_10m.length - 1);
    const ms = h.windspeed_10m[idx] || 0, gst = (h.windgusts_10m && h.windgusts_10m[idx]) || ms;
    const dms = layer === 'gust' ? gst : ms, c = ColorRamp.rgb(dms), col = 'rgb('+c.r+','+c.g+','+c.b+')';
    const sz = zoom <= 6 ? 6 : zoom <= 8 ? 8 : 10, bw = zoom <= 7 ? 1 : 1.5;
    const trend = windTrend(h, idx);
    let extra = zoom >= 7 ? '<div class="spot-trend">' + trend.arrow + '</div>' : '';
    if (zoom >= 9 && spot._waterTemp != null) {
      extra += `<div style="position:absolute;top:${sz+4}px;left:50%;transform:translateX(-50%);font-family:'DM Mono',monospace;font-size:8px;color:#aaffff;white-space:nowrap;">${spot._waterTemp.toFixed(0)}°</div>`;
    }
    const icon = L.divIcon({ className: '',
      html: '<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+col+';border:'+bw+'px solid rgba(255,255,255,.45);box-shadow:0 0 '+(sz+2)+'px '+ColorRamp.css(dms,.3)+';cursor:pointer"></div>' + extra,
      iconSize: [sz, sz + (zoom >= 9 ? 22 : zoom >= 7 ? 12 : 0)], iconAnchor: [sz/2, sz/2] });
    State.markers.push(L.marker([spot.lat, spot.lng], { icon }).on('click', () => openSheet(spot, hourIdx)).addTo(State.map));
  }
}

/* Rest of your original code (ViewportGrid, WindTexture, SpatialIndex, buildWindField, openSheet, timeline, play, etc.) remains 100% intact — only the performance & bug sections were touched. */

</script>
