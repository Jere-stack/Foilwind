/* ── SPOT LIST — Viewport-filtered ranked list ────────────────── */
const SpotList = {
  _open: false,
  toggle() {
    this._open = !this._open;
    const el = document.getElementById('spot-list');
    const overlay = document.getElementById('sheet-overlay');
    if (this._open) {
      closeSheet(); /* Close spot detail if open */
      this.render();
      el.classList.add('open');
      overlay.classList.add('open');
    } else {
      el.classList.remove('open');
      overlay.classList.remove('open');
    }
  },
  close() {
    this._open = false;
    document.getElementById('spot-list').classList.remove('open');
    document.getElementById('sheet-overlay').classList.remove('open');
  },
  render() {
    if (!State.map) return;
    const bounds = State.map.getBounds();
    const hourIdx = State.currentHourIdx;
    const layer = State.activeLayer;
    /* Filter spots in viewport */
    const visible = SPOTS.filter(s => {
      if (!s.wx || !s.wx.hourly) return false;
      return bounds.contains(L.latLng(s.lat, s.lng));
    });
    /* Get wind speed for each, compute score, sort by score descending */
    const ranked = visible.map(s => {
      const h = s.wx.hourly, idx = Math.min(hourIdx, h.windspeed_10m.length - 1);
      const ms = h.windspeed_10m[idx] || 0;
      const gst = (h.windgusts_10m && h.windgusts_10m[idx]) || ms;
      const dir = h.winddirection_10m[idx] || 0;
      const dms = layer === 'gust' ? gst : ms;
      const score = WingfoilScore.compute(ms, gst, dir, s);
      return { spot: s, ms, gst, dir, dms, score };
    }).sort((a, b) => b.score - a.score);

    document.getElementById('sl-count').textContent = ranked.length + ' / ' + SPOTS.length + ' spottia';
    const container = document.getElementById('sl-items');
    container.innerHTML = ranked.map((r, i) => {
      const c = ColorRamp.rgb(r.dms);
      const col = 'rgb(' + c.r + ',' + c.g + ',' + c.b + ')';
      const arrow = dirArrow(r.dir);
      const wfLbl = WingfoilScore.label(r.score);
      return '<div class="sl-item" data-spot="' + r.spot.name + '">'
        + '<span class="sl-rank">' + (i + 1) + '</span>'
        + '<div class="sl-dot" style="background:' + col + ';box-shadow:0 0 6px ' + ColorRamp.css(r.dms, 0.4) + '"></div>'
        + '<div class="sl-info"><div class="sl-name">' + r.spot.name + '</div>'
        + '<div class="sl-desc">' + arrow + ' ' + Math.round(r.dir) + '° · ' + Units.fmt(r.dms) + ' ' + Units.label()
        + (r.gst > r.ms * 1.1 ? ' · G ' + Units.fmt(r.gst) : '') + '</div></div>'
        + '<div class="sl-wind"><div class="sl-score ' + wfLbl.cls + '">' + r.score + '</div>'
        + '<div class="sl-score-sub">' + wfLbl.text + '</div></div>'
        + '</div>';
    }).join('');

    if (!ranked.length) {
      container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-family:DM Mono,monospace;font-size:11px">Ei spotteja kartalla — zoomaa lähemmäs Suomea</div>';
    }

    /* Click to fly to spot and open detail */
    container.querySelectorAll('.sl-item').forEach(el => {
      el.addEventListener('click', () => {
        const name = el.dataset.spot;
        const spot = SPOTS.find(s => s.name === name);
        if (spot) {
          this.close();
          State.map.flyTo([spot.lat, spot.lng], 10, { duration: 1 });
          setTimeout(() => openSheet(spot, State.currentHourIdx), 600);
        }
      });
    });
  }
};

/* ── WEEKLY FORECAST PANEL ────────────────────────────────────── */
const ForecastPanel = {
  _open: false,

  toggle() {
    this._open = !this._open;
    const el = document.getElementById('forecast-panel');
    const overlay = document.getElementById('sheet-overlay');
    if (this._open) {
      closeSheet(); SpotList.close();
      this._render();
      el.classList.add('open');
      overlay.classList.add('open');
    } else {
      el.classList.remove('open');
      overlay.classList.remove('open');
    }
  },

  close() {
    this._open = false;
    document.getElementById('forecast-panel').classList.remove('open');
    document.getElementById('sheet-overlay').classList.remove('open');
  },

  /* WMO code → emoji (reuse WeatherWidget codes) */
  _wxIcon(code) {
    const c = WeatherWidget._codes[code] || ['🌡',''];
    return c[0];
  },

  /* Get weather code for a spot at a given time index */
  _getWxCode(spot, timeIso) {
    const cache = WeatherWidget._cache;
    const lat = (Math.round(spot.lat * 2) / 2).toFixed(1);
    const lng = (Math.round(spot.lng * 2) / 2).toFixed(1);
    const key = lat + ',' + lng;
    if (!cache[key]) return null;
    const h = cache[key].data.hourly;
    if (!h || !h.time) return null;
    const target = new Date(timeIso).getTime();
    let best = 0, bd = Infinity;
    for (let i = 0; i < h.time.length; i++) {
      const d = Math.abs(new Date(h.time[i]).getTime() - target);
      if (d < bd) { bd = d; best = i; }
    }
    return h.weather_code ? h.weather_code[best] : null;
  },

  _render() {
    const container = document.getElementById('fc-content');
    const DAY = ['Su','Ma','Ti','Ke','To','Pe','La'];
    const wfColors = {
      'wf-perfect': 'rgb(255,200,30)', 'wf-good': 'rgb(80,237,120)',
      'wf-ok': 'rgb(240,170,0)', 'wf-light': 'rgb(80,160,255)', 'wf-pass': 'rgba(180,215,255,.35)'
    };

    /* Collect all candidate windows across all spots and hours */
    const now = Date.now();
    const sevenDays = 7 * 24 * 60 * 60 * 1000;

    /* Build per-day windows */
    const dayMap = {}; /* key: YYYY-MM-DD → array of window candidates */

    for (const spot of SPOTS) {
      if (!spot.wx || !spot.wx.hourly) continue;
      const h = spot.wx.hourly;
      const times = h.time, speeds = h.windspeed_10m, dirs = h.winddirection_10m;
      const gusts = h.windgusts_10m || speeds;
      if (!times || times.length < 3) continue;

      for (let i = 0; i < times.length - 2; i++) {
        const t0 = new Date(times[i]);
        const t2 = new Date(times[i + 2]);
        const tMs = t0.getTime();

        /* Only future windows within 7 days */
        if (tMs < now - 3600000) continue;
        if (tMs > now + sevenDays) break;

        /* Window must be fully within 09:00–21:00 */
        if (t0.getHours() < 9) continue;
        if (t2.getHours() >= 21) continue;

        /* Compute 3h average score */
        let scoreSum = 0;
        for (let j = i; j <= i + 2; j++) {
          const ms = speeds[j] || 0;
          const gst = gusts[j] || ms;
          const dir = dirs[j] || 0;
          scoreSum += WingfoilScore.compute(ms, gst, dir, spot);
        }
        const avgScore = scoreSum / 3;
        if (avgScore < 65) continue;

        /* Date key */
        const dateKey = t0.getFullYear() + '-' + String(t0.getMonth()+1).padStart(2,'0') + '-' + String(t0.getDate()).padStart(2,'0');

        /* Representative values (middle hour) */
        const mid = i + 1;
        const ms = speeds[mid] || 0;
        const gst = gusts[mid] || ms;
        const dir = dirs[mid] || 0;
        const wxCode = this._getWxCode(spot, times[mid]);

        if (!dayMap[dateKey]) dayMap[dateKey] = [];
        dayMap[dateKey].push({
          spot, score: Math.round(avgScore), ms, gst, dir, wxCode,
          t0, t2, timeKey: t0.getHours() /* for spacing check */
        });
      }
    }

    /* Per day: pick up to 3 windows spaced ≥4h apart, best score wins per slot */
    const sortedDays = Object.keys(dayMap).sort();
    if (sortedDays.length === 0) {
      container.innerHTML = '<div style="padding:24px 20px;text-align:center;font-family:DM Mono,monospace;font-size:11px;color:var(--muted)">Ei hyviä olosuhteita seuraavalle viikolle — score &gt;65 ei täyty millään spotilla.</div>';
      return;
    }

    let html = '';
    for (const dateKey of sortedDays) {
      const candidates = dayMap[dateKey].sort((a, b) => b.score - a.score);
      const selected = [];

      for (const c of candidates) {
        /* Check spacing: must be ≥4h from any already selected window */
        const tooClose = selected.some(s => Math.abs(s.timeKey - c.timeKey) < 4);
        if (tooClose) continue;
        selected.push(c);
        if (selected.length >= 3) break;
      }

      /* Sort selected chronologically */
      selected.sort((a, b) => a.timeKey - b.timeKey);

      const d = selected[0].t0;
      const dayLabel = DAY[d.getDay()] + ' ' + d.getDate() + '.' + (d.getMonth()+1) + '.';
      const isToday = new Date().toDateString() === d.toDateString();

      html += '<div class="fc-day">';
      html += '<div class="fc-day-header">'
        + '<span class="fc-day-name">' + (isToday ? 'TÄNÄÄN' : DAY[d.getDay()].toUpperCase()) + '</span>'
        + '<span class="fc-day-date">' + d.getDate() + '.' + (d.getMonth()+1) + '.' + '</span>'
        + '</div>';

      for (const w of selected) {
        const wfLbl = WingfoilScore.label(w.score);
        const wfColor = wfColors[wfLbl.cls] || 'var(--muted)';
        const h0 = String(w.t0.getHours()).padStart(2,'0') + ':00';
        const h2 = String(w.t2.getHours()).padStart(2,'0') + ':00';
        const arrow = dirArrow(w.dir);
        const wxIcon = w.wxCode != null ? this._wxIcon(w.wxCode) : '🌬️';
        const gustTxt = w.gst > w.ms * 1.1 ? ' · G' + Units.fmt(w.gst) : '';

        html += '<div class="fc-window" data-spot="' + w.spot.name + '" data-time="' + w.t0.getTime() + '">'
          + '<div class="fc-score-ring ' + wfLbl.cls + '" style="color:' + wfColor + '">'
            + '<span class="fc-score-num">' + w.score + '</span>'
            + '<span class="fc-score-sub">/ 100</span>'
          + '</div>'
          + '<div class="fc-info">'
            + '<div class="fc-spot-name">' + w.spot.name + '</div>'
            + '<div class="fc-time-range">' + h0 + ' – ' + h2 + '</div>'
            + '<div class="fc-wind-info">' + arrow + ' ' + Units.fmt(w.ms) + ' ' + Units.label() + gustTxt + ' · ' + Math.round(w.dir) + '°</div>'
          + '</div>'
          + '<div class="fc-right">'
            + '<div class="fc-wx-icon">' + wxIcon + '</div>'
            + '<div class="fc-verdict ' + wfLbl.cls + '">' + wfLbl.text + '</div>'
          + '</div>'
          + '</div>';
      }

      html += '</div>';
    }

    /* Days with no qualifying windows within the 7-day range */
    const allDays = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(now + i * 24 * 3600 * 1000);
      const k = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      if (!dayMap[k]) {
        const isToday = new Date().toDateString() === d.toDateString();
        html += '<div class="fc-day">'
          + '<div class="fc-day-header">'
            + '<span class="fc-day-name" style="opacity:.4">' + (isToday ? 'TÄNÄÄN' : DAY[d.getDay()].toUpperCase()) + '</span>'
            + '<span class="fc-day-date" style="opacity:.4">' + d.getDate() + '.' + (d.getMonth()+1) + '.</span>'
          + '</div>'
          + '<div class="fc-no-windows">— ei sopivia olosuhteita</div>'
          + '</div>';
      }
    }

    container.innerHTML = html;

    /* Click: fly to spot and open sheet at closest hour */
    container.querySelectorAll('.fc-window').forEach(el => {
      el.addEventListener('click', () => {
        const name = el.dataset.spot;
        const targetTime = parseInt(el.dataset.time);
        const spot = SPOTS.find(s => s.name === name);
        if (!spot) return;
        this.close();
        State.map.flyTo([spot.lat, spot.lng], 10, { duration: 1 });
        /* Find timeline index matching this exact timestamp */
        if (State._tlTimes && targetTime) {
          let best = State.currentHourIdx, bd = Infinity;
          for (let i = 0; i < State._tlTimes.length; i++) {
            const d = Math.abs(new Date(State._tlTimes[i]).getTime() - targetTime);
            if (d < bd) { bd = d; best = i; }
          }
          State.currentHourIdx = best;
          _tlUpdateNow(best);
          scrollTimelineTo(best);
          buildWindField(best).then(() => { drawColorField(); resetParticles(); renderSpots(best); });
        }
        setTimeout(() => openSheet(spot, State.currentHourIdx), 700);
      });
    });
  }
};

/* ── LOADING & REFRESH ────────────────────────────────────────── */
function updateLoadText(msg) { const el = document.getElementById('load-txt'); if (el) el.textContent = msg; }
function hideLoading() { const el = document.getElementById('loading'); el.classList.add('out'); setTimeout(() => { el.style.display = 'none'; }, 600); }
function scheduleRefresh() {
  clearInterval(State.refreshTimer);
  State.refreshTimer = setInterval(() => {
    const dot = document.getElementById('refresh-dot'); dot.classList.add('pulse');
    Object.keys(_batchCache).forEach(k => delete _batchCache[k]);
    ViewportGrid._points.clear();
    ViewportGrid.loadViewport(State.map).then(() => ViewportGrid.loadSpots()).then(() => {
      buildWindField(State.currentHourIdx).then(() => {
        drawColorField(); resetParticles(); renderSpots(State.currentHourIdx);
      });
      State.lastDataLoad = Date.now();
      setTimeout(() => dot.classList.remove('pulse'), 1500);
    });
  }, Config.DATA_REFRESH_MS);
}

/* ── MAIN ─────────────────────────────────────────────────────── */
function main() {
  const bail = setTimeout(() => { hideLoading(); startRenderLoop(); }, 20000);
  buildLegend(); initMap(); initCanvases(); 
  Crosshair.init(); WeatherWidget.init(); Units.init();

  /* Always reload spot data fresh — clears any stale wx from previous sessions */
  SPOTS.forEach(s => { s.wx = null; });
  Object.keys(_batchCache).forEach(k => delete _batchCache[k]);

  updateLoadText('Ladataan globaali tuulidata...');
  ViewportGrid.loadGlobalCoarse((done, total) => {
    updateLoadText('Globaali ' + Math.round(done / total * 100) + '%');
  })
  .then(() => {
    const all = ViewportGrid.getAllPoints();
    if (all.length > 0) {
      const ref = all.find(p => p.wx && p.wx.hourly);
      if (ref) {
        const ni = nowIdx(ref.wx.hourly.time); State.currentHourIdx = ni;
        buildWindField(ni).then(() => {
          drawColorField(); resetParticles(); startRenderLoop();
          console.log('[Phase 1] Coarse wind ready:', all.length, 'pts');
        });
        renderTimeline(ref.wx.hourly.time, ref.wx.hourly.windspeed_10m, ref.wx.hourly.winddirection_10m, ni);
      } else {
        startRenderLoop();
      }
    } else {
      startRenderLoop();
    }

    updateLoadText('Tarkennetaan...');
    const viewportPromise = ViewportGrid.loadViewport(State.map).catch(e => console.warn('[Phase 2 viewport]', e));
    const spotsPromise = ViewportGrid.loadSpots()
      .then(() => { if (State.map) renderSpots(State.currentHourIdx); })
      .catch(e => console.warn('[Phase 2 spots]', e));
    Promise.allSettled([viewportPromise, spotsPromise]).then(() => {
      const ref = bestTimelineRef();
      if (ref) {
        const ni = nowIdx(ref.wx.hourly.time); State.currentHourIdx = ni;
        buildWindField(ni).then(() => { drawColorField(); resetParticles(); renderSpots(ni); });
        const layer = State.activeLayer;
        const sp = layer === 'gust' ? (ref.wx.hourly.windgusts_10m || ref.wx.hourly.windspeed_10m) : ref.wx.hourly.windspeed_10m;
        renderTimeline(ref.wx.hourly.time, sp, ref.wx.hourly.winddirection_10m, ni);
      } else {
        renderSpots(State.currentHourIdx);
      }
      loadMarineTemp();
      State.lastDataLoad = Date.now(); scheduleRefresh();
      
      console.log('[Phase 2] Fine data ready:', ViewportGrid.getAllPoints().length, 'pts, spots:', SPOTS.filter(s=>s.wx).length);
    });
  })
  .catch(err => { console.error('[FoilSpot]', err); Toast.show('\u26a0 Virhe säädatan latauksessa'); startRenderLoop(); })
  .finally(() => { clearTimeout(bail); hideLoading(); });
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', main);
else main();

</script>

</body>
</html>
