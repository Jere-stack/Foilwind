<!DOCTYPE html>

<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UiRas Testi — Vedenlämpötilat</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0a0e1a; color: #fff; height: 100vh; display: flex; flex-direction: column; }
  #header { padding: 12px 16px; background: rgba(0,207,255,.1); border-bottom: 1px solid rgba(0,207,255,.2); }
  #header h1 { font-size: 16px; color: #0cf; }
  #status { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 4px; font-family: monospace; }
  #map { flex: 1; }
  #panel {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
    background: rgba(10,14,26,.97); border-top: 1px solid rgba(0,207,255,.2);
    border-radius: 16px 16px 0 0; padding: 16px;
    transform: translateY(100%); transition: transform .3s ease;
    max-height: 70vh; overflow-y: auto;
  }
  #panel.open { transform: translateY(0); }
  #panel-close { float: right; background: none; border: none; color: #0cf; font-size: 18px; cursor: pointer; }
  #panel-name { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  #panel-temp { font-size: 48px; font-weight: 700; color: #4dd; font-family: monospace; line-height: 1; }
  #panel-meta { font-size: 11px; color: rgba(255,255,255,.4); font-family: monospace; margin-top: 4px; margin-bottom: 16px; }
  #chart-controls { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .chip {
    font-family: monospace; font-size: 10px; padding: 4px 10px;
    border-radius: 8px; border: 1px solid rgba(0,180,255,.3);
    background: none; color: rgba(0,207,255,.6); cursor: pointer;
  }
  .chip.active { background: rgba(0,207,255,.15); color: #0cf; border-color: rgba(0,207,255,.5); }
  #chart-area { width: 100%; }
  .leaflet-container { background: #0a0e1a; }
</style>
</head>
<body>

<div id="header">
  <h1>🏊 UiRas — Vedenlämpötilat PKS</h1>
  <div id="status">Ladataan asemia...</div>
</div>

<div id="map"></div>

<div id="panel">
  <button id="panel-close" onclick="closePanel()">✕</button>
  <div id="panel-name">—</div>
  <div id="panel-temp">—</div>
  <div id="panel-meta">—</div>
  <div id="chart-controls"></div>
  <svg id="chart-area" viewBox="0 0 300 100" style="width:100%;display:block"></svg>
</div>

<script>
// ── Kartta ─────────────────────────────────────────────────────
const map = L.map('map', { center: [60.18, 24.93], zoom: 11, zoomControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd', maxZoom: 19,
  attribution: '© OSM © CARTO'
}).addTo(map);

// ── Tunnetut asemat ─────────────────────────────────────────────
const STATIONS = [
  { name: 'Hietaniemi',         lat: 60.1734, lng: 24.9100, id: '70B3D57050001AB9' },
  { name: 'Lauttasaari',        lat: 60.1490, lng: 24.8760, id: '70B3D57050001A97' },
  { name: 'Marjaniemi',         lat: 60.1978, lng: 25.0990, id: '70B3D57050001ADA' },
  { name: 'Mustikkamaa',        lat: 60.1754, lng: 24.9912, id: '70B3D57050001BA6' },
  { name: 'Rastila',            lat: 60.2081, lng: 25.1320, id: '70B3D57050001BBE' },
  { name: 'Kallahdenniemi',     lat: 60.1871, lng: 25.1490, id: '70B3D57050004740' },
  { name: 'Pihlajasaari',       lat: 60.1443, lng: 24.9160, id: '70B3D57050004CDB' },
  { name: 'Uunisaari',          lat: 60.1480, lng: 24.9540, id: '70B3D5705000516A' },
  { name: 'Aurinkolahti',       lat: 60.2094, lng: 25.1189, id: '70B3D5705000DFED' },
  { name: 'Pikkukoski',         lat: 60.2374, lng: 24.9610, id: '70B3D5705000E070' },
  { name: 'Vartiosaari',        lat: 60.1900, lng: 25.0570, id: '70B3D5705000E3B2' },
  { name: 'Kivinokka',          lat: 60.1985, lng: 25.0445, id: '70B3D5705000E3C0' },
  { name: 'Seurasaari',         lat: 60.1892, lng: 24.8870, id: '70B3D5705000E430' },
  { name: 'Hanika (Espoo)',     lat: 60.1462, lng: 24.7620, id: '70B3D570500113C4' },
  { name: 'Iso Huopalahti',     lat: 60.2050, lng: 24.8760, id: '70B3D5705001148E' },
];

// ── API ────────────────────────────────────────────────────────
const BASE = 'https://iot.fvh.fi/opendata/uiras/';
let currentStation = null, currentHistory = null, currentPeriod = '7d', currentAvg = 1;

async function loadLatest() {
  setStatus('Haetaan lämpötiloja...');
  try {
    const r = await fetch(BASE + 'uiras_latest.geojson');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const gj = await r.json();
    const count = (gj.features||[]).length;
    setStatus('✅ Data ladattu — ' + count + ' asemaa löytyi');

    // DEBUG: näytä 3 ensimmäisen featureen kaikki properties konsolissa
    if (gj.features && gj.features.length > 0) {
      console.log('=== UIRAS DEBUG ===');
      gj.features.slice(0, 3).forEach((f, i) => {
        console.log('Feature', i, 'properties:', JSON.stringify(f.properties, null, 2));
        console.log('Feature', i, 'geometry:', JSON.stringify(f.geometry));
      });
      // Näytä myös kaikki property-avaimet ensimmäisestä featuresta
      const keys = Object.keys(gj.features[0].properties || {});
      console.log('Property keys:', keys);
      console.log('measurement field:', JSON.stringify(gj.features[0].properties.measurement, null, 2));
      document.getElementById('status').textContent += ' | Keys: ' + keys.join(', ');
    }

    return gj;
  } catch(e) {
    setStatus('❌ API-virhe: ' + e.message);
    return null;
  }
}

async function loadHistory(id) {
  const r = await fetch(BASE + id + '.geojson');
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const gj = await r.json();

  // DEBUG: näytä historia-featureiden rakenne
  if (gj.features && gj.features.length > 0) {
    console.log('=== HISTORY DEBUG for', id, '===');
    console.log('First feature props:', JSON.stringify(gj.features[0].properties, null, 2));
    console.log('Last feature props:', JSON.stringify(gj.features[gj.features.length-1].properties, null, 2));
    console.log('Total features:', gj.features.length);
  }

  return (gj.features||[]).map(f => {
    const p = f.properties || {};
    const m = p.measurement || {};
    // Aika ja lämpötila measurement-objektista tai suoraan propertiesista
    const t = m.time || m.timestamp || p.time || p.timestamp;
    const v = m.water_temperature ?? m.temperature ?? p.water_temperature ?? p.temperature;
    return { t, v };
  }).filter(p => p.t && p.v != null).sort((a,b) => a.t < b.t ? -1 : 1);
}

// ── Pisteet kartalle ───────────────────────────────────────────
function addMarkers(latestData) {
  const tempMap = {};
  if (latestData) {
    (latestData.features||[]).forEach(f => {
      const p = f.properties||{};
      // ID voi olla featuressa suoraan tai measurement-objektissa
      const id = f.id || p.dev_id || p.sensor_id || p.id ||
                 (p.measurement && p.measurement.dev_id) ||
                 (p.measurement && p.measurement.sensor_id);
      // Lämpötila on measurement-objektin sisällä
      const m = p.measurement || {};
      const temp = m.water_temperature ?? m.temperature ?? p.water_temperature ?? p.temperature ?? null;
      const time = m.time || m.timestamp || p.time || p.timestamp || null;
      if (id) tempMap[id] = { temp, time };
      // Debug: näytä mitä löytyi
      console.log('Station:', p.name, '| id:', id, '| temp:', temp, '| measurement keys:', Object.keys(m));
    });
  }

  STATIONS.forEach(s => {
    const d = tempMap[s.id];
    const temp = d && d.temp != null ? d.temp.toFixed(1) : '?';
    const color = temp === '?' ? '#666' : tempColor(parseFloat(temp));

    const icon = L.divIcon({
      className: '',
      html: `<div style="
        width:44px;height:44px;border-radius:50%;
        background:${color}22;border:2px solid ${color};
        display:flex;align-items:center;justify-content:center;
        font-family:monospace;font-size:10px;font-weight:700;
        color:${color};cursor:pointer;
        box-shadow:0 0 10px ${color}66;
      ">${temp}°</div>`,
      iconSize: [44,44], iconAnchor: [22,22]
    });

    L.marker([s.lat, s.lng], { icon })
      .on('click', () => openStation(s, d))
      .addTo(map);
  });
}

function tempColor(t) {
  if (t < 5)  return '#4dd'; // kylmä syaani
  if (t < 15) return '#4af'; // sininen
  if (t < 20) return '#4f8'; // vihreä
  if (t < 25) return '#fa4'; // oranssi
  return '#f44';              // punainen
}

// ── Aseman paneeli ─────────────────────────────────────────────
async function openStation(station, data) {
  currentStation = station;
  document.getElementById('panel-name').textContent = '🏊 ' + station.name;
  const temp = data && data.temp != null ? data.temp.toFixed(1) + ' °C' : '— °C';
  document.getElementById('panel-temp').textContent = temp;
  const fmtT = t => { if(!t) return ''; const d=new Date(t); return d.toLocaleDateString('fi-FI')+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); };
  document.getElementById('panel-meta').textContent = 'Päivitetty: ' + fmtT(data&&data.time) + ' · ID: ' + station.id;
  document.getElementById('panel').classList.add('open');

  // Hae historia
  document.getElementById('chart-controls').innerHTML = 'Ladataan historiaa...';
  document.getElementById('chart-area').innerHTML = '';
  try {
    currentHistory = await loadHistory(station.id);
    renderControls();
    renderChart(currentPeriod, currentAvg);
  } catch(e) {
    document.getElementById('chart-controls').innerHTML = '<span style="color:#f66;font-size:11px">Historia ei saatavilla: ' + e.message + '</span>';
  }
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
}

// ── Kaavio ─────────────────────────────────────────────────────
function renderControls() {
  const pbtns = ['7d','30d','90d'].map(p =>
    `<button class="chip ${p===currentPeriod?'active':''}" onclick="setP('${p}')">${p==='7d'?'7 vrk':p==='30d'?'30 vrk':'90 vrk'}</button>`
  ).join('');
  const abtns = [1,6,12].map(w =>
    `<button class="chip ${w===currentAvg?'active':''}" onclick="setA(${w})">MA${w}</button>`
  ).join('');
  document.getElementById('chart-controls').innerHTML = pbtns + abtns;
}

function setP(p) { currentPeriod=p; renderControls(); renderChart(p,currentAvg); }
function setA(w) { currentAvg=w;   renderControls(); renderChart(currentPeriod,w); }

function renderChart(period, avgWin) {
  const svg = document.getElementById('chart-area');
  if (!currentHistory || !currentHistory.length) { svg.innerHTML=''; return; }
  const pMs = {'7d':7*864e5,'30d':30*864e5,'90d':90*864e5};
  const now = Date.now(), ms = pMs[period]||7*864e5;
  let pts = currentHistory.filter(p => new Date(p.t).getTime() >= now-ms);
  if (pts.length < 5) pts = currentHistory;

  const vs=pts.map(p=>p.v), ts=pts.map(p=>new Date(p.t).getTime());
  const minV=Math.min(...vs)-.5, maxV=Math.max(...vs)+.5;
  const minMs=ts[0], maxMs=ts[ts.length-1];
  const W=300,H=80,pad=4,lH=16,TH=H+lH;

  svg.setAttribute('viewBox',`0 0 ${W} ${TH}`);

  const xOf=m=>pad+(m-minMs)/(maxMs-minMs||1)*(W-pad*2);
  const yOf=v=>H-pad-(v-minV)/(maxV-minV||1)*(H-pad*2);

  // Liukuva keskiarvo
  const avg=pts.map((_,i)=>{
    const sl=pts.slice(Math.max(0,i-avgWin+1),i+1);
    return sl.reduce((s,x)=>s+x.v,0)/sl.length;
  });

  const rawPts=pts.map((p,i)=>xOf(ts[i]).toFixed(1)+','+yOf(p.v).toFixed(1)).join(' ');
  const avgPts=pts.map((_,i)=>xOf(ts[i]).toFixed(1)+','+yOf(avg[i]).toFixed(1)).join(' ');

  // Päivämäärämerkit
  let xlbls='';
  const stp=pts.length>400?7*864e5:864e5;
  let t0=new Date(minMs); t0.setHours(0,0,0,0);
  for(let t=t0.getTime();t<=maxMs;t+=stp){
    if(t<minMs)continue;
    const d=new Date(t);
    xlbls+=`<text x="${xOf(t).toFixed(1)}" y="${TH-1}" font-family="monospace" font-size="7" fill="rgba(255,255,255,.3)" text-anchor="middle">${d.getDate()}.${d.getMonth()+1}.</text>`;
  }

  // Lämpötila-akseli
  let ylbls='';
  for(let t=Math.ceil(minV);t<=Math.floor(maxV);t++){
    if(t<=minV||t>=maxV)continue;
    ylbls+=`<text x="${pad+1}" y="${yOf(t).toFixed(1)}" font-family="monospace" font-size="7" fill="rgba(0,200,255,.4)" dominant-baseline="middle">${t}°</text>`;
  }

  const nowX=xOf(Math.min(now,maxMs)).toFixed(1);
  const col = tempColor(avg[avg.length-1]||vs[vs.length-1]);

  svg.innerHTML=
    `<polyline points="${rawPts}" fill="none" stroke="rgba(0,180,255,.2)" stroke-width="1" stroke-linejoin="round"/>`
    +`<polyline points="${avgPts}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`
    +`<line x1="${nowX}" y1="${pad}" x2="${nowX}" y2="${H}" stroke="rgba(255,255,255,.4)" stroke-width="1" stroke-dasharray="2,2"/>`
    +ylbls+xlbls;
}

// ── Status ─────────────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ── Käynnistys ─────────────────────────────────────────────────
(async () => {
  const data = await loadLatest();
  addMarkers(data);
})();
</script>

</body>
</html>
