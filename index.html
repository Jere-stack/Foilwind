<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy Debug</title>
<style>
body{font-family:monospace;background:#111;color:#0cf;padding:16px;font-size:12px}
button{display:block;width:100%;padding:14px;margin:8px 0;background:#0cf2;border:1px solid #0cf;color:#0cf;border-radius:10px;font-size:14px;cursor:pointer}
#out{background:#0002;padding:12px;border-radius:8px;margin-top:12px;white-space:pre-wrap;word-break:break-all;color:#aef}
</style>
</head>
<body>
<h3 style="color:#fff;margin:0 0 8px">Proxy Debug</h3>
<button onclick="test()">Testaa proxy</button>
<div id="out">Paina nappia...</div>
<script>
async function test(){
  const out=document.getElementById('out');
  out.textContent='Haetaan...\n';
  const url='https://foilwind.vercel.app/api/uiras?id=70B3D57050001AB9';
  out.textContent+='URL: '+url+'\n\n';
  try{
    const r=await fetch(url);
    out.textContent+='HTTP Status: '+r.status+'\n';
    out.textContent+='Content-Type: '+r.headers.get('content-type')+'\n\n';
    const txt=await r.text();
    out.textContent+='Response (500 merkkiä):\n'+txt.slice(0,500);
  }catch(e){
    out.textContent+='VIRHE: '+e.message;
  }
}
</script>
</body>
</html>
