<!DOCTYPE html>

<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FoilSpot">
<meta name="theme-color" content="#060912">
<meta name="description" content="Wingfoil-sääsovellus Suomen parhaille spoteille">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23060912' width='100' height='100' rx='20'/><text y='68' x='50' text-anchor='middle' font-size='50'>🪁</text></svg>">
<title>FoilSpot</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin></script>
<style>
/* ============================================================
   CSS VARIABLES & RESET
   ============================================================ */
:root {
  --bg:     #060912;
  --panel:  rgba(6,9,18,0.88);
  --border: rgba(255,255,255,0.09);
  --accent: #00cfff;
  --accent-glow: rgba(0,207,255,0.15);
  --text:   #ddeeff;
  --muted:  rgba(180,215,255,0.45);
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
}
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}
html {
  height: -webkit-fill-available; background: var(--bg);
  overscroll-behavior: none;
}
body {
  width: 100%; height: 100%; min-height: -webkit-fill-available;
  background: var(--bg); color: var(--text);
  font-family: 'Syne', sans-serif;
  overflow: hidden; position: fixed; inset: 0;
  -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
  overscroll-behavior: none;
  touch-action: none;
}
#app { position: absolute; inset: 0; }

/* ============================================================
MAP  z:1
============================================================ */
#map { position: absolute; inset: 0; z-index: 1; background: var(–bg); }
.leaflet-container { background: var(–bg) !important; -webkit-transform: translateZ(0); transform: translateZ(0); }
.leaflet-tile-pane { -webkit-filter: brightness(2.0) contrast(1.05) saturate(1.15); filter: brightness(2.0) contrast(1.05) saturate(1.15); }
.leaflet-control-zoom { display: none !important; }
.leaflet-control-attribution { background: rgba(6,9,18,.75) !important; color: rgba(255,255,255,.18) !important; font-size: 8px !important; }
.leaflet-control-attribution a { color: rgba(255,255,255,.22) !important; }
.leaflet-popup { display: none !important; }

/* ============================================================
WIND CANVASES  z:2-3
============================================================ */
#c-wind {
position: absolute; top: 0; left: 0;
pointer-events: none;
-webkit-transform: translate3d(0,0,0); transform: translate3d(0,0,0);
will-change: contents;
-webkit-backface-visibility: hidden; backface-visibility: hidden;
}

#c-wind  { z-index: 3; transition: opacity 0.15s; }
.heatmap-overlay {
opacity: 0.88;
filter: blur(14px); -webkit-filter: blur(14px);
image-rendering: auto;
transition: filter 0.3s, -webkit-filter 0.3s;
}

/* ============================================================
TOPBAR  z:20
============================================================ */
#topbar {
position: absolute; top: 0; left: 0; right: 0; z-index: 20;
padding: calc(var(–sat) + 10px) calc(var(–sar) + 16px) 48px calc(var(–sal) + 16px);
background: linear-gradient(to bottom, rgba(6,9,18,.96) 0%, transparent 100%);
display: flex; align-items: flex-end; justify-content: space-between;
pointer-events: none;
}
/* Wind readout — centered top, minimal text */
#crosshair-readout {
position: fixed; top: calc(var(–sat) + 12px); left: 50%; z-index: 22;
transform: translateX(-50%);
pointer-events: none;
text-align: center;
transition: opacity 0.3s;
}
#crosshair-readout.hidden { opacity: 0; }

.cr-speed {
font-family: ‘DM Mono’, monospace;
font-size: 28px; font-weight: 500;
line-height: 1; letter-spacing: -0.5px;
text-shadow: 0 1px 6px rgba(0,0,0,0.7), 0 0 20px rgba(0,0,0,0.4);
display: flex; align-items: baseline; justify-content: center; gap: 3px;
}
.cr-speed-unit {
font-size: 11px; font-weight: 400;
color: var(–muted); letter-spacing: 0.5px;
}
.cr-details {
display: flex; gap: 6px; justify-content: center; margin-top: 3px;
font-family: ‘DM Mono’, monospace; font-size: 10px;
color: var(–muted); letter-spacing: 0.3px;
text-shadow: 0 1px 4px rgba(0,0,0,0.6);
align-items: center;
}
.cr-dir-arrow {
font-size: 13px; line-height: 1;
}
.cr-gust {
font-size: 10px; margin-top: 2px;
font-family: ‘DM Mono’, monospace;
color: var(–muted); letter-spacing: 0.3px;
text-shadow: 0 1px 4px rgba(0,0,0,0.6);
text-align: center;
}

#timebox { pointer-events: none; display: flex; align-items: flex-end; margin-left: auto; }
.topbar-scale { display: flex; align-items: center; gap: 4px; pointer-events: none; }
.topbar-scale-bar { width: 8px; height: 110px; border-radius: 4px; }
.topbar-scale-ticks { display: flex; flex-direction: column; justify-content: space-between; height: 110px; }
.topbar-scale-ticks .ws-tick { font-family: ‘DM Mono’, monospace; font-size: 8px; line-height: 1; text-align: right; }

/* ============================================================
MAP CONTROLS — bottom bar row
============================================================ */
#bottom-bar {
display: flex; align-items: center; gap: 6px; margin-bottom: 6px; pointer-events: all;
}
.mctl {
width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(–border);
background: var(–panel); -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
color: var(–text); display: flex; align-items: center; justify-content: center;
cursor: pointer; font-size: 18px; line-height: 1; flex-shrink: 0;
-webkit-user-select: none; user-select: none; touch-action: manipulation;
transition: background .12s, transform .1s, border-color .12s;
-webkit-transform: translate3d(0,0,0); transform: translate3d(0,0,0);
}
.mctl:active { background: rgba(0,207,255,.22); transform: scale(0.92); }
.mctl.playing { border-color: var(–accent); color: var(–accent); background: rgba(0,207,255,.12); }
#bottom-bar-spacer { flex: 1; }

/* ============================================================
SETTINGS — Apple Liquid Glass popover
============================================================ */
#settings-popup {
position: fixed; z-index: 30;
background: rgba(255,255,255,.08);
border: 1px solid rgba(255,255,255,.15);
border-radius: 16px;
-webkit-backdrop-filter: blur(24px) saturate(1.4);
backdrop-filter: blur(24px) saturate(1.4);
padding: 14px 16px;
box-shadow:
0 0 0 0.5px rgba(255,255,255,.06) inset,
0 12px 40px rgba(0,0,0,.45),
0 2px 8px rgba(0,0,0,.2);
transform: translateY(8px) scale(0.95);
opacity: 0; pointer-events: none;
transition: transform .25s cubic-bezier(.2,.9,.3,1.2), opacity .2s ease;
transform-origin: bottom left;
}
#settings-popup.open {
transform: translateY(0) scale(1);
opacity: 1; pointer-events: all;
}
.sp-section { margin-bottom: 12px; }
.sp-section:last-child { margin-bottom: 0; }
.sp-label {
font-family: ‘DM Mono’, monospace; font-size: 9px; font-weight: 500;
color: rgba(255,255,255,.4); letter-spacing: 1.2px; text-transform: uppercase;
margin-bottom: 8px;
}
.sp-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.sp-chip {
height: 32px; border-radius: 16px; padding: 0 12px;
border: 1px solid rgba(255,255,255,.1);
background: rgba(255,255,255,.04);
color: rgba(255,255,255,.6);
font-family: ‘DM Mono’, monospace; font-size: 10px; font-weight: 500;
display: flex; align-items: center; gap: 4px; cursor: pointer;
transition: all .15s ease;
-webkit-user-select: none; user-select: none;
}
.sp-chip:active { transform: scale(0.95); }
.sp-chip.active {
background: rgba(0,207,255,.15);
border-color: rgba(0,207,255,.4);
color: var(–accent);
}
.sp-chip .l-icon { font-size: 11px; }

/* ============================================================
SCALE BAR  z:20
============================================================ */
/* ============================================================
WEATHER WIDGET — replaces scale bar, shows conditions at crosshair
============================================================ */
#wx-widget {
position: absolute; bottom: calc(var(–sab) + 194px); left: calc(var(–sal) + 14px); z-index: 20;
pointer-events: none; display: flex; align-items: center; gap: 8px;
background: rgba(6,9,18,.65);
border: 1px solid var(–border);
-webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
border-radius: 12px; padding: 6px 10px;
transition: opacity 0.3s;
}
#wx-widget.hidden { opacity: 0; }
#wx-icon { font-size: 22px; line-height: 1; }
#wx-temp {
font-family: ‘DM Mono’, monospace; font-size: 16px; font-weight: 500;
color: var(–text); line-height: 1;
}
#wx-desc {
font-family: ‘DM Mono’, monospace; font-size: 9px;
color: var(–muted); line-height: 1.2; max-width: 80px;
}

/* ============================================================
BOTTOM PANEL  z:20
============================================================ */
#bottom {
position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
padding: 0 calc(var(–sar) + 12px) calc(var(–sab) + 12px) calc(var(–sal) + 12px);
background: linear-gradient(to top, rgba(6,9,18,.98) 0%, rgba(6,9,18,.80) 55%, transparent 100%);
pointer-events: none;
}
#layers { display: flex; gap: 5px; pointer-events: all; }

#tl-wrap {
position: relative; pointer-events: all; height: 72px;
overflow: visible; padding-top: 28px;
}
#tl-scroll {
display: flex; gap: 0; overflow-x: auto; overflow-y: hidden;
-webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 0;
-webkit-mask-image: linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%);
mask-image: linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%);
overscroll-behavior-x: contain; height: 100%;
touch-action: pan-x; align-items: flex-end;
}
#tl-scroll::-webkit-scrollbar { display: none; }

.htick {
flex: 0 0 24px; display: flex; flex-direction: column; align-items: center;
justify-content: flex-end; height: 100%;
-webkit-user-select: none; user-select: none; cursor: pointer;
position: relative; padding-bottom: 14px;
}
.htick-bar {
width: 14px; border-radius: 4px 4px 0 0; min-height: 3px;
transition: opacity 0.15s;
}
.htick:active .htick-bar { opacity: 0.7; }
.htick-lbl {
position: absolute; bottom: 0; font-family: ‘DM Mono’, monospace;
font-size: 7px; color: var(–muted); white-space: nowrap;
pointer-events: none; opacity: 0.55;
}
/* Every 3rd hour: slightly brighter */
.htick.show-lbl .htick-lbl { opacity: 0.85; font-weight: 500; }

#tl-indicator {
position: absolute; top: 0; left: 50%; width: 3px; height: 100%;
transform: translateX(-50%); pointer-events: none; z-index: 2;
background: var(–accent);
box-shadow: 0 0 10px rgba(0,207,255,0.6), 0 0 4px rgba(0,207,255,0.3);
border-radius: 1.5px;
}
#tl-time-bubble {
position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
margin-bottom: 4px;
background: rgba(0,207,255,.9);
color: #fff; font-family: ‘DM Mono’, monospace; font-size: 11px; font-weight: 700;
padding: 3px 8px; border-radius: 8px; white-space: nowrap;
box-shadow: 0 2px 8px rgba(0,207,255,.3);
letter-spacing: 0.3px; text-align: center; line-height: 1.3;
}
#tl-time-bubble::after {
content: ‘’; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
border: 4px solid transparent; border-top-color: var(–accent);
}
.tl-now-marker {
flex: 0 0 2px; height: 100%; background: rgba(255,255,255,.7);
position: relative; z-index: 1;
box-shadow: 0 0 6px rgba(255,255,255,.3);
}
.tl-now-label {
position: absolute; bottom: 1px; left: 50%; transform: translateX(-50%);
font-family: ‘DM Mono’, monospace; font-size: 7px; font-weight: 600;
color: rgba(255,255,255,.8); white-space: nowrap; letter-spacing: 0.5px;
}
.htick.past .htick-bar { opacity: 0.45; }

.day-sep {
flex: 0 0 40px; display: flex; align-items: flex-end; justify-content: center;
height: 100%; padding-bottom: 14px;
font-family: ‘DM Mono’, monospace; font-size: 9px; font-weight: 500;
color: var(–accent); letter-spacing: 0.3px; white-space: nowrap;
border-left: 1px solid rgba(0,207,255,.25);
opacity: 0.7;
}

.htick-bar.foilable { box-shadow: 0 0 6px rgba(80,237,120,0.5); }
.gi-steady  { color: rgb(80,237,120); }
.gi-gusty   { color: rgb(240,220,0); }
.gi-extreme { color: rgb(255,90,90); }
.spot-trend { font-size: 8px; color: var(–muted); margin-top: 1px; text-align: center; }
.sh-card-small { font-size: 16px; }
.sh-windrose { display: flex; justify-content: center; margin: 16px 0 8px; }
.sh-windrose svg { filter: drop-shadow(0 0 8px rgba(0,207,255,.1)); }

/* ── WINGFOIL SCORE BADGES ───────────────────────────────────── */
.wf-score-ring {
display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
width: 62px; height: 62px; border-radius: 50%;
border: 2.5px solid currentColor;
font-family: ‘DM Mono’, monospace; line-height: 1;
flex-shrink: 0;
}
.wf-score-num { font-size: 22px; font-weight: 700; }
.wf-score-lbl { font-size: 7px; letter-spacing: 0.5px; opacity: 0.75; margin-top: 1px; }
.wf-perfect { color: rgb(255, 200, 30); }
.wf-good    { color: rgb(80, 237, 120); }
.wf-ok      { color: rgb(240, 170, 0); }
.wf-light   { color: rgb(80, 160, 255); }
.wf-pass    { color: rgba(180,215,255,0.35); }

/* Sheet score hero */
.sh-score-hero {
display: flex; align-items: center; gap: 14px;
padding: 12px 16px; margin-bottom: 16px;
background: rgba(255,255,255,.03);
border: 1px solid var(–border); border-radius: 14px;
}
.sh-score-text { flex: 1; }
.sh-score-title { font-family: ‘DM Mono’, monospace; font-size: 9px; color: var(–muted); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 4px; }
.sh-score-verdict { font-size: 18px; font-weight: 800; letter-spacing: -.3px; }
.sh-score-reason { font-family: ‘DM Mono’, monospace; font-size: 10px; color: var(–muted); margin-top: 3px; line-height: 1.4; }

/* Spot list score pill */
.sl-score {
font-family: ‘DM Mono’, monospace; font-size: 13px; font-weight: 700;
min-width: 36px; text-align: right; flex-shrink: 0; line-height: 1;
}
.sl-score-sub {
font-family: ‘DM Mono’, monospace; font-size: 8px;
color: var(–muted); text-align: right; margin-top: 2px; letter-spacing: .3px;
}

/* ============================================================
WEEKLY FORECAST PANEL  z:30
============================================================ */
#forecast-panel {
position: absolute; bottom: 0; left: 0; right: 0; z-index: 30;
background: rgba(10,14,26,.97);
border-top: 1px solid rgba(0,207,255,.2);
border-radius: 20px 20px 0 0;
-webkit-backdrop-filter: blur(24px); backdrop-filter: blur(24px);
box-shadow: 0 -8px 40px rgba(0,0,0,.6);
-webkit-transform: translate3d(0,100%,0); transform: translate3d(0,100%,0);
transition: transform .35s cubic-bezier(.32,.72,.24,1);
max-height: 75vh;
overflow-y: auto; -webkit-overflow-scrolling: touch;
overscroll-behavior: contain;
padding-bottom: calc(var(–sab) + 16px);
}
#forecast-panel.open { -webkit-transform: translate3d(0,0,0); transform: translate3d(0,0,0); }
#forecast-handle {
display: flex; justify-content: center; padding: 10px 0 6px;
position: sticky; top: 0; background: rgba(10,14,26,.97); z-index: 1;
}
#forecast-handle::after {
content: ‘’; width: 36px; height: 4px; border-radius: 2px;
background: rgba(255,255,255,.2);
}
.fc-header {
padding: 4px 20px 14px; display: flex; justify-content: space-between; align-items: center;
position: sticky; top: 26px; background: rgba(10,14,26,.97); z-index: 1;
border-bottom: 1px solid var(–border);
}
.fc-title { font-size: 16px; font-weight: 800; letter-spacing: -.2px; }
.fc-subtitle { font-family: ‘DM Mono’, monospace; font-size: 9px; color: var(–muted); }

/* Day row */
.fc-day {
border-bottom: 1px solid var(–border);
}
.fc-day-header {
padding: 10px 20px 6px;
display: flex; align-items: center; gap: 8px;
}
.fc-day-name {
font-family: ‘DM Mono’, monospace; font-size: 10px; font-weight: 700;
color: var(–accent); letter-spacing: 1px; text-transform: uppercase;
}
.fc-day-date {
font-family: ‘DM Mono’, monospace; font-size: 9px; color: var(–muted);
}
.fc-no-windows {
padding: 6px 20px 12px;
font-family: ‘DM Mono’, monospace; font-size: 10px; color: var(–muted);
letter-spacing: .3px;
}

/* Window card */
.fc-window {
display: flex; align-items: center; gap: 12px;
padding: 10px 20px 10px 28px;
cursor: pointer; transition: background .12s;
border-top: 1px solid rgba(255,255,255,.04);
}
.fc-window:active { background: rgba(0,207,255,.08); }
.fc-score-ring {
width: 48px; height: 48px; border-radius: 50%;
border: 2px solid currentColor;
display: flex; flex-direction: column; align-items: center; justify-content: center;
font-family: ‘DM Mono’, monospace; line-height: 1; flex-shrink: 0;
}
.fc-score-num { font-size: 17px; font-weight: 700; }
.fc-score-sub { font-size: 6px; opacity: .65; margin-top: 1px; }
.fc-info { flex: 1; min-width: 0; }
.fc-spot-name { font-size: 14px; font-weight: 800; letter-spacing: -.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fc-time-range {
font-family: ‘DM Mono’, monospace; font-size: 10px; color: var(–accent);
margin-top: 2px; font-weight: 600;
}
.fc-wind-info {
font-family: ‘DM Mono’, monospace; font-size: 9px; color: var(–muted);
margin-top: 2px;
}
.fc-right { text-align: right; flex-shrink: 0; }
.fc-wx-icon { font-size: 24px; line-height: 1; }
.fc-verdict { font-family: ‘DM Mono’, monospace; font-size: 8px; margin-top: 3px; font-weight: 600; letter-spacing: .3px; }
.loc-dot-outer {
width: 22px; height: 22px; border-radius: 50%;
background: rgba(0,122,255,.15);
display: flex; align-items: center; justify-content: center;
position: relative;
}
.loc-dot-inner {
width: 12px; height: 12px; border-radius: 50%;
background: #007AFF;
border: 2.5px solid #fff;
box-shadow: 0 0 8px rgba(0,122,255,.5);
}
.loc-dot-pulse {
position: absolute; inset: -8px; border-radius: 50%;
background: rgba(0,122,255,.12);
animation: loc-pulse 2.5s ease-out infinite;
}
@keyframes loc-pulse {
0% { transform: scale(0.6); opacity: 1; }
100% { transform: scale(2.2); opacity: 0; }
}

/* ============================================================
SPOT LIST — Ranked spots panel
============================================================ */
#spot-list-btn {
font-size: 15px; letter-spacing: -0.5px;
}
#spot-list {
position: absolute; bottom: 0; left: 0; right: 0; z-index: 30;
background: rgba(10,14,26,.97);
border-top: 1px solid rgba(0,207,255,.2);
border-radius: 20px 20px 0 0;
-webkit-backdrop-filter: blur(24px); backdrop-filter: blur(24px);
box-shadow: 0 -8px 40px rgba(0,0,0,.6);
-webkit-transform: translate3d(0,100%,0); transform: translate3d(0,100%,0);
transition: transform .35s cubic-bezier(.32,.72,.24,1);
max-height: 65vh;
overflow-y: auto; -webkit-overflow-scrolling: touch;
overscroll-behavior: contain;
padding-bottom: calc(var(–sab) + 16px);
}
#spot-list.open { -webkit-transform: translate3d(0,0,0); transform: translate3d(0,0,0); }
#spot-list-handle {
display: flex; justify-content: center; padding: 10px 0 6px;
position: sticky; top: 0; background: rgba(10,14,26,.97); z-index: 1;
}
#spot-list-handle::after {
content: ‘’; width: 36px; height: 4px; border-radius: 2px;
background: rgba(255,255,255,.2);
}
.sl-header {
padding: 4px 20px 12px; display: flex; justify-content: space-between; align-items: center;
}
.sl-title { font-size: 16px; font-weight: 800; letter-spacing: -.2px; }
.sl-count { font-family: ‘DM Mono’, monospace; font-size: 10px; color: var(–muted); }
.sl-item {
display: flex; align-items: center; gap: 12px;
padding: 10px 20px; border-bottom: 1px solid var(–border);
cursor: pointer; transition: background .12s;
}
.sl-item:active { background: rgba(0,207,255,.08); }
.sl-rank {
font-family: ‘DM Mono’, monospace; font-size: 11px; font-weight: 700;
color: var(–muted); width: 20px; text-align: center; flex-shrink: 0;
}
.sl-dot {
width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
border: 1.5px solid rgba(255,255,255,.4);
}
.sl-info { flex: 1; min-width: 0; }
.sl-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sl-desc { font-family: ‘DM Mono’, monospace; font-size: 9px; color: var(–muted); margin-top: 1px; }
.sl-wind {
text-align: right; flex-shrink: 0;
}
.sl-wind-val {
font-family: ‘DM Mono’, monospace; font-size: 18px; font-weight: 500;
line-height: 1;
}
.sl-wind-sub {
font-family: ‘DM Mono’, monospace; font-size: 9px; color: var(–muted);
margin-top: 2px;
}
.sl-badge-foilable {
display: inline-block; font-family: ‘DM Mono’, monospace; font-size: 8px;
background: rgba(80,237,120,.15); color: rgb(80,237,120);
border: 1px solid rgba(80,237,120,.3); border-radius: 4px;

/* ============================================================

============================================================ */

transition: opacity 0.3s;
}

.ch-ring {
width: 44px; height: 44px; border-radius: 50%;
border: 1.5px solid rgba(255,255,255,0.45);
position: relative;
box-shadow: 0 0 12px rgba(0,0,0,0.5), inset 0 0 8px rgba(0,0,0,0.15);
}
.ch-dot {
position: absolute; top: 50%; left: 50%;
width: 5px; height: 5px; border-radius: 50%;
background: #fff;
transform: translate(-50%, -50%);
box-shadow: 0 0 6px rgba(255,255,255,0.6);
}
.ch-tick {
position: absolute; background: rgba(255,255,255,0.4);
border-radius: 1px;
}
.ch-tick-n { width: 1.5px; height: 10px; top: -14px; left: 50%; transform: translateX(-50%); }
.ch-tick-s { width: 1.5px; height: 10px; bottom: -14px; left: 50%; transform: translateX(-50%); }
.ch-tick-e { width: 10px; height: 1.5px; right: -14px; top: 50%; transform: translateY(-50%); }
.ch-tick-w { width: 10px; height: 1.5px; left: -14px; top: 50%; transform: translateY(-50%); }
/* Wind direction indicator on crosshair ring */
.ch-wind-arrow {
position: absolute; top: 50%; left: 50%;
width: 44px; height: 44px;
margin-top: -22px; margin-left: -22px;
transition: transform 0.4s cubic-bezier(.2,.8,.3,1);
pointer-events: none;
}
.ch-wind-arrow::after {
content: ‘’;
position: absolute; top: -4px; left: 50%; transform: translateX(-50%);
width: 0; height: 0;
border-left: 4px solid transparent;
border-right: 4px solid transparent;
border-bottom: 7px solid var(–accent);
filter: drop-shadow(0 0 4px rgba(0,207,255,0.5));
}

/* ============================================================
BOTTOM SHEET  z:30
============================================================ */
#sheet-overlay {
position: absolute; inset: 0; z-index: 29;
background: rgba(0,0,0,0); pointer-events: none;
transition: background .35s;
}
#sheet-overlay.open { background: rgba(0,0,0,.4); pointer-events: all; }

#sheet {
position: absolute; bottom: 0; left: 0; right: 0; z-index: 30;
background: rgba(10,14,26,.97);
border-top: 1px solid rgba(0,207,255,.2);
border-radius: 20px 20px 0 0;
-webkit-backdrop-filter: blur(24px); backdrop-filter: blur(24px);
box-shadow: 0 -8px 40px rgba(0,0,0,.6);
-webkit-transform: translate3d(0,100%,0); transform: translate3d(0,100%,0);
transition: transform .35s cubic-bezier(.32,.72,.24,1);

overflow-y: auto; -webkit-overflow-scrolling: touch;
overscroll-behavior: contain;
padding-bottom: calc(var(–sab) + 16px);
}
#sheet.open { -webkit-transform: translate3d(0,0,0); transform: translate3d(0,0,0); }

display: flex; justify-content: center; padding: 10px 0 6px;
position: sticky; top: 0; background: rgba(10,14,26,.97); z-index: 1;
}
#sheet-handle::after {
content: ‘’; width: 36px; height: 4px; border-radius: 2px;
background: rgba(255,255,255,.2);
}
#sheet-content { padding: 4px 20px 16px; }

<script>
'use strict';

/* ╔══════════════════════════════════════════════════════════════╗
   ║  FoilSpot v5 — Global Wind Heatmap + Particles + Wingfoil     ║
   ║  Viewport-based adaptive grid, screen-space trail particles  ║
   ╚══════════════════════════════════════════════════════════════╝ */

const Config = {
  MAX_MS: 20,
  INERTIA: 0.78,
  GEO_SPEED: 0.003,
  WIND_SAMPLE_INTERVAL: 2,
  FADE_OPACITY: 0.94,
  DROP_RATE: 0.003,
  DROP_RATE_BUMP: 0.008,
  DATA_REFRESH_MS: 60 * 60 * 1000,
  PLAY_INTERVAL_MS: 800,
};

/* ── UNITS — Wind speed unit conversion ───────────────────────── */
const Units = {
  _active: 'ms',
  _defs: {
    ms:  { label: 'm/s',  factor: 1,      decimals: 1 },
    kmh: { label: 'km/h', factor: 3.6,    decimals: 0 },
    kts: { label: 'kts',  factor: 1.9438, decimals: 1 },
    bft: { label: 'bft',  factor: 0,      decimals: 0 } /* special */
  },
  _bft: [0.3,1.6,3.4,5.5,8.0,10.8,13.9,17.2,20.8,24.5,28.5,32.7],
  init() {
    try { const s = localStorage.getItem('fs_unit'); if (s && this._defs[s]) this._active = s; } catch(e) {}
    /* Activate chip */
    document.querySelectorAll('#units .sp-chip').forEach(c => {
      c.classList.toggle('active', c.dataset.unit === this._active);
    });
  },
  set(unit) {
    if (!this._defs[unit]) return;
    this._active = unit;
    try { localStorage.setItem('fs_unit', unit); } catch(e) {}
    document.querySelectorAll('#units .sp-chip').forEach(c => {
      c.classList.toggle('active', c.dataset.unit === unit);
    });
  },
  get() { return this._active; },
  label() { return this._defs[this._active].label; },
  /** Convert m/s to active unit */
  convert(ms) {
    if (this._active === 'bft') {
      for (let i = 0; i < this._bft.length; i++) { if (ms < this._bft[i]) return i; }
      return 12;
    }
    return ms * this._defs[this._active].factor;
  },
  /** Format m/s value in active unit */
  fmt(ms) {
    const v = this.convert(ms);
    const dec = this._defs[this._active].decimals;
    return v.toFixed(dec);
  },
  /** Format with unit label */
  fmtUnit(ms) { return this.fmt(ms) + ' ' + this.label(); }
};

/* ── COLOUR RAMP — LUT-cached for render loop performance ───── */
const ColorRamp = (() => {
  const RAMP = [
    { t: 0.00, r: 20,  g: 40,  b: 80  },
    { t: 0.05, r: 30,  g: 70,  b: 140 },
    { t: 0.12, r: 0,   g: 120, b: 255 },
    { t: 0.22, r: 0,   g: 200, b: 255 },
    { t: 0.34, r: 0,   g: 245, b: 175 },
    { t: 0.46, r: 30,  g: 245, b: 70  },
    { t: 0.56, r: 170, g: 245, b: 5   },
    { t: 0.64, r: 255, g: 220, b: 0   },
    { t: 0.72, r: 255, g: 120, b: 0   },
    { t: 0.75, r: 255, g: 40,  b: 0   },
    { t: 0.85, r: 220, g: 0,   b: 20  },
    { t: 0.93, r: 180, g: 0,   b: 100 },
    { t: 1.00, r: 130, g: 0,   b: 180 }
  ];
  function msToT(ms) { return Math.pow(Math.min(1, Math.max(0, ms / Config.MAX_MS)), 0.55); }
  function interpolate(ramp, t) {
    for (let i = 1; i < ramp.length; i++) {
      if (t <= ramp[i].t) {
        const a = ramp[i - 1], b = ramp[i], f = (t - a.t) / (b.t - a.t);
        return { r: Math.round(a.r + f * (b.r - a.r)), g: Math.round(a.g + f * (b.g - a.g)), b: Math.round(a.b + f * (b.b - a.b)) };
      }
    }
    const last = ramp[ramp.length - 1];
    return { r: last.r, g: last.g, b: last.b };
  }
  /* Pre-build LUT: 201 entries (0.0 - 20.0 m/s in 0.1 steps) */
  const LUT_SIZE = 201;
  const _rgbLUT = new Array(LUT_SIZE);
  const _cssLUT = new Array(LUT_SIZE); /* opaque css strings */
  for (let i = 0; i < LUT_SIZE; i++) {
    const ms = i * 0.1;
    const c = interpolate(RAMP, msToT(ms));
    _rgbLUT[i] = c;
    _cssLUT[i] = 'rgb(' + c.r + ',' + c.g + ',' + c.b + ')';
  }
  /* Pre-build alpha LUT: 10 alpha levels (0.1 - 1.0) × 201 speeds */
  const ALPHA_STEPS = 10;
  const _cssAlphaLUT = new Array(ALPHA_STEPS);
  for (let a = 0; a < ALPHA_STEPS; a++) {
    _cssAlphaLUT[a] = new Array(LUT_SIZE);
    const alpha = (a + 1) / ALPHA_STEPS;
    for (let i = 0; i < LUT_SIZE; i++) {
      const c = _rgbLUT[i];
      _cssAlphaLUT[a][i] = 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + alpha.toFixed(2) + ')';
    }
  }
  function _lutIdx(ms) { return Math.min(LUT_SIZE - 1, Math.max(0, Math.round(ms * 10))); }
  function rgb(ms) { return _rgbLUT[_lutIdx(ms)]; }
  function css(ms, alpha) {
    const idx = _lutIdx(ms);
    if (alpha === undefined || alpha >= 0.99) return _cssLUT[idx];
    /* Snap alpha to nearest 0.1 for LUT hit */
    const ai = Math.min(ALPHA_STEPS - 1, Math.max(0, Math.round(alpha * ALPHA_STEPS) - 1));
    return _cssAlphaLUT[ai][idx];
  }
  return { rgb, css, msToT };
})();

/* ── WINGFOIL SCORE ENGINE ───────────────────────────────────── */
/* Score 0–100 based on:
   - Wind speed (60%): optimum 6–18 m/s, bell curve peaking at 10–14
   - Gust ratio (10%): lower gust/wind ratio = steadier = better
   - Wind direction (30%): spot-specific good direction windows */
const WingfoilScore = {
  /* Score wind speed component: 0–1 */
  _speedScore(ms) {
    if (ms < 2)  return ms / 2 * 0.03;                   // 0–2 m/s: lähes nolla
    if (ms < 5)  return 0.03 + (ms - 2) / 3 * 0.42;      // 2–5: ramping → 0.45 (ajettava raja)
    if (ms < 6)  return 0.45 + (ms - 5) * 0.22;          // 5–6: nopea nousu ajettavasta hyvään
    if (ms <= 14) return 0.67 + (ms - 6) / 8 * 0.33;     // 6–14: prime zone → 1.0
    if (ms <= 18) return 1.0 - (ms - 14) / 4 * 0.25;     // 14–18: lievä lasku
    if (ms <= 22) return 0.75 - (ms - 18) / 4 * 0.45;    // 18–22: riskialtista
    return Math.max(0, 0.30 - (ms - 22) / 4 * 0.30);     // 22+: liian kovaa
  },

  /* Score gust component: 0–1. Ratio close to 1.0 = steady = good */
  _gustScore(ms, gst) {
    if (ms < 1) return 0.5;
    const ratio = gst / ms;
    if (ratio <= 1.15) return 1.0;
    if (ratio <= 1.35) return 1.0 - (ratio - 1.15) / 0.20 * 0.4;
    if (ratio <= 1.60) return 0.60 - (ratio - 1.35) / 0.25 * 0.4;
    return Math.max(0, 0.20 - (ratio - 1.60) / 0.4 * 0.2);
  },

  /* Score direction component: 0–1 based on spot goodDirs windows */
  _dirScore(dir, goodDirs) {
    if (!goodDirs || !goodDirs.length) return 0.5; // no preference
    let best = 0;
    for (const [center, half] of goodDirs) {
      let diff = Math.abs(((dir - center + 540) % 360) - 180); // circular distance
      const score = diff <= half ? 1.0 - (diff / half) * 0.3 : // inside window: 0.7–1.0
                    diff <= half + 30 ? (1 - (diff - half) / 30) * 0.35 : // soft edge: 0–0.35
                    0;
      if (score > best) best = score;
    }
    return best;
  },

  compute(ms, gst, dir, spot) {
    const sp = this._speedScore(ms);
    const gp = this._gustScore(ms, gst);
    const dp = this._dirScore(dir, spot.goodDirs);
    const raw = sp * 0.60 + gp * 0.10 + dp * 0.30;
    return Math.round(raw * 100);
  },

  label(score) {
    if (score >= 85) return { text: 'PERFECT 🔥', cls: 'wf-perfect', short: '🔥' };
    if (score >= 65) return { text: 'HYVÄ',       cls: 'wf-good',    short: '✓' };
    if (score >= 45) return { text: 'AJETTAVA',   cls: 'wf-ok',      short: '~' };
    if (score >= 25) return { text: 'HEIKKO',     cls: 'wf-light',   short: '↓' };
    return                    { text: 'EI SOI',    cls: 'wf-pass',    short: '✕' };
  }
};

/* ── VIEWPORT GRID ────────────────────────────────────────────── */
const ViewportGrid = {
  _points: new Map(),
  _globalBase: new Map(),
  TILE_DEG: 10,
  CACHE_TTL: 90 * 60 * 1000,

  gridStep(zoom) {
    if (zoom <= 3) return 4;
    if (zoom <= 5) return 2;
    if (zoom <= 7) return 0.8;
    if (zoom <= 9) return 0.35;
    return 0.15;
  },

  _tileKey(lat, lng) {
    const d = this.TILE_DEG;
    return 'fg_' + State.activeModel + '_' + (Math.floor(lat/d)*d) + '_' + (Math.floor(lng/d)*d);
  },

  _ptKey(lat, lng) { return lat.toFixed(2) + ',' + lng.toFixed(2); },

  async loadGlobalCoarse(onProgress) {
    const step = 15;
    const pts = [];
    for (let lat = -55; lat <= 70; lat += step) {
      for (let lng = -180; lng <= 175; lng += step) {
        const pk = this._ptKey(lat, lng);
        if (!this._globalBase.has(pk)) {
          pts.push({ lat, lng });
        }
      }
    }
    if (!pts.length) { if (onProgress) onProgress(1, 1); return; }
    const cacheKey = 'fg_global_' + State.activeModel;
    try {
      const raw = localStorage.getItem(cacheKey);
      if (raw) {
        const data = JSON.parse(raw);
        if (Date.now() - data.ts < this.CACHE_TTL * 2) {
          let restored = 0;
          for (const [pk, wx] of Object.entries(data.pts)) {
            const [la, lo] = pk.split(',').map(Number);
            const p = { lat: la, lng: lo, wx };
            this._globalBase.set(pk, p);
            restored++;
          }
          if (restored > 20) {
            console.log('[Global] Restored', restored, 'coarse points from cache');
            if (onProgress) onProgress(restored, restored);
            return;
          }
        }
      }
    } catch(e) {}

    const batchSize = 80;
    const batches = [];
    for (let i = 0; i < pts.length; i += batchSize) batches.push(pts.slice(i, i + batchSize));
    let done = 0;
    const total = pts.length;
    const loadPromise = Promise.allSettled(batches.map(b =>
      loadBatch(b, 1).then(() => {
        b.forEach(p => { if (p.wx) this._globalBase.set(this._ptKey(p.lat, p.lng), p); });
        done += b.length;
        if (onProgress) onProgress(done, total);
      })
    ));
    const bail = new Promise(resolve => setTimeout(() => {
      console.log('[Global] Timeout, continuing with', this._globalBase.size, 'pts');
      resolve();
    }, 10000));
    await Promise.race([loadPromise, bail]);

    if (this._globalBase.size > 0) {
      try {
        const toSave = {};
        this._globalBase.forEach((p, pk) => { if (p.wx) toSave[pk] = p.wx; });
        localStorage.setItem(cacheKey, JSON.stringify({ ts: Date.now(), pts: toSave }));
      } catch(e) {}
    }
    console.log('[Global] Loaded', this._globalBase.size, 'coarse points');
  },

  getViewportPoints(bounds, zoom) {
    const step = this.gridStep(zoom);
    const pad = step * 2;
    const s = Math.max(-80, bounds.getSouth() - pad);
    const n = Math.min(80, bounds.getNorth() + pad);
    const w = bounds.getWest() - pad;
    const e = bounds.getEast() + pad;
    const pts = [];
    for (let lat = Math.floor(s / step) * step; lat <= n; lat += step) {
      for (let lng = Math.floor(w / step) * step; lng <= e; lng += step) {
        pts.push({ lat: Math.round(lat * 100) / 100, lng: Math.round(lng * 100) / 100 });
      }
    }
    if (pts.length > 600) {
      const every = Math.ceil(pts.length / 600);
      return pts.filter((_, i) => i % every === 0);
    }
    return pts;
  },

  _restoreCache(points) {
    const tiles = {};
    points.forEach(p => {
      const tk = this._tileKey(p.lat, p.lng);
      if (!tiles[tk]) tiles[tk] = [];
      tiles[tk].push(p);
    });
    let restored = 0;
    for (const [tk, pts] of Object.entries(tiles)) {
      try {
        const raw = localStorage.getItem(tk);
        if (!raw) continue;
        const data = JSON.parse(raw);
        if (Date.now() - data.ts > this.CACHE_TTL) { localStorage.removeItem(tk); continue; }
        pts.forEach(p => {
          const pk = this._ptKey(p.lat, p.lng);
          if (data.pts && data.pts[pk]) {
            p.wx = data.pts[pk];
            this._points.set(pk, p);
            restored++;
          }
        });
      } catch (e) {}
    }
    if (restored > 0) { console.log('[Cache] Restored', restored, 'points'); this.invalidateCache(); }
    return restored;
  },

  _saveCache(points) {
    const tiles = {};
    points.forEach(p => {
      const tk = this._tileKey(p.lat, p.lng);
      if (!tiles[tk]) tiles[tk] = {};
      const pk = this._ptKey(p.lat, p.lng);
      const pt = this._points.get(pk);
      if (pt && pt.wx) tiles[tk][pk] = pt.wx;
    });
    for (const [tk, pts] of Object.entries(tiles)) {
      if (Object.keys(pts).length === 0) continue;
      try {
        localStorage.setItem(tk, JSON.stringify({ ts: Date.now(), pts }));
      } catch (e) { this._pruneOldCache(); }
    }
  },

  _pruneOldCache() {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('fg_')) keys.push(k);
    }
    keys.slice(0, Math.ceil(keys.length / 2)).forEach(k => localStorage.removeItem(k));
  },

  async loadViewport(map, onProgress) {
    const bounds = map.getBounds();
    const zoom = map.getZoom();
    const gridPoints = this.getViewportPoints(bounds, zoom);

    this._restoreCache(gridPoints);

    const toLoad = gridPoints.filter(p => !this._points.has(this._ptKey(p.lat, p.lng)));
    if (toLoad.length === 0) {
      if (onProgress) onProgress(gridPoints.length, gridPoints.length);
      return;
    }

    const batchSize = 80;
    const batches = [];
    for (let i = 0; i < toLoad.length; i += batchSize) batches.push(toLoad.slice(i, i + batchSize));
    let done = 0;
    const total = toLoad.length;
    for (let i = 0; i < batches.length; i += 6) {
      const wave = batches.slice(i, i + 6);
      await Promise.allSettled(wave.map(b =>
        loadBatch(b).then(() => {
          b.forEach(p => { if (p.wx) this._points.set(this._ptKey(p.lat, p.lng), p); });
          done += b.length;
          if (onProgress) onProgress(done, total);
        })
      ));
    }
    this._saveCache(gridPoints);
    console.log('[ViewportGrid] Loaded', done, '/', total, 'new points, step=' + this.gridStep(zoom));
  },

  async loadSpots() {
    const toLoad = SPOTS.filter(s => !s.wx);
    if (!toLoad.length) { ViewportGrid.invalidateCache(); return; }
    const batches = [];
    for (let i = 0; i < toLoad.length; i += 80) batches.push(toLoad.slice(i, i + 80));
    for (const b of batches) await loadBatch(b, 7);
    ViewportGrid.invalidateCache();
  },

  getAllPoints() {
    if (this._allPtsCache) return this._allPtsCache;
    const merged = new Map(this._globalBase);
    this._points.forEach((p, pk) => merged.set(pk, p));
    this._allPtsCache = Array.from(merged.values()).concat(SPOTS).filter(p => p.wx && p.wx.hourly);
    return this._allPtsCache;
  },

  invalidateCache() { this._allPtsCache = null; },

  clearAll() {
    this._points.clear();
    SPOTS.forEach(s => { s.wx = null; });
    for (let i = localStorage.length - 1; i >= 0; i--) {
      const k = localStorage.key(i);
      if (k && k.startsWith('fg_') && !k.startsWith('fg_global_')) localStorage.removeItem(k);
    }
  }
};

function initMap() {
  const map = L.map('map', {
    center: [62.5, 25.5], zoom: 5, zoomControl: false, attributionControl: true,
    minZoom: 2, maxZoom: 13, preferCanvas: true, zoomSnap: 0.5, zoomDelta: 0.5,

  }).addTo(map);
  State.map = map;
  map.on('moveend', () => {
    renderSpots(State.currentHourIdx);
    _scheduleViewportLoad();
    GeoProject.update(map);
    const { windCtx, windCvs, dpr } = State;
    if (windCtx) windCtx.clearRect(0, 0, windCvs.width / dpr, windCvs.height / dpr);
    State.windCvs.style.opacity = '1';
    State._panning = false;
    PerfTracker.reset();
    if (State.windField.length) {
      WindTexture.build(State.windField, map.getBounds()).then(() => {
        drawColorField();
        State.particles = [];
        const target = nParticles();
        for (let i = 0; i < target; i++) State.particles.push(makeParticle(true));
        Crosshair.refresh();
        WeatherWidget.scheduleUpdate();
      });
    } else {
      State.particles = [];
      const target = nParticles();
      for (let i = 0; i < target; i++) State.particles.push(makeParticle(true));
    }
  });
  map.on('movestart', () => {
    State._panning = true;
  });
  map.on('move', () => {
    if (State.windCvs) State.windCvs.style.opacity = '0.15';
    Crosshair._scheduleUpdate();
  });

  let _vpDebounce = null;
  function _scheduleViewportLoad() {
    clearTimeout(_vpDebounce);
    _vpDebounce = setTimeout(() => {
      const dot = document.getElementById('refresh-dot'); dot.classList.add('pulse');
      ViewportGrid.loadViewport(map).then(() => {
        buildWindField(State.currentHourIdx).then(() => {
          drawColorField(); resetParticles(); renderSpots(State.currentHourIdx);
           Crosshair.refresh();
          setTimeout(() => dot.classList.remove('pulse'), 800);
        });
      });
    }, 300);
  }

  let _prevZoom = map.getZoom();
  map.on('zoomend', () => {
    WeatherWidget.scheduleUpdate(); _scheduleViewportLoad();  updateHeatmapBlur();
    GeoProject.update(map);
    const newZoom = map.getZoom();
    const dz = _prevZoom - newZoom;
    _prevZoom = newZoom;
    if (dz > 0 && State.particles.length > 10) {
      const bounds = map.getBounds();
      const vLat = bounds.getNorth() - bounds.getSouth();
      const vLng = bounds.getEast() - bounds.getWest();
      let minLat = 90, maxLat = -90, minLng = 180, maxLng = -180;
      for (const p of State.particles) {
        if (p.lat < minLat) minLat = p.lat;
        if (p.lat > maxLat) maxLat = p.lat;
        if (p.lng < minLng) minLng = p.lng;
        if (p.lng > maxLng) maxLng = p.lng;
      }
      const pLat = maxLat - minLat, pLng = maxLng - minLng;
      const coverage = (pLat * pLng) / (vLat * vLng);
      if (coverage < 0.5) {
        const toRedist = Math.floor(State.particles.length * (1 - coverage));
        for (let i = 0; i < toRedist; i++) {
          const idx = Math.floor(Math.random() * State.particles.length);
          respawn(State.particles[idx]);
        }
      }
    }
    if (State.windField.length) {
      WindTexture.build(State.windField, map.getBounds()).then(() => { drawColorField(); Crosshair.refresh(); });
    }
  });
  map.on('zoom', () => {
    GeoProject.invalidate();
    if (State.windCtx) {
      State.windCtx.globalCompositeOperation = 'destination-in';
      State.windCtx.fillStyle = 'rgba(0,0,0,0.3)';
      State.windCtx.fillRect(0, 0, State.windCvs.width / State.dpr, State.windCvs.height / State.dpr);
      State.windCtx.globalCompositeOperation = 'source-over';
    }
  });
  WeatherWidget.scheduleUpdate();
  GeoProject.update(map);
}

/* ── SPATIAL INDEX ────────────────────────────────────────────── */
const SpatialIndex = {
  cells: {}, cellSize: 0.35,
  build(wf) {
    this.cells = {};
    if (wf.length >= 4) {
      const sample = wf.slice(0, Math.min(50, wf.length));
      let minD = 999;
      for (let i = 0; i < sample.length - 1; i++) {
        for (let j = i + 1; j < Math.min(i + 5, sample.length); j++) {
          const d = Math.abs(sample[i].lat - sample[j].lat) + Math.abs(sample[i].lng - sample[j].lng);
          if (d > 0.01 && d < minD) minD = d;
        }
      }
      this.cellSize = Math.max(0.3, Math.min(5, minD * 1.2));
    }
    for (let i = 0; i < wf.length; i++) {
      const f = wf[i], k = this._key(f.lat, f.lng);
      if (!this.cells[k]) this.cells[k] = [];
      this.cells[k].push(f);
    }
  },
  _key(lat, lng) { return (Math.floor(lat / this.cellSize) << 16) | (Math.floor(lng / this.cellSize) & 0xFFFF); },
  nearby(lat, lng, r) {
    const r0 = Math.floor(lat / this.cellSize), c0 = Math.floor(lng / this.cellSize), out = [];
    for (let dr = -r; dr <= r; dr++) for (let dc = -r; dc <= r; dc++) {
      const cell = this.cells[((r0+dr)<<16)|((c0+dc)&0xFFFF)];
      if (cell) for (let i = 0; i < cell.length; i++) out.push(cell[i]);
    }
    return out;
  }
};

/* ── SURFACE TYPE — Global land/sea heuristic ─────────────────
   Returns 0.0 (deep inland) → 0.5 (coast/unknown) → 1.0 (open sea).
   Finnish coast: detailed model. Global: latitude-based heuristic.
   ============================================================ */
function isMarine(lat, lng) {
  function coastGrad(pos, coastVal, seaDir) {
    const d = (pos - coastVal) * seaDir;
    if (d > 0.20) return 1.0;
    if (d > 0.0)  return 0.5 + 0.5 * (d / 0.20);
    if (d > -0.15) return 0.5 * (1.0 + d / 0.15);
    if (d > -0.30) return 0.15 * (1.0 + (d + 0.15) / 0.15);

    const finCoast = lng < 24.5 ? 60.12 : lng < 26.0 ? 60.14 : lng < 27.5 ? 60.10 : 60.06;
    const fin = coastGrad(lat, finCoast, -1);
    const estCoast = lng < 25.0 ? 59.50 : lng < 26.5 ? 59.45 : 59.40;
    const est = coastGrad(lat, estCoast, 1);

    const coastLat = 60.30 + (lng - 19.5) * 0.06;
    if (lat > coastLat + 0.25) return 0.0;
    if (lat > coastLat) return 0.5 * (1.0 - (lat - coastLat) / 0.25);

  /* South China Sea */

  /* === Continental interiors === */
  /* Central Africa */
  if (lng > 10 && lng < 40 && lat > -10 && lat < 15) return 0.0;
  /* Central Asia */
  if (lng > 50 && lng < 90 && lat > 30 && lat < 50) return 0.0;
  /* Central North America */
  if (lng > -110 && lng < -80 && lat > 30 && lat < 50) return 0.0;
  /* Central South America */
  if (lng > -65 && lng < -40 && lat > -25 && lat < 0) return 0.0;
  /* Siberia */

/* ── WIND TEXTURE ─────────────────────────────────────────────── */
const WindTexture = {
  canvas: null, ctx: null,
  uData: null, vData: null, msData: null,
  cols: 0, rows: 0,
  latMin: 0, latMax: 0, lngMin: 0, lngMax: 0,
  
  build(windField, viewportBounds) {
    return new Promise((resolve) => {
      if (!windField.length) { resolve(); return; }
      const zoom = State.map ? State.map.getZoom() : 5;
      let laMin, laMax, loMin, loMax;
      if (viewportBounds) {
        const vPad = zoom <= 5 ? 2 : 0.5;
        laMin = Math.max(-85, viewportBounds.getSouth() - vPad);
        laMax = Math.min(85, viewportBounds.getNorth() + vPad);
        loMin = viewportBounds.getWest() - vPad;

      this.lngMin = loMin; this.lngMax = loMax;

/* ── PARTICLE SYSTEM ──────────────────────────────────────────── */
const PerfTracker = {
  _frames: [], _targetParticles: 400, _lastAdj: 0,
  frame(ts) {
    this._frames.push(ts);
    if (this._frames.length > 61) this._frames.shift();
    if (ts - this._lastAdj > 3000 && this._frames.length >= 30) {
      this._adjust(ts);
    }
  },
  fps() {
    if (this._frames.length < 2) return 60;
    const dt = this._frames[this._frames.length - 1] - this._frames[0];
    return Math.round((this._frames.length - 1) / (dt / 1000));
  },
  _adjust(ts) {
    this._lastAdj = ts;
    const fps = this.fps();
    const base = nParticlesBase();
    if (fps < 24 && this._targetParticles > 80) {
      this._targetParticles = Math.max(80, Math.round(this._targetParticles * 0.7));
      console.log('[Perf] FPS=' + fps + ' → reduce to ' + this._targetParticles);
    } else if (fps > 50 && this._targetParticles < base) {
      this._targetParticles = Math.min(base, Math.round(this._targetParticles * 1.15));
    }
  },
  getTarget() { return this._targetParticles; },
  reset() { this._targetParticles = nParticlesBase(); this._frames = []; }
};

function nParticlesBase() {
  const z = State.map ? State.map.getZoom() : 5;
  if (z <= 3) return 800;
  if (z <= 5) return 600;
  if (z <= 7) return 500;
  if (z <= 8) return 350;
  if (z <= 9) return 250;
  if (z <= 10) return 180;
  return 120;
}
function nParticles() { return PerfTracker.getTarget(); }
function particleLineWidth(ms) { return 2.0 + (ms / Config.MAX_MS) * 2.2; }
function rndGeo() {
  const m = State.map;
  if (m) { const b = m.getBounds(), pad = 0.15, ls = b.getNorth() - b.getSouth(), gs = b.getEast() - b.getWest();
    return { lat: b.getSouth() - ls * pad + Math.random() * ls * (1 + pad * 2), lng: b.getWest() - gs * pad + Math.random() * gs * (1 + pad * 2) }; }
  return { lat: 58 + Math.random() * 12, lng: 18 + Math.random() * 13 };
}
const GeoProject = {
  _ox: 0, _oy: 0, _sx: 1, _sy: 1, _valid: false,
  update(map) {
    const b = map.getBounds();

    const se = map.latLngToContainerPoint(b.getSouthEast());
    this._ox = nw.x; this._oy = nw.y;
    this._sx = (se.x - nw.x) / (b.getEast() - b.getWest());
    this._sy = (se.y - nw.y) / (b.getSouth() - b.getNorth());
    this._west = b.getWest(); this._north = b.getNorth();

  project(lat, lng) {

};

  const pt = State.map.latLngToContainerPoint(L.latLng(lat, lng));
  return { x: pt.x, y: pt.y };
}
function makeParticle(rAge) {
  const g = rndGeo();
  return { lat: g.lat, lng: g.lng, plat: g.lat, plng: g.lng, vlat: 0, vlng: 0, u: 0, v: 0, ms: 0,
    sampleTimer: Math.floor(Math.random() * Config.WIND_SAMPLE_INTERVAL),
    age: rAge ? Math.floor(Math.random() * 320) : 0 };
}
function resetParticles() {
  const { windCtx, windCvs, dpr } = State;
  if (windCtx) windCtx.clearRect(0, 0, windCvs.width / dpr, windCvs.height / dpr);
  PerfTracker.reset();
  State.particles = []; const n = nParticles();
  for (let i = 0; i < n; i++) State.particles.push(makeParticle(true));
}
function sampleWind(p) {
  p.sampleTimer++; if (p.sampleTimer < Config.WIND_SAMPLE_INTERVAL) return;
  p.sampleTimer = 0; const w = WindTexture.sampleWind(p.lat, p.lng); p.u = w.u; p.v = w.v; p.ms = w.ms;
}

  const g = rndGeo(); p.lat = g.lat; p.lng = g.lng; p.plat = g.lat; p.plng = g.lng;
  p.vlat = 0; p.vlng = 0; p.age = 0; p.sampleTimer = 0;

/* ── RENDER LOOP ──────────────────────────────────────────────── */
let _renderLoopRunning = false;
function startRenderLoop() {
  if (_renderLoopRunning) return;
  _renderLoopRunning = true;
  requestAnimationFrame(renderLoop);
}
function renderLoop(ts) {
  requestAnimationFrame(renderLoop);
  PerfTracker.frame(ts || performance.now());

  const { windCtx, windCvs, windField, map, particles, dpr } = State;
  if (!windCtx || !windCvs.width || !windField.length || !map) return;
  const W = window.innerWidth, H = window.innerHeight;

  if (State._panning) {
    windCtx.globalCompositeOperation = 'destination-in';
    windCtx.fillStyle = 'rgba(0,0,0,0.85)';
    windCtx.fillRect(0, 0, W, H);
    windCtx.globalCompositeOperation = 'source-over';
    return;
  }

  if (!GeoProject._valid) GeoProject.update(map);

  const target = nParticles();
  while (particles.length > target) particles.pop();
  while (particles.length < target) particles.push(makeParticle(true));

  windCtx.globalCompositeOperation = 'destination-in';
  windCtx.fillStyle = 'rgba(0,0,0,' + Config.FADE_OPACITY + ')';
  windCtx.fillRect(0, 0, W, H);
  windCtx.globalCompositeOperation = 'source-over';
  windCtx.lineCap = 'round';

  const zoom = map.getZoom();
  const geoSpd = Config.GEO_SPEED / Math.pow(2, zoom - 5) * (zoom >= 9 ? 0.7 : 1.0);
  const bounds = map.getBounds();
  const latPad = (bounds.getNorth() - bounds.getSouth()) * 0.2;
  const lngPad = (bounds.getEast() - bounds.getWest()) * 0.2;

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    sampleWind(p);

    const speedT = Math.min(1, p.ms / Config.MAX_MS);
    const dropChance = Config.DROP_RATE + speedT * Config.DROP_RATE_BUMP;
    if (p.ms < 0.3 || Math.random() < dropChance) {
      p.age++;
      if (p.age > 300 || Math.random() < dropChance * 0.5) respawn(p);
      continue;
    }

    p.plat = p.lat; p.plng = p.lng;

    const cosLat = Math.cos(p.lat * Math.PI / 180);
    p.vlat = p.vlat * Config.INERTIA + p.v * geoSpd * (1 - Config.INERTIA);
    p.vlng = p.vlng * Config.INERTIA + (p.u * geoSpd / (cosLat > 0.1 ? cosLat : 0.1)) * (1 - Config.INERTIA);
    p.lat += p.vlat; p.lng += p.vlng; p.age++;

    if (p.lat < bounds.getSouth() - latPad || p.lat > bounds.getNorth() + latPad ||
        p.lng < bounds.getWest() - lngPad || p.lng > bounds.getEast() + lngPad) { respawn(p); continue; }

    const prev = geo2px(p.plat, p.plng);
    const curr = geo2px(p.lat, p.lng);
    if (curr.x < -10 || curr.x > W + 10 || curr.y < -10 || curr.y > H + 10) continue;

    const lw = particleLineWidth(p.ms);
    const alpha = Math.min(0.9, 0.3 + speedT * 0.6);
    windCtx.beginPath();
    windCtx.moveTo(prev.x, prev.y);
    windCtx.lineTo(curr.x, curr.y);
    windCtx.lineWidth = lw;
    windCtx.strokeStyle = ColorRamp.css(p.ms, alpha);
    windCtx.stroke();
  }
}

/* ── WEATHER BATCH API ────────────────────────────────────────── */
function buildBatchUrl(points, model, forecastDays) {
  const days = forecastDays || 5;
  let url = 'https://api.open-meteo.com/v1/forecast?latitude=' + points.map(p => p.lat.toFixed(4)).join(',')
    + '&longitude=' + points.map(p => p.lng.toFixed(4)).join(',')
    + '&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m'
    + '&wind_speed_unit=ms&timezone=auto&forecast_days=' + days;
  if (model && model !== 'best_match') url += '&models=' + model;
  return url;
}
function normalizeHourly(h) {
  if (!h) return h;
  const map = {
    'wind_speed_10m': 'windspeed_10m', 'wind_direction_10m': 'winddirection_10m',
    'wind_gusts_10m': 'windgusts_10m'
  };
  for (const [newName, oldName] of Object.entries(map)) {
    if (h[newName] && !h[oldName]) h[oldName] = h[newName];
  }
  return h;
}

  if (!j || !j.hourly) return j;

}
let _rateLimited = false;
const _batchCache = {};

try {
  const rlTime = sessionStorage.getItem('foilspot_rl');
  if (rlTime && Date.now() - parseInt(rlTime) < 3600000) {
    _rateLimited = true;
  }
} catch(e) {}

function setRateLimited() {
  _rateLimited = true;
  try { sessionStorage.setItem('foilspot_rl', Date.now().toString()); } catch(e) {}
  Toast.show('⚠ Open-Meteo päiväraja täynnä. Nollautuu klo 02:00 (UTC 00:00). Kokeile myöhemmin.');
}

function loadBatch(points, forecastDays) {
  if (_rateLimited) return Promise.resolve();
  
  const p0 = points[0], pN = points[points.length - 1];
  const cacheKey = p0.lat.toFixed(3) + ',' + p0.lng.toFixed(3) + '|' + pN.lat.toFixed(3) + ',' + pN.lng.toFixed(3) + '|' + points.length;
  if (_batchCache[cacheKey]) {
    const cached = _batchCache[cacheKey];
    cached.forEach((wx, i) => { if (i < points.length && wx) points[i].wx = wx; });
    return Promise.resolve();
  }
  
  function tryModel(model, retries, fd) {
    if (_rateLimited) return Promise.resolve();
    return fetch(buildBatchUrl(points, model, fd))
      .then(r => {
        if (r.status === 429) {
          if (retries > 0) {
            const wait = (4 - retries) * 2000 + Math.random() * 1000;
            console.log('[API] 429 rate limit, retry in', Math.round(wait), 'ms');
            return new Promise(resolve => setTimeout(resolve, wait)).then(() => tryModel(model, retries - 1, fd));
          }
          throw new Error('429');
        }
        if (!r.ok) throw new Error(r.status);
        return r.json();
      })
      .then(data => {
        const arr = Array.isArray(data) ? data : [data];
        let anySuccess = false;
        arr.forEach((j, i) => {
          if (i < points.length) {
            if (j && !j.error && j.hourly) {
              points[i].wx = processBatchResponse(j);
              anySuccess = true;
            } else {
              points[i].wx = points[i].wx || null;
            }
          }

        if (anySuccess) {

  return tryModel(State.activeModel, 2, forecastDays)
    .catch(e => {
      if (e.message === '429') return tryModel('best_match', 1, forecastDays);
      throw e;
    })
    .catch(e => {
      if (e.message === '429') {
        setRateLimited();
        console.error('[API] Rate limited on all models — daily limit likely reached');
      }
    });
}

    const pt = all[i];
    if (!pt.wx || !pt.wx.hourly) continue;
    const h = pt.wx.hourly;
    /* Find best matching hour index by time, not by raw index */
    let idx;
    if (targetTime && h.time && h.time.length) {
      idx = 0;
      let bestDiff = Infinity;
      for (let j = 0; j < h.time.length; j++) {
        const diff = Math.abs(new Date(h.time[j]).getTime() - targetTime);
        if (diff < bestDiff) { bestDiff = diff; idx = j; }
      }
    } else {
      idx = Math.min(hourIdx, h.windspeed_10m.length - 1);
    }
    const ms = layer === 'gust' ? ((h.windgusts_10m && h.windgusts_10m[idx]) || h.windspeed_10m[idx] || 0) : (h.windspeed_10m[idx] || 0);
    const rad = (h.winddirection_10m[idx] || 0) * Math.PI / 180;
    State.windField.push({ lat: pt.lat, lng: pt.lng, u: -ms * Math.sin(rad), v: -ms * Math.cos(rad), ms, marine: isMarine(pt.lat, pt.lng) });
  }
  SpatialIndex.build(State.windField);
  console.log('[buildWindField] hour=' + hourIdx + ', points=' + State.windField.length + (targetTime ? ', time=' + new Date(targetTime).toISOString() : ''));
  const vb = State.map ? State.map.getBounds() : null;
  return WindTexture.build(State.windField, vb).then(() => { Crosshair.refresh(); WeatherWidget.refresh(); }).catch(e => console.error('[WindTexture]', e));
}

/* ── SPOT MARKERS ─────────────────────────────────────────────── */
function dirArrow(deg) { return ['\u2193','\u2199','\u2190','\u2196','\u2191','\u2197','\u2192','\u2198'][Math.round((deg % 360) / 45) % 8]; }
function windLabel(ms) {
  if (ms < 5)  return ['Tyyni \u2013 ei sovi','b-calm'];
  if (ms < 8)  return ['Heikko \u2013 ehk\u00e4','b-light'];
  if (ms < 12) return ['Hyv\u00e4 \u2013 foilaile!','b-good'];
  if (ms < 15) return ['T\u00e4ydellinen!','b-perfect'];
  if (ms < 20) return ['Kova \u2013 kokenut','b-strong'];
  return ['Liian kova','b-danger'];
}
function windTrend(h, idx) {
  const future = Math.min(idx + 3, h.windspeed_10m.length - 1);
  const now = h.windspeed_10m[idx] || 0, later = h.windspeed_10m[future] || 0;
  const diff = later - now;
  if (diff > 2) return { arrow: '↑', label: 'Nouseva', cls: 'gi-gusty' };
  if (diff < -2) return { arrow: '↓', label: 'Laskeva', cls: 'gi-steady' };
  return { arrow: '→', label: 'Vakaa', cls: '' };
}
function gustIndex(ms, gst) {
  if (ms < 1) return { val: 1, label: 'Tyyni', cls: 'gi-steady' };
  const gi = gst / ms;
  if (gi < 1.2) return { val: gi, label: 'Tasainen', cls: 'gi-steady' };
  if (gi < 1.5) return { val: gi, label: 'Puuskainen', cls: 'gi-gusty' };
  return { val: gi, label: 'Hyvin puuskainen', cls: 'gi-extreme' };
}

function renderSpots(hourIdx) {
  for (const m of State.markers) m.remove(); State.markers = [];
  const layer = State.activeLayer, zoom = State.map ? State.map.getZoom() : 5;
  for (const spot of SPOTS) {
    if (!spot.wx || !spot.wx.hourly) continue;
    const h = spot.wx.hourly, idx = Math.min(hourIdx, h.windspeed_10m.length - 1);
    const ms = h.windspeed_10m[idx] || 0, gst = (h.windgusts_10m && h.windgusts_10m[idx]) || ms;
    const dir = h.winddirection_10m[idx] || 0;
    const dms = layer === 'gust' ? gst : ms, c = ColorRamp.rgb(dms), col = 'rgb('+c.r+','+c.g+','+c.b+')';
    const score = WingfoilScore.compute(ms, gst, dir, spot);
    const wfLbl = WingfoilScore.label(score);

    const sz = zoom >= 8 ? 14 : zoom >= 6 ? 10 : 8;
    const iconHtml = '<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+col+';border:2px solid rgba(255,255,255,.6);box-sizing:border-box;cursor:pointer;"></div>';
    const iconSize = [sz, sz];
    const iconAnchor = [sz/2, sz/2];
    const icon = L.divIcon({ className: '', html: iconHtml, iconSize, iconAnchor });
    State.markers.push(L.marker([spot.lat, spot.lng], { icon }).on('click', () => openSheet(spot, hourIdx)).addTo(State.map));
  }
}

function fmtHour(iso) { if (!iso) return '--'; const d = new Date(iso); return ('0'+d.getHours()).slice(-2)+':00'; }
function fmtDateTime(iso) {
  if (!iso) return '--';
  const d = new Date(iso);
  const DAY = ['Su','Ma','Ti','Ke','To','Pe','La'];
  return DAY[d.getDay()] + ' ' + d.getDate() + '.' + (d.getMonth()+1) + '. ' + ('0'+d.getHours()).slice(-2) + ':00';
}
function openSheet(spot, hourIdx) {
  if (!spot.wx || !spot.wx.hourly) return;
  State.sheetSpot = spot;
  const h = spot.wx.hourly, idx = Math.min(hourIdx, h.windspeed_10m.length - 1);
  const ms = h.windspeed_10m[idx]||0, dir = h.winddirection_10m[idx]||0, gst = (h.windgusts_10m&&h.windgusts_10m[idx])||ms;
  const lbl = windLabel(ms);
  let bars = '', cs = idx, ce = Math.min(h.windspeed_10m.length, cs+12), mx = 1;
  for (let i=cs;i<ce;i++) { const v=h.windspeed_10m[i]||0; if(v>mx)mx=v; }
  for (let i=cs;i<ce;i++) { const v=h.windspeed_10m[i]||0,c=ColorRamp.rgb(v); bars+='<div class="sh-bar" style="height:'+Math.max(4,v/mx*100)+'%;background:rgb('+c.r+','+c.g+','+c.b+')"></div>'; }
  const gi = gustIndex(ms, gst);

  if (!gustOk)  reasons.push('Puuskainen');

  document.getElementById('sheet-content').innerHTML =

      +'<div class="sh-score-text">'

/* ── TIMELINE ─────────────────────────────────────────────────── */
/* Always pick the data point with the longest hourly array for timeline */
function bestTimelineRef() {
  let best = null, bestLen = 0;
  /* Prefer spots (7-day forecast) */
  for (const s of SPOTS) {
    if (s.wx && s.wx.hourly && s.wx.hourly.windspeed_10m) {
      const len = s.wx.hourly.windspeed_10m.length;
      if (len > bestLen) { bestLen = len; best = s; }
    }
  }
  if (best) return best;
  /* Fallback to any loaded point */
  for (const p of ViewportGrid.getAllPoints()) {
    if (p.wx && p.wx.hourly && p.wx.hourly.windspeed_10m) {
      const len = p.wx.hourly.windspeed_10m.length;
      if (len > bestLen) { bestLen = len; best = p; }
    }
  }
  return best;
}

function nowIdx(times) {
  if (!times || !times.length) return 0;
  const now = Date.now(); let best = 0, bd = Infinity;
  for (let i = 0; i < times.length; i++) { const diff = Math.abs(new Date(times[i]).getTime() - now); if (diff < bd) { bd = diff; best = i; } }
  return best;
}
function renderTimeline(times, speeds, dirs, activeIdx) {
  const tl = document.getElementById('tl-scroll'); tl.innerHTML = '';
  if (!times || !times.length) return;
  State._tlTimes = times; State._tlSpeeds = speeds; State._tlDirs = dirs;
  State._tlTicks = [];
  const TICK_W = 24;
  const DAY = ['Su','Ma','Ti','Ke','To','Pe','La']; let lastDay = -1;

  let maxMs = 1;
  for (let i = 0; i < speeds.length; i++) { if ((speeds[i]||0) > maxMs) maxMs = speeds[i]; }

  const spacerL = document.createElement('div');
  spacerL.style.cssText = 'flex:0 0 ' + (window.innerWidth / 2 - TICK_W / 2) + 'px';
  tl.appendChild(spacerL);

  const realNowIdx = nowIdx(times);
  let nowMarkerInserted = false;

  for (let i = 0; i < times.length; i++) {
    const d = new Date(times[i]), day = d.getDay(), hour = d.getHours();
    if (day !== lastDay) {
      lastDay = day;
      const sep = document.createElement('div'); sep.className = 'day-sep';
      sep.textContent = DAY[day] + ' ' + d.getDate() + '.';
      tl.appendChild(sep);
    }

    if (!nowMarkerInserted && i >= realNowIdx) {
      const nowLine = document.createElement('div');
      nowLine.className = 'tl-now-marker';
      nowLine.innerHTML = '<span class="tl-now-label">NYT</span>';
      tl.appendChild(nowLine);
      nowMarkerInserted = true;
    }

    const ms = speeds[i]||0, c = ColorRamp.rgb(ms);
    const tick = document.createElement('div');
    const isPast = i < realNowIdx;
    tick.className = 'htick' + (hour % 3 === 0 ? ' show-lbl' : '') + (isPast ? ' past' : '');
    tick.dataset.idx = i;

    const barH = Math.max(3, (ms / maxMs) * 48);
    const foilable = ms >= 8;
    tick.innerHTML = '<div class="htick-bar' + (foilable ? ' foilable' : '') + '" style="height:' + barH + 'px;background:rgb(' + c.r + ',' + c.g + ',' + c.b + ')' + (foilable ? ';border-bottom:2px solid rgb(80,237,120)' : '') + '"></div>'
      + '<span class="htick-lbl">' + ('0'+hour).slice(-2) + '</span>';
    tl.appendChild(tick);
    State._tlTicks.push(tick);
  }

  const spacerR = document.createElement('div');
  spacerR.style.cssText = 'flex:0 0 ' + (window.innerWidth / 2 - TICK_W / 2) + 'px';
  tl.appendChild(spacerR);

  requestAnimationFrame(() => {
    const target = State._tlTicks[activeIdx];
    if (target) tl.scrollLeft = target.offsetLeft - tl.offsetWidth / 2 + TICK_W / 2;
    _tlUpdateNow(activeIdx);
  });

  /* Scroll handler — debounced selection */
  let _scrollTimer = null;
  tl.addEventListener('scroll', () => {
    clearTimeout(_scrollTimer);
    _scrollTimer = setTimeout(() => _tlSnapSelect(tl), 150);
  }, { passive: true });

  /* Click handler — tap any tick to jump to it */
  tl.addEventListener('click', (e) => {
    const tick = e.target.closest('.htick');
    if (!tick || !tick.dataset.idx) return;
    const idx = parseInt(tick.dataset.idx);
    if (isNaN(idx)) return;
    /* Smooth scroll to center this tick */
    tl.scrollTo({
      left: tick.offsetLeft - tl.offsetWidth / 2 + TICK_W / 2,
      behavior: 'smooth'
    });
    /* Immediately update data */
    if (idx !== State.currentHourIdx) {
      State.currentHourIdx = idx;
      _tlUpdateNow(idx);
      buildWindField(idx).then(() => { drawColorField(); resetParticles(); });
      renderSpots(idx);
      if (State.sheetSpot) openSheet(State.sheetSpot, idx);
    }
  });
}

function _tlUpdateNow(idx) {
  if (!State._tlTimes || !State._tlTimes[idx]) return;
  const d = new Date(State._tlTimes[idx]);
  const DAY = ['Su','Ma','Ti','Ke','To','Pe','La'];
  const hh = ('0'+d.getHours()).slice(-2), mm = ('0'+d.getMinutes()).slice(-2);
  const dateStr = DAY[d.getDay()] + ' ' + d.getDate() + '.' + (d.getMonth()+1) + '.';
  const bubble = document.getElementById('tl-time-bubble');
  if (bubble) bubble.innerHTML = '<div style="font-size:7px;opacity:.8;font-weight:500">' + dateStr + '</div>' + hh + ':' + mm;
}

function _tlSnapSelect(tl) {
  const center = tl.scrollLeft + tl.offsetWidth / 2;
  let bestIdx = 0, bestDist = Infinity;
  for (let i = 0; i < State._tlTicks.length; i++) {
    const tick = State._tlTicks[i];
    const tickCenter = tick.offsetLeft + 10;
    const dist = Math.abs(center - tickCenter);
    if (dist < bestDist) { bestDist = dist; bestIdx = i; }
  }
  if (bestIdx !== State.currentHourIdx) {
    State.currentHourIdx = bestIdx;
    _tlUpdateNow(bestIdx);
    buildWindField(bestIdx).then(() => { drawColorField(); resetParticles(); });
    renderSpots(bestIdx);
    if (State.sheetSpot) openSheet(State.sheetSpot, bestIdx);
  }
}

function scrollTimelineTo(idx) {
  const tl = document.getElementById('tl-scroll');
  if (!tl || !State._tlTicks || !State._tlTicks[idx]) return;
  const target = State._tlTicks[idx];
  tl.scrollTo({ left: target.offsetLeft - tl.offsetWidth / 2 + 10, behavior: 'smooth' });
}

/* ── WEATHER WIDGET — Shows conditions at map center ──────────── */
const WeatherWidget = {
  _el: null, _iconEl: null, _tempEl: null, _descEl: null,
  _cache: {}, _fetchTimer: null, _lastKey: '',

  /* WMO weathercode → emoji + description */
  _codes: {
    0: ['☀️','Selkeää'], 1: ['🌤','Melko selkeää'], 2: ['⛅','Puolipilvistä'], 3: ['☁️','Pilvistä'],
    45: ['🌫','Sumua'], 48: ['🌫','Huurretta'],
    51: ['🌦','Kevyttä tihkua'], 53: ['🌦','Tihkua'], 55: ['🌧','Tiheää tihkua'],
    61: ['🌧','Kevyttä sadetta'], 63: ['🌧','Sadetta'], 65: ['🌧','Rankkasadetta'],
    66: ['🌧','Jäätävää sadetta'], 67: ['🌧','Jäätävää sadetta'],
    71: ['🌨','Kevyttä lunta'], 73: ['🌨','Lumisadetta'], 75: ['🌨','Tiheää lunta'],
    77: ['🌨','Lumijyväsiä'],
    80: ['🌦','Sadekuuroja'], 81: ['🌧','Kuuroja'], 82: ['⛈','Rankkakuuroja'],
    85: ['🌨','Lumikuuroja'], 86: ['🌨','Lumikuuroja'],
    95: ['⛈','Ukkosmyrsky'], 96: ['⛈','Ukkosta, rakeita'], 99: ['⛈','Ukkosta, rakeita']
  },

  init() {
    this._el = document.getElementById('wx-widget');
    this._iconEl = document.getElementById('wx-icon');
    this._tempEl = document.getElementById('wx-temp');
    this._descEl = document.getElementById('wx-desc');
  },

  /** Schedule a fetch — debounced to avoid API spam during pan */
  scheduleUpdate() {
    clearTimeout(this._fetchTimer);
    this._fetchTimer = setTimeout(() => this._update(), 500);
  },

  async _update() {
    if (!State.map || !this._el) return;
    const c = State.map.getCenter();
    /* Round to 0.5° grid for cache efficiency */
    const lat = (Math.round(c.lat * 2) / 2).toFixed(1);
    const lng = (Math.round(c.lng * 2) / 2).toFixed(1);
    const hourIdx = State.currentHourIdx;
    const key = lat + ',' + lng;

    /* Use cache if fresh */
    if (this._cache[key] && Date.now() - this._cache[key].ts < 30 * 60 * 1000) {
      this._render(this._cache[key].data, hourIdx);
      return;
    }

    try {
      const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat
        + '&longitude=' + lng
        + '&hourly=temperature_2m,weather_code&forecast_days=5&timezone=auto';
      const r = await fetch(url);
      if (!r.ok) return;
      const data = await r.json();
      if (data && data.hourly) {
        this._cache[key] = { ts: Date.now(), data };
        this._render(data, hourIdx);
      }
    } catch(e) { console.log('[WxWidget]', e.message); }
  },

  _render(data, hourIdx) {
    if (!data || !data.hourly) { this._el.classList.add('hidden'); return; }
    const h = data.hourly;
    /* Match hour by time if timeline times available */
    let idx = Math.min(hourIdx, (h.temperature_2m || []).length - 1);
    if (State._tlTimes && State._tlTimes[hourIdx] && h.time) {
      const target = new Date(State._tlTimes[hourIdx]).getTime();
      let bestDiff = Infinity;
      for (let j = 0; j < h.time.length; j++) {
        const diff = Math.abs(new Date(h.time[j]).getTime() - target);
        if (diff < bestDiff) { bestDiff = diff; idx = j; }
      }
    }
    const temp = h.temperature_2m ? h.temperature_2m[idx] : null;
    const code = h.weather_code ? h.weather_code[idx] : 0;
    const info = this._codes[code] || ['🌡',''];

    this._el.classList.remove('hidden');
    this._iconEl.textContent = info[0];
    this._tempEl.textContent = temp != null ? Math.round(temp) + '°' : '--°';
    this._descEl.textContent = info[1];
  },

  /** Called when timeline hour changes */
  refresh() {
    if (!this._el) return;
    const c = State.map ? State.map.getCenter() : null;
    if (!c) return;
    const lat = (Math.round(c.lat * 2) / 2).toFixed(1);
    const lng = (Math.round(c.lng * 2) / 2).toFixed(1);
    const key = lat + ',' + lng;
    if (this._cache[key]) {
      this._render(this._cache[key].data, State.currentHourIdx);
    } else {
      this.scheduleUpdate();
    }
  }
};

/* ── CROSSHAIR READOUT — Sample wind at map center ────────── */
const Crosshair = {
  _el: null, _speedEl: null, _arrowEl: null, _degEl: null, _gustEl: null,
  _chEl: null, _windArrow: null, _updateTimer: null,
  
  init() {
    this._el = document.getElementById('crosshair-readout');
    this._speedEl = document.getElementById('cr-speed');
    this._arrowEl = document.getElementById('cr-dir-arrow');
    this._degEl = document.getElementById('cr-dir-deg');
    this._gustEl = document.getElementById('cr-gust');
    this._chEl = document.getElementById('crosshair');
    this._windArrow = document.getElementById('ch-wind-arrow');
    if (!State.map) return;
    
    State.map.on('movestart', () => { if (this._chEl) this._chEl.classList.add('panning'); });
    State.map.on('moveend', () => {
      if (this._chEl) this._chEl.classList.remove('panning');
      this._update();
    });
    State.map.on('move', () => this._scheduleUpdate());
    
    this._update();
  },
  
  _scheduleUpdate() {
    if (this._updateTimer) return;
    this._updateTimer = setTimeout(() => {
      this._updateTimer = null;
      this._update();
    }, 60);
  },
  
  _update() {
    if (!this._el || !State.map) return;
    
    const center = State.map.getCenter();
    let w;
    
    /* Try WindTexture first, fall back to IDW */
    if (WindTexture.msData) {
      w = WindTexture.sampleWind(center.lat, center.lng);
    } else if (State.windField.length) {
      w = idw(center.lat, center.lng);
    } else {
      this._el.classList.add('hidden');
      return;
    }
    
    if (w.ms < 0.05) {
      this._el.classList.add('hidden');
      return;
    }
    
    this._el.classList.remove('hidden');
    const c = ColorRamp.rgb(w.ms);
    const colorStr = 'rgb(' + c.r + ',' + c.g + ',' + c.b + ')';
    
    this._speedEl.innerHTML = '<span style="color:' + colorStr + '">' + Units.fmt(w.ms) + '</span><span class="cr-speed-unit">' + Units.label() + '</span>';
    
    const dir = (Math.atan2(-w.u, -w.v) * 180 / Math.PI + 360) % 360;
    const arrows = ['↓','↙','←','↖','↑','↗','→','↘'];
    this._arrowEl.textContent = arrows[Math.round(dir / 45) % 8];
    this._arrowEl.style.color = colorStr;
    this._degEl.textContent = Math.round(dir) + '°';
    
    /* Rotate crosshair wind direction arrow */
    if (this._windArrow) this._windArrow.style.transform = 'rotate(' + Math.round(dir) + 'deg)';
    
    /* Find gust data from nearest data point */
    const allPts = ViewportGrid.getAllPoints();
    let gustMs = null, minD = Infinity;
    const cos2 = Math.cos(center.lat * Math.PI / 180) ** 2;
    for (const pt of allPts) {
      if (!pt.wx || !pt.wx.hourly || !pt.wx.hourly.windgusts_10m) continue;
      const d = (center.lat - pt.lat) ** 2 + (center.lng - pt.lng) ** 2 * cos2;
      if (d < minD) {
        minD = d;
        const idx = Math.min(State.currentHourIdx, pt.wx.hourly.windgusts_10m.length - 1);
        gustMs = pt.wx.hourly.windgusts_10m[idx];
      }
    }
    if (gustMs != null && gustMs > w.ms * 1.05) {
      const gc = ColorRamp.rgb(gustMs);
      this._gustEl.innerHTML = 'Puuska <span style="color:rgb(' + gc.r + ',' + gc.g + ',' + gc.b + ')">' + Units.fmt(gustMs) + '</span> ' + Units.label();
      this._gustEl.style.display = '';
    } else {
      this._gustEl.style.display = 'none';
    }
  },
  
  refresh() { this._update(); }
};

/* ── WIND ROSE ────────────────────────────────────────────────── */
function buildWindRoseSVG(h, idx) {
  const DIRS = 16;
  const bins = new Array(DIRS).fill(0);
  const start = Math.max(0, idx - 12);
  const end = Math.min(h.windspeed_10m.length, idx + 12);
  let maxBin = 1, count = 0;
  for (let i = start; i < end; i++) {
    const ms = h.windspeed_10m[i] || 0;
    if (ms < 0.5) continue;
    const d = h.winddirection_10m[i] || 0;
    const bin = Math.round(d / (360 / DIRS)) % DIRS;
    bins[bin] += ms;
    count++;
  }
  if (!count) return '';
  for (let i = 0; i < DIRS; i++) if (bins[i] > maxBin) maxBin = bins[i];

  const cx = 70, cy = 70, R = 55;
  const labels = ['N','','NE','','E','','SE','','S','','SW','','W','','NW',''];
  let paths = '', dots = '', lbls = '';
  for (let i = 0; i < DIRS; i++) {
    const ang = (i * (360 / DIRS) - 90) * Math.PI / 180;
    const r = (bins[i] / maxBin) * R;
    const c = ColorRamp.rgb(bins[i] / (count > 0 ? count / DIRS : 1));
    const x = cx + Math.cos(ang) * r, y = cy + Math.sin(ang) * r;
    if (r > 2) {
      paths += '<line x1="' + cx + '" y1="' + cy + '" x2="' + x + '" y2="' + y + '" stroke="rgb(' + c.r + ',' + c.g + ',' + c.b + ')" stroke-width="4" stroke-linecap="round" opacity="0.7"/>';
      dots += '<circle cx="' + x + '" cy="' + y + '" r="3" fill="rgb(' + c.r + ',' + c.g + ',' + c.b + ')"/>';
    }
    if (labels[i]) {
      lbls += '<text x="' + (cx + Math.cos(ang) * (R + 12)) + '" y="' + (cy + Math.sin(ang) * (R + 12)) + '" text-anchor="middle" dominant-baseline="central" fill="rgba(180,215,255,0.4)" font-size="8" font-family="DM Mono,monospace">' + labels[i] + '</text>';
    }
  }
  const rings = '<circle cx="' + cx + '" cy="' + cy + '" r="' + (R * 0.33) + '" fill="none" stroke="rgba(255,255,255,0.06)"/>'
    + '<circle cx="' + cx + '" cy="' + cy + '" r="' + (R * 0.66) + '" fill="none" stroke="rgba(255,255,255,0.06)"/>'
    + '<circle cx="' + cx + '" cy="' + cy + '" r="' + R + '" fill="none" stroke="rgba(255,255,255,0.08)"/>';
  return '<div class="sh-windrose"><svg width="160" height="160" viewBox="0 0 140 140">' + rings + paths + dots + lbls + '</svg></div>';
}

/* ── MARINE API ───────────────────────────────────────────────── */
async function loadMarineTemp() {
  try {
    const lats = SPOTS.map(s => s.lat.toFixed(2)).join(',');
    const lngs = SPOTS.map(s => s.lng.toFixed(2)).join(',');
    const url = 'https://marine-api.open-meteo.com/v1/marine?latitude=' + lats + '&longitude=' + lngs + '&current=sea_surface_temperature';
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    const arr = Array.isArray(data) ? data : [data];
    arr.forEach((d, i) => {
      if (i < SPOTS.length && d && d.current && d.current.sea_surface_temperature != null) {
        SPOTS[i]._waterTemp = d.current.sea_surface_temperature;
      }
    });
    console.log('[Marine] Water temp loaded for', arr.filter(d => d && d.current).length, 'spots');
  } catch (e) {
    console.log('[Marine] Water temp unavailable:', e.message);
  }
}
