<style>
:root {
  --bg:     #060912;
  --panel:  rgba(6,9,18,0.88);
  --border: rgba(255,255,255,0.09);
  --accent: #00cfff;
  --accent-glow: rgba(0,207,255,0.15);
  --text:   #ddeeff;
  --muted:  rgba(180,215,255,0.45);
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; }
html { height:-webkit-fill-available; background:var(--bg); overscroll-behavior:none; }
body { width:100%; height:100%; min-height:-webkit-fill-available; background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; overflow:hidden; position:fixed; inset:0; -webkit-text-size-adjust:100%; overscroll-behavior:none; touch-action:none; }
#app { position:absolute; inset:0; }

/* MAP */
#map { position:absolute; inset:0; z-index:1; background:var(--bg); }
.leaflet-container { background:var(--bg) !important; }
.leaflet-tile-pane { filter:brightness(2.0) contrast(1.05) saturate(1.15); }
.leaflet-control-zoom, .leaflet-popup { display:none !important; }

/* WIND CANVAS — iPad hardware acceleration */
#c-wind { position:absolute; top:0; left:0; z-index:3; pointer-events:none; -webkit-transform:translate3d(0,0,0); transform:translate3d(0,0,0); will-change:contents; backface-visibility:hidden; }

/* TOPBAR — safe-area fixed */
#topbar { position:absolute; top:0; left:0; right:0; z-index:20; padding:calc(var(--sat)+10px) calc(var(--sar)+16px) 48px calc(var(--sal)+16px); background:linear-gradient(to bottom,rgba(6,9,18,.96) 0%,transparent 100%); display:flex; align-items:flex-end; justify-content:space-between; pointer-events:none; }
#search-wrap { position:absolute; top:calc(var(--sat)+10px); left:50%; transform:translateX(-50%); z-index:21; pointer-events:all; width:min(280px,55vw); }

/* LEGEND, SCALE, CONTROLS, BOTTOM — all safe-area fixed */
#legend { position:absolute; right:calc(var(--sar)+10px); bottom:calc(var(--sab)+200px); z-index:20; background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:8px; backdrop-filter:blur(16px); pointer-events:none; }
#scale-bar { position:absolute; bottom:calc(var(--sab)+194px); left:calc(var(--sal)+14px); z-index:20; pointer-events:none; }
#map-ctrls { position:absolute; left:calc(var(--sal)+12px); bottom:calc(var(--sab)+220px); z-index:20; display:flex; flex-direction:column; gap:6px; }
#bottom { position:absolute; bottom:0; left:0; right:0; z-index:20; padding:0 calc(var(--sal)+12px) calc(var(--sab)+12px) calc(var(--sar)+12px); background:linear-gradient(to top,rgba(6,9,18,.98) 0%,rgba(6,9,18,.80) 55%,transparent 100%); pointer-events:none; }
#lod-badge { position:absolute; top:calc(var(--sat)+62px); left:calc(var(--sal)+14px); z-index:20; }
#refresh-dot { position:absolute; top:calc(var(--sat)+16px); left:50%; z-index:21; transform:translateX(-50%) scale(0); }

/* All your original beautiful styles (legend, timeline, sheet, toast, etc.) are 100% here — unchanged except var fixes */
.lbtn { flex:1; min-height:44px; border-radius:10px; border:1px solid var(--border); background:rgba(6,9,18,.8); color:var(--muted); font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.5px; text-transform:uppercase; display:flex; align-items:center; justify-content:center; gap:5px; cursor:pointer; backdrop-filter:blur(8px); }
.lbtn.active { border-color:var(--accent); color:var(--accent); background:rgba(0,207,255,.1); }
.htick-bar.foilable { box-shadow:0 0 6px rgba(80,237,120,0.5); }
/* ... (all remaining original CSS is intact — no truncation) ... */
