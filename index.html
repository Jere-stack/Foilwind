/* ── PARTICLE SYSTEM ──────────────────────────────────────────── */
const PerfTracker = {
  _frames: [], _targetParticles: 400, _lastAdj: 0,
  frame(ts) {
    this._frames.push(ts);
    if (this._frames.length > 61) this._frames.shift();
    if (ts - this._lastAdj > 3000 && this._frames.length >= 30) this._adjust(ts);
  },
  fps() {
    if (this._frames.length < 2) return 60;
    const dt = this._frames[this._frames.length - 1] - this._frames[0];
    return Math.round((this._frames.length - 1) / (dt / 1000));
  },
  _adjust(ts) {
    this._lastAdj = ts;
    const fps = this.fps(), base = nParticlesBase();
    if (fps < 24 && this._targetParticles > 80) {
      this._targetParticles = Math.max(80, Math.round(this._targetParticles * 0.7));
    } else if (fps > 50 && this._targetParticles < base) {
      this._targetParticles = Math.min(base, Math.round(this._targetParticles * 1.15));
    }
  },
  getTarget() { return this._targetParticles; },
  reset() { this._targetParticles = nParticlesBase(); this._frames = []; }
};

function nParticlesBase() {
  const z = State.map ? State.map.getZoom() : 5;
  if (z <= 3) return 800; if (z <= 5) return 600; if (z <= 7) return 500;
  if (z <= 8) return 350; if (z <= 9) return 250; if (z <= 10) return 180;
  return 120;
}
function nParticles() { return PerfTracker.getTarget(); }
function particleLineWidth(ms) { return 2.0 + (ms / Config.MAX_MS) * 2.2; }
function rndGeo() {
  const m = State.map;
  if (m) {
    const b = m.getBounds(), pad = 0.15, ls = b.getNorth()-b.getSouth(), gs = b.getEast()-b.getWest();
    return { lat: b.getSouth()-ls*pad+Math.random()*ls*(1+pad*2), lng: b.getWest()-gs*pad+Math.random()*gs*(1+pad*2) };
  }
  return { lat: 58 + Math.random() * 12, lng: 18 + Math.random() * 13 };
}

const GeoProject = {
  _ox: 0, _oy: 0, _sx: 1, _sy: 1, _valid: false,
  update(map) {
    const b = map.getBounds();
    const nw = map.latLngToContainerPoint(b.getNorthWest());
    const se = map.latLngToContainerPoint(b.getSouthEast());
    this._ox = nw.x; this._oy = nw.y;
    this._sx = (se.x - nw.x) / (b.getEast() - b.getWest());
    this._sy = (se.y - nw.y) / (b.getSouth() - b.getNorth());
    this._west = b.getWest(); this._north = b.getNorth();
    this._valid = true;
  },
  project(lat, lng) {
    return { x: this._ox + (lng - this._west) * this._sx, y: this._oy + (lat - this._north) * this._sy };
  },
  invalidate() { this._valid = false; }
};

function geo2px(lat, lng) {
  if (GeoProject._valid) return GeoProject.project(lat, lng);
  const pt = State.map.latLngToContainerPoint(L.latLng(lat, lng));
  return { x: pt.x, y: pt.y };
}
function makeParticle(rAge) {
  const g = rndGeo();
  return { lat: g.lat, lng: g.lng, plat: g.lat, plng: g.lng, vlat: 0, vlng: 0, u: 0, v: 0, ms: 0,
    sampleTimer: Math.floor(Math.random() * Config.WIND_SAMPLE_INTERVAL),
    age: rAge ? Math.floor(Math.random() * 320) : 0 };
}
function resetParticles() {
  const { windCtx, windCvs, dpr } = State;
  if (windCtx) windCtx.clearRect(0, 0, windCvs.width / dpr, windCvs.height / dpr);
  PerfTracker.reset();
  State.particles = [];
  const n = nParticles();
  for (let i = 0; i < n; i++) State.particles.push(makeParticle(true));
}
function sampleWind(p) {
  p.sampleTimer++; if (p.sampleTimer < Config.WIND_SAMPLE_INTERVAL) return;
  p.sampleTimer = 0;
  const w = WindTexture.sampleWind(p.lat, p.lng); p.u = w.u; p.v = w.v; p.ms = w.ms;
}
function respawn(p) {
  const g = rndGeo(); p.lat = g.lat; p.lng = g.lng; p.plat = g.lat; p.plng = g.lng;
  p.vlat = 0; p.vlng = 0; p.age = 0; p.sampleTimer = 0;
}

/* ── RENDER LOOP ──────────────────────────────────────────────── */
let _renderLoopRunning = false;
function startRenderLoop() {
  if (_renderLoopRunning) return;
  _renderLoopRunning = true;
  requestAnimationFrame(renderLoop);
}
function renderLoop(ts) {
  requestAnimationFrame(renderLoop);
  PerfTracker.frame(ts || performance.now());
  const { windCtx, windCvs, windField, map, particles, dpr } = State;
  if (!windCtx || !windCvs.width || !windField.length || !map) return;
  const W = window.innerWidth, H = window.innerHeight;

  if (State._panning) {
    windCtx.globalCompositeOperation = 'destination-in';
    windCtx.fillStyle = 'rgba(0,0,0,0.85)';
    windCtx.fillRect(0, 0, W, H);
    windCtx.globalCompositeOperation = 'source-over';
    return;
  }
  if (!GeoProject._valid) GeoProject.update(map);

  const target = nParticles();
  while (particles.length > target) particles.pop();
  while (particles.length < target) particles.push(makeParticle(true));

  windCtx.globalCompositeOperation = 'destination-in';
  windCtx.fillStyle = 'rgba(0,0,0,' + Config.FADE_OPACITY + ')';
  windCtx.fillRect(0, 0, W, H);
  windCtx.globalCompositeOperation = 'source-over';
  windCtx.lineCap = 'round';

  const zoom = map.getZoom();
  const geoSpd = Config.GEO_SPEED / Math.pow(2, zoom - 5) * (zoom >= 9 ? 0.7 : 1.0);
  const bounds = map.getBounds();
  const latPad = (bounds.getNorth() - bounds.getSouth()) * 0.2;
  const lngPad = (bounds.getEast() - bounds.getWest()) * 0.2;

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    sampleWind(p);
    const speedT = Math.min(1, p.ms / Config.MAX_MS);
    const dropChance = Config.DROP_RATE + speedT * Config.DROP_RATE_BUMP;
    if (p.ms < 0.3 || Math.random() < dropChance) {
      p.age++;
      if (p.age > 300 || Math.random() < dropChance * 0.5) respawn(p);
      continue;
    }
    p.plat = p.lat; p.plng = p.lng;
    const cosLat = Math.cos(p.lat * Math.PI / 180);
    p.vlat = p.vlat * Config.INERTIA + p.v * geoSpd * (1 - Config.INERTIA);
    p.vlng = p.vlng * Config.INERTIA + (p.u * geoSpd / (cosLat > 0.1 ? cosLat : 0.1)) * (1 - Config.INERTIA);
    p.lat += p.vlat; p.lng += p.vlng; p.age++;
    if (p.lat < bounds.getSouth()-latPad || p.lat > bounds.getNorth()+latPad ||
        p.lng < bounds.getWest()-lngPad || p.lng > bounds.getEast()+lngPad) { respawn(p); continue; }
    const prev = geo2px(p.plat, p.plng);
    const curr = geo2px(p.lat, p.lng);
    if (curr.x < -10 || curr.x > W+10 || curr.y < -10 || curr.y > H+10) continue;
    const lw = particleLineWidth(p.ms);
    const alpha = Math.min(0.9, 0.3 + speedT * 0.6);
    windCtx.beginPath();
    windCtx.moveTo(prev.x, prev.y);
    windCtx.lineTo(curr.x, curr.y);
    windCtx.lineWidth = lw;
    windCtx.strokeStyle = ColorRamp.css(p.ms, alpha);
    windCtx.stroke();
  }
}

/* ── WEATHER BATCH API ────────────────────────────────────────── */
function buildBatchUrl(points, model, forecastDays) {
  const days = forecastDays || 5;
  let url = 'https://api.open-meteo.com/v1/forecast?latitude=' + points.map(p => p.lat.toFixed(4)).join(',')
    + '&longitude=' + points.map(p => p.lng.toFixed(4)).join(',')
    + '&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m'
    + '&wind_speed_unit=ms&timezone=auto&forecast_days=' + days;
  if (model && model !== 'best_match') url += '&models=' + model;
  return url;
}
function normalizeHourly(h) {
  if (!h) return h;
  const map = {
    'wind_speed_10m': 'windspeed_10m', 'wind_direction_10m': 'winddirection_10m',
    'wind_gusts_10m': 'windgusts_10m'
  };
  for (const [newName, oldName] of Object.entries(map)) {
    if (h[newName] && !h[oldName]) h[oldName] = h[newName];
  }
  return h;
}
function processBatchResponse(j) {
  if (!j || !j.hourly) return j;
  normalizeHourly(j.hourly);
  return j;
}
let _rateLimited = false;
const _batchCache = {};

try {
  const rlTime = sessionStorage.getItem('foilspot_rl');
  if (rlTime && Date.now() - parseInt(rlTime) < 3600000) _rateLimited = true;
} catch(e) {}

function setRateLimited() {
  _rateLimited = true;
  try { sessionStorage.setItem('foilspot_rl', Date.now().toString()); } catch(e) {}
  document.getElementById('rl-banner').classList.add('show');
}

function loadBatch(points, forecastDays) {
  if (_rateLimited) return Promise.resolve();
  const p0 = points[0], pN = points[points.length - 1];
  const cacheKey = p0.lat.toFixed(3)+','+p0.lng.toFixed(3)+'|'+pN.lat.toFixed(3)+','+pN.lng.toFixed(3)+'|'+points.length;
  if (_batchCache[cacheKey]) {
    const cached = _batchCache[cacheKey];
    cached.forEach((wx, i) => { if (i < points.length && wx) points[i].wx = wx; });
    return Promise.resolve();
  }
  function tryModel(model, retries, fd) {
    if (_rateLimited) return Promise.resolve();
    return fetch(buildBatchUrl(points, model, fd))
      .then(r => {
        if (r.status === 429) {
          if (retries > 0) {
            const wait = (4 - retries) * 2000 + Math.random() * 1000;
            return new Promise(resolve => setTimeout(resolve, wait)).then(() => tryModel(model, retries - 1, fd));
          }
          throw new Error('429');
        }
        if (!r.ok) throw new Error(r.status);
        return r.json();
      })
      .then(data => {
        const arr = Array.isArray(data) ? data : [data];
        let anySuccess = false;
        arr.forEach((j, i) => {
          if (i < points.length) {
            if (j && !j.error && j.hourly) { points[i].wx = processBatchResponse(j); anySuccess = true; }
            else { points[i].wx = points[i].wx || null; }
          }
        });
        if (anySuccess) {
          _batchCache[cacheKey] = points.map(p => p.wx || null);
          ViewportGrid.invalidateCache();
        }
        if (!anySuccess) throw new Error('no valid data');
      });
  }
  return tryModel(State.activeModel, 2, forecastDays)
    .catch(e => { if (e.message === '429') return tryModel('best_match', 1, forecastDays); throw e; })
    .catch(e => { if (e.message === '429') { setRateLimited(); console.error('[API] Rate limited'); } });
}

/* ── WIND FIELD BUILDER ───────────────────────────────────────── */
function buildWindField(hourIdx) {
  State.windField = [];
  const all = ViewportGrid.getAllPoints();
  const layer = State.activeLayer;
  let targetTime = null;
  if (State._tlTimes && State._tlTimes[hourIdx]) {
    targetTime = new Date(State._tlTimes[hourIdx]).getTime();
  }
  for (let i = 0; i < all.length; i++) {
    const pt = all[i];
    if (!pt.wx || !pt.wx.hourly) continue;
    const h = pt.wx.hourly;
    let idx;
    if (targetTime && h.time && h.time.length) {
      idx = 0; let bestDiff = Infinity;
      for (let j = 0; j < h.time.length; j++) {
        const diff = Math.abs(new Date(h.time[j]).getTime() - targetTime);
        if (diff < bestDiff) { bestDiff = diff; idx = j; }
      }
    } else {
      idx = Math.min(hourIdx, h.windspeed_10m.length - 1);
    }
    const ms = layer === 'gust' ? ((h.windgusts_10m && h.windgusts_10m[idx]) || h.windspeed_10m[idx] || 0) : (h.windspeed_10m[idx] || 0);
    const rad = (h.winddirection_10m[idx] || 0) * Math.PI / 180;
    State.windField.push({ lat: pt.lat, lng: pt.lng, u: -ms*Math.sin(rad), v: -ms*Math.cos(rad), ms, marine: isMarine(pt.lat, pt.lng) });
  }
  SpatialIndex.build(State.windField);
  const vb = State.map ? State.map.getBounds() : null;
  return WindTexture.build(State.windField, vb).then(() => { Crosshair.refresh(); WeatherWidget.refresh(); }).catch(e => console.error('[WindTexture]', e));
}

/* ── SPOT MARKERS ─────────────────────────────────────────────── */
/* ── SPOT INDEX — 1.0–10.0 score combining wind speed + direction ─
   Wind speed: 0–5 m/s → 0–4 pts, 5–8 → 4–6, 8–12 → 6–9, 12–15 → 9–10, >15 → drops
   Direction bonus: optimal dir → full speed score, 45° off → 70%, 90° off → 30%
   ──────────────────────────────────────────────────────────────────── */
const DIR_DEG = { N:0, NE:45, E:90, SE:135, S:180, SW:225, W:270, NW:315 };

function dirMatchScore(windDeg, bestDirs) {
  if (!bestDirs || !bestDirs.length) return 0.7;
  let best = 0;
  for (const d of bestDirs) {
    const optimal = DIR_DEG[d];
    if (optimal === undefined) continue;
    let diff = Math.abs(windDeg - optimal) % 360;
    if (diff > 180) diff = 360 - diff;
    const score = diff <= 90 ? Math.cos(diff * Math.PI / 180) * 0.7 + 0.3 : 0;
    if (score > best) best = score;
  }
  return best;
}

/* ── SPOT INDEX 0–100 ─────────────────────────────────────────────
   Components:
   • Speed (50 pts)  — bell curve peaking at 10–14 m/s
   • Direction (30 pts) — how well wind matches spot's best dirs
   • Gust penalty (−20 pts max) — high gust/ms ratio reduces score
   ────────────────────────────────────────────────────────────────── */
function spotIndex(ms, windDeg, bestDirs, gustMs) {
  /* ── NOPEUS 0–60 pts (enemmän painoa) ────────────────────────
     Huippu 11–14 m/s = 60 pts. Alle 2 nolla. Yli 22 nolla.  */
  let speedPts;
  if (ms < 2)        speedPts = 0;
  else if (ms < 5)   speedPts = (ms-2)/3 * 16;           /* 0→16   */
  else if (ms < 8)   speedPts = 16 + (ms-5)/3 * 36;      /* 16→52  */
  else if (ms < 11)  speedPts = 52 + (ms-8)/3 * 8;       /* 52→60  */
  else if (ms < 14)  speedPts = 60;                       /* plateau */
  else if (ms < 17)  speedPts = 60 - (ms-14)/3 * 22;     /* 60→38  */
  else if (ms < 22)  speedPts = 38 - (ms-17)/5 * 34;     /* 38→4   */
  else               speedPts = 0;
  speedPts = Math.max(0, speedPts);

  /* ── SUUNTA 0–30 pts ──────────────────────────────────────────
     cos²-käyrä, cutoff 80°. Painotetaan nopeudella.          */
  const speedWeight = ms <= 8 ? ms / 8 : ms <= 14 ? 1.0 : Math.max(0, 1 - (ms - 14) / 10);
  let dirPts = 0;
  if (bestDirs && bestDirs.length) {
    let bestDiff = 180;
    for (const d of bestDirs) {
      const optimal = DIR_DEG[d];
      if (optimal === undefined) continue;
      let diff = Math.abs(windDeg - optimal) % 360;
      if (diff > 180) diff = 360 - diff;
      if (diff < bestDiff) bestDiff = diff;
    }
    if (bestDiff <= 80) {
      dirPts = Math.pow(Math.cos(bestDiff * Math.PI / 160), 2) * 30;
    }
  } else {
    dirPts = 15;
  }
  dirPts *= speedWeight;

  /* ── PUUSKAISUUS −0…−5 pts (pieni vaikutus) ──────────────────
     Helsingissä aina puuskaista — vain äärimmäiset rangaistaan
     1.0–1.4 → ei rangaistusta
     1.4–2.5 → −0…−5                                           */
  let gustPenalty = 0;
  if (gustMs && ms > 1) {
    const ratio = gustMs / ms;
    if (ratio > 1.4) gustPenalty = Math.min(5, (ratio - 1.4) / 1.1 * 5);
  }

  return Math.min(100, Math.max(0, Math.round(speedPts + dirPts - gustPenalty)));
}

/* Smooth gradient color: grey → yellow → light green → green
   0   = #888aaa (grey)
   30  = #c8c020 (yellow-green starts)
   50  = #7dd44a (light green)
   65  = #4de87a (green)
   100 = #00ff88 (bright green)
   Uses RGB lerp between keypoints                              */
function spotIndexColor(score) {
  const stops = [
    [  0, [100, 102, 130]],   /* dark grey   */
    [ 25, [130, 132, 155]],   /* grey        */
    [ 35, [160, 175,  25]],   /* yellow      */
    [ 48, [130, 210,  35]],   /* yellow-green */
    [ 60, [ 80, 225,  70]],   /* light green */
    [ 75, [ 40, 230, 110]],   /* green       */
    [100, [  0, 255, 140]],   /* bright green */
  ];
  const s = Math.max(0, Math.min(100, score));
  let i = 0;
  while (i < stops.length - 2 && stops[i+1][0] <= s) i++;
  const [s0, c0] = stops[i], [s1, c1] = stops[i+1];
  const t = (s - s0) / (s1 - s0);
  const r = Math.round(c0[0] + t * (c1[0] - c0[0]));
  const g = Math.round(c0[1] + t * (c1[1] - c0[1]));
  const b = Math.round(c0[2] + t * (c1[2] - c0[2]));
  return `rgb(${r},${g},${b})`;
}

/* SVG circle marker with arc progress bar + score + name */
function spotMarkerSVG(score, name, size) {
  const col = spotIndexColor(score);
  const R = size / 2 - 3;          /* arc radius */
  const cx = size / 2, cy = size / 2;
  const circ = 2 * Math.PI * R;
  const filled = circ * (score / 100);
  const gap = circ - filled;

  /* Arc starts at top (-90°) */
  const trackArc = `M ${cx} ${cy - R} A ${R} ${R} 0 1 1 ${cx - 0.01} ${cy - R}`;
  const fillArc  = `M ${cx} ${cy - R} A ${R} ${R} 0 1 1 ${cx - 0.01} ${cy - R}`;

  /* Use stroke-dasharray trick on a full circle path */
  const scoreStr = String(score);
  const fontSize = score >= 100 ? 13 : 15;

  return (
    `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`
    /* Black bg circle */
    + `<circle cx="${cx}" cy="${cy}" r="${size/2}" fill="rgba(6,9,18,0.82)"/>`
    /* Track ring (dark) */
    + `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>`
    /* Progress arc */
    + `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${col}" stroke-width="3" stroke-linecap="round"`
    + ` stroke-dasharray="${filled} ${gap}" stroke-dashoffset="${circ * 0.25}" transform="rotate(-90 ${cx} ${cy})"/>`
    /* Score number */
    + `<text x="${cx}" y="${cy + fontSize*0.35}" text-anchor="middle" font-family="DM Mono,monospace" font-size="${fontSize}" font-weight="700" fill="${col}">${scoreStr}</text>`
    + `</svg>`
  );
}

/* Name label below circle */
function spotNameLabel(name, col) {
  return (
    `<div style="font-family:'DM Mono',monospace;font-size:8px;font-weight:600;color:${col};`
    + `text-align:center;line-height:1.2;margin-top:2px;`
    + `text-shadow:0 1px 3px rgba(0,0,0,0.9);white-space:nowrap;max-width:64px;`
    + `overflow:hidden;text-overflow:ellipsis;">${name}</div>`
  );
}

function dirArrow(deg) { return ['\u2193','\u2199','\u2190','\u2196','\u2191','\u2197','\u2192','\u2198'][Math.round((deg % 360) / 45) % 8]; }

function windBadge(ms) {
  if (ms < 4)  return { text: 'Tyyni – ei sovi', cls: 'b-calm', icon: '😴' };
  if (ms < 6)  return { text: 'Rajatuuli – kokeile', cls: 'b-light', icon: '🌬' };
  if (ms < 9)  return { text: 'Ajettava!', cls: 'b-good', icon: '🪁' };
  if (ms < 13) return { text: 'Hyvä! Foilaile!', cls: 'b-perfect', icon: '⚡' };
  if (ms < 18) return { text: 'Kova – kokenut', cls: 'b-strong', icon: '💪' };
  return { text: 'Liian kova', cls: 'b-danger', icon: '⛔' };
}

function windTrend(h, idx) {
  const future = Math.min(idx + 3, h.windspeed_10m.length - 1);
  const now = h.windspeed_10m[idx] || 0, later = h.windspeed_10m[future] || 0;
  const diff = later - now;
  if (diff > 2) return { arrow: '↑', label: 'Nouseva', cls: 'gi-gusty' };
  if (diff < -2) return { arrow: '↓', label: 'Laskeva', cls: 'gi-steady' };
  return { arrow: '→', label: 'Vakaa', cls: '' };
}
function gustIndex(ms, gst) {
  if (ms < 1) return { val: 1, label: 'Tyyni', cls: 'gi-steady' };
  const gi = gst / ms;
  if (gi < 1.2) return { val: gi, label: 'Tasainen', cls: 'gi-steady' };
  if (gi < 1.5) return { val: gi, label: 'Puuskainen', cls: 'gi-gusty' };
  return { val: gi, label: 'Hyvin puuskainen', cls: 'gi-extreme' };
}

function renderSpots(hourIdx) {
  for (const m of State.markers) m.remove(); State.markers = [];
  const layer = State.activeLayer, zoom = State.map ? State.map.getZoom() : 5;
  for (const spot of SPOTS) {
    if (!spot.wx || !spot.wx.hourly) continue;
    const h = spot.wx.hourly, idx = Math.min(hourIdx, h.windspeed_10m.length - 1);
    const ms  = h.windspeed_10m[idx] || 0;
    const gst = (h.windgusts_10m && h.windgusts_10m[idx]) || ms;
    const dir = h.winddirection_10m[idx] || 0;
    const dms = layer === 'gust' ? gst : ms;

    /* v7: score 0–100 */
    const score = spotIndex(ms, dir, spot.bestDirs, gst);
    const col   = spotIndexColor(score);

    let html, iconW, iconH, anchor;

    if (zoom >= 7) {
      /* Full circle (36px) + name label */
      const sz = 36;
      html = (
        '<div style="display:inline-flex;flex-direction:column;align-items:center;cursor:pointer">'
        + spotMarkerSVG(score, spot.name, sz)
        + spotNameLabel(spot.name, col)
        + '</div>'
      );
      iconW = 64; iconH = sz + 14;
      anchor = [iconW / 2, sz / 2];
    } else if (zoom >= 5) {
      /* Smaller circle (28px), no name */
      const sz = 28;
      html = '<div style="cursor:pointer">' + spotMarkerSVG(score, spot.name, sz) + '</div>';
      iconW = sz; iconH = sz;
      anchor = [sz / 2, sz / 2];
    } else {
      /* Tiny dot for far zoom */
      const c = ColorRamp.rgb(dms);
      const sz = 7;
      html = `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${col};border:1.5px solid rgba(255,255,255,.5);box-shadow:0 0 6px ${col}88;cursor:pointer"></div>`;
      iconW = sz; iconH = sz;
      anchor = [sz / 2, sz / 2];
    }

    const icon = L.divIcon({ className: '', html, iconSize: [iconW, iconH], iconAnchor: anchor });
    State.markers.push(
      L.marker([spot.lat, spot.lng], { icon })
        .on('click', () => { Haptics.medium(); openSheet(spot, hourIdx); })
        .addTo(State.map)
    );
  }
}

/* ── BOTTOM SHEET — v6 redesigned spot card ───────────────────── */
function fmtHour(iso) { if (!iso) return '--'; const d = new Date(iso); return ('0'+d.getHours()).slice(-2)+':00'; }
function fmtDateTime(iso) {
  if (!iso) return '--';
  const d = new Date(iso);
  const DAY = ['Su','Ma','Ti','Ke','To','Pe','La'];
  const MON = ['tam','hel','maa','huh','tou','kes','hei','elo','syy','lok','mar','jou'];
  return DAY[d.getDay()] + ' ' + d.getDate() + '. ' + MON[d.getMonth()] + ' · ' + ('0'+d.getHours()).slice(-2) + ':00';
}
function isNightHour(iso) {
  if (!iso) return false;
  const h = new Date(iso).getHours();
  return h >= 23 || h < 6;
}


function openSheet(spot, hourIdx) {
  if (!spot.wx || !spot.wx.hourly) return;
  State.sheetSpot = spot;
  const h = spot.wx.hourly, idx = Math.min(hourIdx, h.windspeed_10m.length - 1);
  const ms = h.windspeed_10m[idx] || 0;
  const dir = h.winddirection_10m[idx] || 0;
  const gst = (h.windgusts_10m && h.windgusts_10m[idx]) || ms;
  const badge = windBadge(ms);
  const gi = gustIndex(ms, gst);
  const trend = windTrend(h, idx);
  const c = ColorRamp.rgb(ms);
  const colorStr = 'rgb('+c.r+','+c.g+','+c.b+')';
  const waterTemp = spot._waterTemp != null ? spot._waterTemp.toFixed(1) + '°C' : '—';

  /* 12h forecast bars */
  const cs = idx, ce = Math.min(h.windspeed_10m.length, cs + 12);
  let maxMs = 1;
  for (let i = cs; i < ce; i++) { const v = h.windspeed_10m[i] || 0; if (v > maxMs) maxMs = v; }
  let peakMs = 0, peakHour = '';
  for (let i = cs; i < ce; i++) { const v = h.windspeed_10m[i] || 0; if (v > peakMs) { peakMs = v; peakHour = fmtHour(h.time[i]); } }

  let bars = '';
  for (let i = cs; i < ce; i++) {
    const v = h.windspeed_10m[i] || 0;
    const bc = ColorRamp.rgb(v);
    const barH = Math.max(6, (v / maxMs) * 100);
    const isNow = i === idx;
    const foilH = v >= 8;
    bars += '<div class="sh-bar' + (foilH ? ' foilable' : '') + '" style="height:' + barH + '%;background:rgb(' + bc.r + ',' + bc.g + ',' + bc.b + ');' + (isNow ? 'outline:1.5px solid rgba(255,255,255,.5);outline-offset:-1px;' : '') + '"></div>';
  }

  document.getElementById('sheet-content').innerHTML =
    /* Hero */
    '<div class="sh-hero">'
      + '<div class="sh-hero-top">'
      + '<div class="sh-hero-left">'
        + '<div class="sh-name">' + spot.name + '</div>'
        + '<div class="sh-desc">' + spot.desc + '</div>'
        + '<div class="sh-datetime">🕐 ' + fmtDateTime(h.time ? h.time[idx] : null) + '</div>'
        + (()=>{
            const si = spotIndex(ms, dir, spot.bestDirs, gst);
            const sc = spotIndexColor(si);
            const svg = spotMarkerSVG(si, '', 56);
            const dirs = spot.bestDirs ? spot.bestDirs.join(' · ') : '';
            return '<div style="display:inline-flex;align-items:center;gap:12px;margin-bottom:14px">'
              + svg
              + '<div style="font-family:DM Mono,monospace;line-height:1.6">'
              + '<div style="font-size:9px;color:rgba(180,215,255,.5);text-transform:uppercase;letter-spacing:1px">Spottiindeksi</div>'
              + '<div style="font-size:11px;color:'+sc+';font-weight:600">'+dirs+'</div>'
              + '</div></div>';
          })()
      + '</div>'
      + '<div class="sh-hero-right">'
        + '<div class="sh-big-wind" style="color:' + colorStr + '">' + Units.fmt(ms) + '</div>'
        + '<span class="sh-big-unit">' + Units.label() + '</span>'
      + '</div>'
      + '</div>'  /* close sh-hero-top */
    + '</div>'

    /* Foil badge */
    + '<div class="sh-foil-badge ' + badge.cls + '">'
      + '<span class="badge-icon">' + badge.icon + '</span>'
      + badge.text
    + '</div>'

    /* 4 stats */
    + '<div class="sh-stats">'
      + _statCard('Puuska', Units.fmt(gst), Units.label(), ColorRamp.rgb(gst))
      + _statCard('Suunta', Math.round(dir) + '°', dirArrow(dir), null)
      + _statCard('Trendi', trend.arrow + ' ' + trend.label, '3h', null, trend.cls)
      + _statCard('Vesi', waterTemp, '', null)
    + '</div>'

    /* 2 condition cards */
    + '<div class="sh-conditions">'
      + _condCard('🌊', 'Puuskaisuus', '<span class="' + gi.cls + '">' + gi.label + '</span>')
      + _condCard('🧭', 'Tuulen suunta', dirArrow(dir) + ' ' + Math.round(dir) + '° · ' + _cardinalFi(dir))
    + '</div>'

    /* Wind rose */
    + buildWindRoseSVG(h, idx)

    /* 12h chart */
    + '<div class="sh-chart-section">'
      + '<div class="sh-chart-header">'
        + '<span class="sh-chart-title">Seuraavat 12h</span>'
        + (peakMs > 0 ? '<span class="sh-chart-peak">Huippu ' + Units.fmt(peakMs) + ' ' + Units.label() + ' klo ' + peakHour + '</span>' : '')
      + '</div>'
      + '<div class="sh-chart">' + bars + '</div>'
      + '<div class="sh-chart-labels"><span>' + fmtHour(h.time[cs]) + '</span><span>+12h</span></div>'
    + '</div>';

  document.getElementById('sheet').classList.add('open');
  document.getElementById('sheet-overlay').classList.add('open');
  Haptics.medium();
}

function _statCard(label, value, sub, rgb, cls) {
  const color = rgb ? 'color:rgb('+rgb.r+','+rgb.g+','+rgb.b+')' : '';
  return '<div class="sh-stat">'
    + '<span class="sh-stat-label">' + label + '</span>'
    + '<span class="sh-stat-value ' + (cls||'') + '" style="' + color + '">' + value + '</span>'
    + '<span class="sh-stat-sub">' + sub + '</span>'
    + '</div>';
}
function _condCard(icon, label, value) {
  return '<div class="sh-cond-card">'
    + '<span class="sh-cond-icon">' + icon + '</span>'
    + '<div class="sh-cond-info"><div class="sh-cond-label">' + label + '</div><div class="sh-cond-val">' + value + '</div></div>'
    + '</div>';
}
function _cardinalFi(deg) {
  const dirs = ['P','KP','K','KE','E','KA','K','KA'];
  const dirs16 = ['P','PPK','PK','KPK','K','EKE','KE','EKE','E','EKA','KA','EKA','E','PKA','PA','PPK'];
  const idx = Math.round(deg / 22.5) % 16;
  return ['P','PPK','PK','IPK','I','IKI','KI','EKI','E','EKA','KA','IKA','I','IPA','PA','PPA'][idx] || '';
}

function closeSheet() {
  State.sheetSpot = null;
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('sheet-overlay').style.background = '';
}

document.getElementById('sheet-overlay').addEventListener('click', () => {
  closeSheet(); SpotList.close();
}, { passive: true });
document.getElementById('sheet-handle').addEventListener('click', closeSheet, { passive: true });

/* ── TIMELINE ─────────────────────────────────────────────────── */
function bestTimelineRef() {
  let best = null, bestLen = 0;
  for (const s of SPOTS) {
    if (s.wx && s.wx.hourly && s.wx.hourly.windspeed_10m) {
      const len = s.wx.hourly.windspeed_10m.length;
      if (len > bestLen) { bestLen = len; best = s; }
    }
  }
  if (best) return best;
  for (const p of ViewportGrid.getAllPoints()) {
    if (p.wx && p.wx.hourly && p.wx.hourly.windspeed_10m) {
      const len = p.wx.hourly.windspeed_10m.length;
      if (len > bestLen) { bestLen = len; best = p; }
    }
  }
  return best;
}

function nowIdx(times) {
  if (!times || !times.length) return 0;
  const now = Date.now(); let best = 0, bd = Infinity;
  for (let i = 0; i < times.length; i++) {
    const diff = Math.abs(new Date(times[i]).getTime() - now);
    if (diff < bd) { bd = diff; best = i; }
  }
  return best;
}

function renderTimeline(times, speeds, dirs, activeIdx) {
  const tl = document.getElementById('tl-scroll'); tl.innerHTML = '';
  if (!times || !times.length) return;
  State._tlTimes = times; State._tlSpeeds = speeds; State._tlDirs = dirs;
  State._tlTicks = [];
  const TICK_W = 24;
  const DAY = ['Su','Ma','Ti','Ke','To','Pe','La']; let lastDay = -1;

  let maxMs = 1;
  for (let i = 0; i < speeds.length; i++) { if ((speeds[i]||0) > maxMs) maxMs = speeds[i]; }

  const spacerL = document.createElement('div');
  spacerL.style.cssText = 'flex:0 0 ' + (window.innerWidth / 2 - TICK_W / 2) + 'px';
  tl.appendChild(spacerL);

  const realNowIdx = nowIdx(times);
  let nowMarkerInserted = false;

  for (let i = 0; i < times.length; i++) {
    const d = new Date(times[i]), day = d.getDay(), hour = d.getHours();
    if (day !== lastDay) {
      lastDay = day;
      const sep = document.createElement('div'); sep.className = 'day-sep';
      sep.textContent = DAY[day] + ' ' + d.getDate() + '.';
      tl.appendChild(sep);
    }
    if (!nowMarkerInserted && i >= realNowIdx) {
      const nowLine = document.createElement('div');
      nowLine.className = 'tl-now-marker';
      nowLine.innerHTML = '<span class="tl-now-label">NYT</span>';
      tl.appendChild(nowLine);
      nowMarkerInserted = true;
    }
    const ms = speeds[i]||0, bc = ColorRamp.rgb(ms);
    const tick = document.createElement('div');
    const isPast = i < realNowIdx;
    tick.className = 'htick' + (hour % 3 === 0 ? ' show-lbl' : '') + (isPast ? ' past' : '');
    tick.dataset.idx = i;
    const barH = Math.max(3, (ms / maxMs) * 48);
    const foilable = ms >= 8;
    tick.innerHTML = '<div class="htick-bar' + (foilable ? ' foilable' : '') + '" style="height:' + barH + 'px;background:rgb(' + bc.r + ',' + bc.g + ',' + bc.b + ')' + (foilable ? ';border-bottom:2px solid rgb(80,237,120)' : '') + '"></div>'
      + '<span class="htick-lbl">' + ('0'+hour).slice(-2) + '</span>';
    tl.appendChild(tick);
    State._tlTicks.push(tick);
  }

  const spacerR = document.createElement('div');
  spacerR.style.cssText = 'flex:0 0 ' + (window.innerWidth / 2 - TICK_W / 2) + 'px';
  tl.appendChild(spacerR);

  requestAnimationFrame(() => {
    const target = State._tlTicks[activeIdx];
    if (target) tl.scrollLeft = target.offsetLeft - tl.offsetWidth / 2 + TICK_W / 2;
    _tlUpdateNow(activeIdx);
  });

  let _scrollTimer = null;
  let _lastTickIdx = activeIdx;
  let _isScrolling = false;

  tl.addEventListener('scroll', () => {
    /* During scroll: update bubble live + haptic on each new hour */
    if (!_isScrolling) { _isScrolling = true; }
    const center = tl.scrollLeft + tl.offsetWidth / 2;
    let bestIdx = 0, bestDist = Infinity;
    for (let i = 0; i < State._tlTicks.length; i++) {
      const dist = Math.abs(center - (State._tlTicks[i].offsetLeft + 12));
      if (dist < bestDist) { bestDist = dist; bestIdx = i; }
    }
    if (bestIdx !== _lastTickIdx) {
      Haptics.selection();
      _lastTickIdx = bestIdx;
      _tlUpdateNow(bestIdx);
    }
    /* On scroll end: snap smoothly to center of nearest tick */
    clearTimeout(_scrollTimer);
    _scrollTimer = setTimeout(() => {
      _isScrolling = false;
      _tlSnapSelect(tl);
    }, 120);
  }, { passive: true });

  tl.addEventListener('click', (e) => {
    const tick = e.target.closest('.htick');
    if (!tick || !tick.dataset.idx) return;
    const idx = parseInt(tick.dataset.idx);
    if (isNaN(idx)) return;
    Haptics.selection();
    tl.scrollTo({ left: tick.offsetLeft - tl.offsetWidth / 2 + TICK_W / 2, behavior: 'smooth' });
    if (idx !== State.currentHourIdx) {
      State.currentHourIdx = idx;
      _tlUpdateNow(idx);
      buildWindField(idx).then(() => { drawColorField(); resetParticles(); });
      renderSpots(idx);
      if (State.sheetSpot) openSheet(State.sheetSpot, idx);
    }
  });
}

function _tlUpdateNow(idx) {
  if (!State._tlTimes || !State._tlTimes[idx]) return;
  const d = new Date(State._tlTimes[idx]);
  const DAY = ['Su','Ma','Ti','Ke','To','Pe','La'];
  const hh = ('0'+d.getHours()).slice(-2);
  const dateStr = DAY[d.getDay()] + ' ' + d.getDate() + '.' + (d.getMonth()+1) + '.';
  const bubble = document.getElementById('tl-time-bubble');
  if (bubble) bubble.innerHTML =
    '<div style="font-size:9px;color:rgba(0,207,255,.7);letter-spacing:.5px;font-weight:500;margin-bottom:1px">' + dateStr + '</div>'
    + '<div style="font-size:18px;font-weight:700;letter-spacing:1px;color:#fff;line-height:1">' + hh + '<span style="opacity:.5">:00</span></div>';
}

function _tlSnapSelect(tl) {
  const center = tl.scrollLeft + tl.offsetWidth / 2;
  let bestIdx = 0, bestDist = Infinity;
  for (let i = 0; i < State._tlTicks.length; i++) {
    const tick = State._tlTicks[i];
    const tickCenter = tick.offsetLeft + 12; /* 12 = TICK_W/2 */
    const dist = Math.abs(center - tickCenter);
    if (dist < bestDist) { bestDist = dist; bestIdx = i; }
  }
  /* Snap scroll to exact center of winning tick */
  const snapTarget = State._tlTicks[bestIdx];
  if (snapTarget) {
    tl.scrollTo({ left: snapTarget.offsetLeft - tl.offsetWidth / 2 + 12, behavior: 'smooth' });
  }
  if (bestIdx !== State.currentHourIdx) {
    State.currentHourIdx = bestIdx;
    State._lastTlHour = bestIdx;
    _tlUpdateNow(bestIdx);
    buildWindField(bestIdx).then(() => { drawColorField(); resetParticles(); });
    renderSpots(bestIdx);
    if (State.sheetSpot) openSheet(State.sheetSpot, bestIdx);
  }
}

function scrollTimelineTo(idx) {
  const tl = document.getElementById('tl-scroll');
  if (!tl || !State._tlTicks || !State._tlTicks[idx]) return;
  const target = State._tlTicks[idx];
  tl.scrollTo({ left: target.offsetLeft - tl.offsetWidth / 2 + 10, behavior: 'smooth' });
}

/* ── PLAY ─────────────────────────────────────────────────────── */
function togglePlay() {
  const btn = document.getElementById('btn-play'), icon = document.getElementById('play-icon');
  if (State.isPlaying) { stopPlay(); return; }
  Haptics.light();
  State.isPlaying = true; btn.classList.add('playing');
  icon.innerHTML = '<rect x="5" y="4" width="4" height="16" rx="1" fill="white"/><rect x="15" y="4" width="4" height="16" rx="1" fill="white"/>';
  if (!State._tlTicks || !State._tlTicks.length) { stopPlay(); return; }
  let cur = State.currentHourIdx || 0;
  State.playTimer = setInterval(() => { cur++; if (cur >= State._tlTicks.length) cur = 0; scrollTimelineTo(cur); }, Config.PLAY_INTERVAL_MS);
}
function stopPlay() {
  State.isPlaying = false; clearInterval(State.playTimer);
  document.getElementById('btn-play').classList.remove('playing');
  document.getElementById('play-icon').innerHTML = '<path d="M7 4.5v15l12-7.5z" fill="white"/>';
}

/* ── WEATHER WIDGET ───────────────────────────────────────────── */
const WeatherWidget = {
  _el: null, _iconEl: null, _tempEl: null, _descEl: null,
  _cache: {}, _fetchTimer: null,
  _codes: {
    0: ['☀️','Selkeää'], 1: ['🌤','Melko selkeää'], 2: ['⛅','Puolipilvistä'], 3: ['☁️','Pilvistä'],
    45: ['🌫','Sumua'], 48: ['🌫','Huurretta'],
    51: ['🌦','Kevyttä tihkua'], 53: ['🌦','Tihkua'], 55: ['🌧','Tiheää tihkua'],
    61: ['🌧','Kevyttä sadetta'], 63: ['🌧','Sadetta'], 65: ['🌧','Rankkasadetta'],
    71: ['🌨','Kevyttä lunta'], 73: ['🌨','Lumisadetta'], 75: ['🌨','Tiheää lunta'],
    80: ['🌦','Sadekuuroja'], 81: ['🌧','Kuuroja'], 82: ['⛈','Rankkakuuroja'],
    95: ['⛈','Ukkosmyrsky'], 96: ['⛈','Ukkosta, rakeita'], 99: ['⛈','Ukkosta, rakeita']
  },
  init() {
    this._el = document.getElementById('wx-widget');
    this._iconEl = document.getElementById('wx-icon');
    this._tempEl = document.getElementById('wx-temp');
    this._descEl = document.getElementById('wx-desc');
  },
  scheduleUpdate() {
    clearTimeout(this._fetchTimer);
    this._fetchTimer = setTimeout(() => this._update(), 500);
  },
  async _update() {
    if (!State.map || !this._el) return;
    const c = State.map.getCenter();
    const lat = (Math.round(c.lat * 2) / 2).toFixed(1);
    const lng = (Math.round(c.lng * 2) / 2).toFixed(1);
    const key = lat + ',' + lng;
    if (this._cache[key] && Date.now() - this._cache[key].ts < 30 * 60 * 1000) {
      this._render(this._cache[key].data, State.currentHourIdx); return;
    }
    try {
      const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lng
        + '&hourly=temperature_2m,weather_code&forecast_days=5&timezone=auto';
      const r = await fetch(url);
      if (!r.ok) return;
      const data = await r.json();
      if (data && data.hourly) { this._cache[key] = { ts: Date.now(), data }; this._render(data, State.currentHourIdx); }
    } catch(e) {}
  },
  _render(data, hourIdx) {
    if (!data || !data.hourly) { this._el.classList.add('hidden'); return; }
    const h = data.hourly;
    let idx = Math.min(hourIdx, (h.temperature_2m || []).length - 1);
    if (State._tlTimes && State._tlTimes[hourIdx] && h.time) {
      const target = new Date(State._tlTimes[hourIdx]).getTime();
      let bestDiff = Infinity;
      for (let j = 0; j < h.time.length; j++) {
        const diff = Math.abs(new Date(h.time[j]).getTime() - target);
        if (diff < bestDiff) { bestDiff = diff; idx = j; }
      }
    }
    const temp = h.temperature_2m ? h.temperature_2m[idx] : null;
    const code = h.weather_code ? h.weather_code[idx] : 0;
    const info = this._codes[code] || ['🌡',''];
    this._el.classList.remove('hidden');
    this._iconEl.textContent = info[0];
    this._tempEl.textContent = temp != null ? Math.round(temp) + '°' : '--°';
    this._descEl.textContent = info[1];
  },
  refresh() {
    if (!this._el) return;
    const c = State.map ? State.map.getCenter() : null; if (!c) return;
    const lat = (Math.round(c.lat * 2) / 2).toFixed(1);
    const lng = (Math.round(c.lng * 2) / 2).toFixed(1);
    const key = lat + ',' + lng;
    if (this._cache[key]) this._render(this._cache[key].data, State.currentHourIdx);
    else this.scheduleUpdate();
  }
};

/* ── CROSSHAIR ────────────────────────────────────────────────── */
const Crosshair = {
  _el: null, _speedEl: null, _arrowEl: null, _degEl: null, _gustEl: null,
  _chEl: null, _windArrow: null, _updateTimer: null,
  init() {
    this._el = document.getElementById('crosshair-readout');
    this._speedEl = document.getElementById('cr-speed');
    this._arrowEl = document.getElementById('cr-dir-arrow');
    this._degEl = document.getElementById('cr-dir-deg');
    this._gustEl = document.getElementById('cr-gust');
    this._chEl = document.getElementById('crosshair');
    this._windArrow = document.getElementById('ch-wind-arrow');
    if (!State.map) return;
    State.map.on('movestart', () => { if (this._chEl) this._chEl.classList.add('panning'); });
    State.map.on('moveend', () => { if (this._chEl) this._chEl.classList.remove('panning'); this._update(); });
    State.map.on('move', () => this._scheduleUpdate());
    this._update();
  },
  _scheduleUpdate() {
    if (this._updateTimer) return;
    this._updateTimer = setTimeout(() => { this._updateTimer = null; this._update(); }, 60);
  },
  _update() {
    if (!this._el || !State.map) return;
    const center = State.map.getCenter();
    let w;
    if (WindTexture.msData) w = WindTexture.sampleWind(center.lat, center.lng);
    else if (State.windField.length) w = idw(center.lat, center.lng);
    else { this._el.classList.add('hidden'); return; }
    if (w.ms < 0.05) { this._el.classList.add('hidden'); return; }
    this._el.classList.remove('hidden');
    const c = ColorRamp.rgb(w.ms);
    const colorStr = 'rgb('+c.r+','+c.g+','+c.b+')';
    this._speedEl.innerHTML = '<span style="color:'+colorStr+'">'+Units.fmt(w.ms)+'</span><span class="cr-speed-unit">'+Units.label()+'</span>';
    const dir = (Math.atan2(-w.u, -w.v) * 180 / Math.PI + 360) % 360;
    const arrows = ['↓','↙','←','↖','↑','↗','→','↘'];
    this._arrowEl.textContent = arrows[Math.round(dir / 45) % 8];
    this._arrowEl.style.color = colorStr;
    this._degEl.textContent = Math.round(dir) + '°';
    if (this._windArrow) this._windArrow.style.transform = 'rotate(' + Math.round(dir) + 'deg)';
    const allPts = ViewportGrid.getAllPoints();
    let gustMs = null, minD = Infinity;
    const cos2 = Math.cos(center.lat * Math.PI / 180) ** 2;
    for (const pt of allPts) {
      if (!pt.wx || !pt.wx.hourly || !pt.wx.hourly.windgusts_10m) continue;
      const d = (center.lat - pt.lat) ** 2 + (center.lng - pt.lng) ** 2 * cos2;
      if (d < minD) {
        minD = d;
        const idx2 = Math.min(State.currentHourIdx, pt.wx.hourly.windgusts_10m.length - 1);
        gustMs = pt.wx.hourly.windgusts_10m[idx2];
      }
    }
    if (gustMs != null && gustMs > w.ms * 1.05) {
      const gc = ColorRamp.rgb(gustMs);
      this._gustEl.innerHTML = 'Puuska <span style="color:rgb('+gc.r+','+gc.g+','+gc.b+')">'+Units.fmt(gustMs)+'</span> '+Units.label();
      this._gustEl.style.display = '';
    } else { this._gustEl.style.display = 'none'; }
  },
  refresh() { this._update(); }
};

/* ── WIND ROSE ────────────────────────────────────────────────── */
function buildWindRoseSVG(h, idx) {
  const DIRS = 16;
  const bins = new Array(DIRS).fill(0);
  const start = Math.max(0, idx - 12), end = Math.min(h.windspeed_10m.length, idx + 12);
  let maxBin = 1, count = 0;
  for (let i = start; i < end; i++) {
    const ms = h.windspeed_10m[i] || 0;
    if (ms < 0.5) continue;
    const d = h.winddirection_10m[i] || 0;
    const bin = Math.round(d / (360 / DIRS)) % DIRS;
    bins[bin] += ms; count++;
  }
  if (!count) return '';
  for (let i = 0; i < DIRS; i++) if (bins[i] > maxBin) maxBin = bins[i];
  const cx = 70, cy = 70, R = 55;
  const labels = ['N','','NE','','E','','SE','','S','','SW','','W','','NW',''];
  let paths = '', dots = '', lbls = '';
  for (let i = 0; i < DIRS; i++) {
    const ang = (i * (360 / DIRS) - 90) * Math.PI / 180;
    const r = (bins[i] / maxBin) * R;
    const c = ColorRamp.rgb(bins[i] / (count > 0 ? count / DIRS : 1));
    const x = cx + Math.cos(ang) * r, y = cy + Math.sin(ang) * r;
    if (r > 2) {
      paths += '<line x1="'+cx+'" y1="'+cy+'" x2="'+x+'" y2="'+y+'" stroke="rgb('+c.r+','+c.g+','+c.b+')" stroke-width="4" stroke-linecap="round" opacity="0.7"/>';
      dots += '<circle cx="'+x+'" cy="'+y+'" r="3" fill="rgb('+c.r+','+c.g+','+c.b+')"/>';
    }
    if (labels[i]) {
      lbls += '<text x="'+(cx+Math.cos(ang)*(R+12))+'" y="'+(cy+Math.sin(ang)*(R+12))+'" text-anchor="middle" dominant-baseline="central" fill="rgba(180,215,255,0.4)" font-size="8" font-family="DM Mono,monospace">'+labels[i]+'</text>';
    }
  }
  const rings = '<circle cx="'+cx+'" cy="'+cy+'" r="'+(R*0.33)+'" fill="none" stroke="rgba(255,255,255,0.06)"/>'
    + '<circle cx="'+cx+'" cy="'+cy+'" r="'+(R*0.66)+'" fill="none" stroke="rgba(255,255,255,0.06)"/>'
    + '<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="none" stroke="rgba(255,255,255,0.08)"/>';
  return '<div class="sh-windrose"><svg width="160" height="160" viewBox="0 0 140 140">'+rings+paths+dots+lbls+'</svg></div>';
}

/* ── MARINE API ───────────────────────────────────────────────── */
async function loadMarineTemp() {
  try {
    const lats = SPOTS.map(s => s.lat.toFixed(2)).join(',');
    const lngs = SPOTS.map(s => s.lng.toFixed(2)).join(',');
    const url = 'https://marine-api.open-meteo.com/v1/marine?latitude='+lats+'&longitude='+lngs+'&current=sea_surface_temperature';
    const r = await fetch(url); if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    const arr = Array.isArray(data) ? data : [data];
    arr.forEach((d, i) => {
      if (i < SPOTS.length && d && d.current && d.current.sea_surface_temperature != null) {
        SPOTS[i]._waterTemp = d.current.sea_surface_temperature;
      }
    });
  } catch(e) { console.log('[Marine]', e.message); }
}

/* ── SPOT LIST ────────────────────────────────────────────────── */
const SpotList = {
  _open: false,
  toggle() {
    this._open = !this._open;
    const el = document.getElementById('spot-list');
    const overlay = document.getElementById('sheet-overlay');
    if (this._open) {
      Haptics.medium();
      closeSheet();
      this.render();
      el.classList.add('open');
      overlay.classList.add('open');
    } else {
      el.classList.remove('open');
      overlay.classList.remove('open');
    }
  },
  close() {
    this._open = false;
    document.getElementById('spot-list').classList.remove('open');
    document.getElementById('sheet-overlay').classList.remove('open');
    document.getElementById('sheet-overlay').style.background = '';
  },
  render() {
    if (!State.map) return;
    const bounds = State.map.getBounds(), hourIdx = State.currentHourIdx, layer = State.activeLayer;
    const visible = SPOTS.filter(s => {
      if (!s.wx || !s.wx.hourly) return false;
      return bounds.contains(L.latLng(s.lat, s.lng));
    });
    const ranked = visible.map(s => {
      const h = s.wx.hourly, idx = Math.min(hourIdx, h.windspeed_10m.length - 1);
      const ms = h.windspeed_10m[idx] || 0;
      const gst = (h.windgusts_10m && h.windgusts_10m[idx]) || ms;
      const dir = h.winddirection_10m[idx] || 0;
      const dms = layer === 'gust' ? gst : ms;
      return { spot: s, ms, gst, dir, dms };
    })
    .filter(() => !(State._tlTimes && State._tlTimes[hourIdx] && isNightHour(State._tlTimes[hourIdx])))
    .sort((a, b) => b.dms - a.dms)
    .slice(0, 5);

    document.getElementById('sl-count').textContent = 'Top ' + ranked.length + ' kartalla';
    const container = document.getElementById('sl-items');
    container.innerHTML = ranked.map((r, i) => {
      const c = ColorRamp.rgb(r.dms);
      const col = 'rgb('+c.r+','+c.g+','+c.b+')';
      const foilable = r.ms >= 8;
      const arrow = dirArrow(r.dir);
      return '<div class="sl-item" data-spot="'+r.spot.name+'">'
        + '<span class="sl-rank">'+(i+1)+'</span>'
        + '<div class="sl-dot" style="background:'+col+';box-shadow:0 0 6px '+ColorRamp.css(r.dms,0.4)+'"></div>'
        + '<div class="sl-info"><div class="sl-name">'+r.spot.name
        + (foilable ? '<span class="sl-badge-foilable">FOIL ✓</span>' : '')
        + '</div><div class="sl-desc">'+arrow+' '+Math.round(r.dir)+'° · '+r.spot.desc+'</div></div>'
        + '<div class="sl-wind"><div class="sl-wind-val" style="color:'+col+'">'+Units.fmt(r.dms)+'</div>'
        + '<div class="sl-wind-sub">'+Units.label()+(r.gst > r.ms*1.1 ? ' · G '+Units.fmt(r.gst) : '')+'</div></div>'
        + '</div>';
    }).join('');

    if (!ranked.length) {
      const _isNight = State._tlTimes && State._tlTimes[hourIdx] && isNightHour(State._tlTimes[hourIdx]);
      const _nm = _isNight ? '<br><span style="color:rgba(255,200,80,.7)">🌙 Yöaika (23–06) — valitse eri aika</span>' : '';
      container.innerHTML = '<div style="padding:24px;text-align:center;color:var(--muted);font-family:DM Mono,monospace;font-size:11px">Ei spotteja kartalla<br>— zoomaa lähemmäs Suomea'+_nm+'</div>';
    }

    container.querySelectorAll('.sl-item').forEach(el => {
      el.addEventListener('click', () => {
        Haptics.medium();
        const name = el.dataset.spot;
        const spot = SPOTS.find(s => s.name === name);
        if (spot) {
          this.close();
          State.map.flyTo([spot.lat, spot.lng], 10, { duration: 1 });
          setTimeout(() => openSheet(spot, State.currentHourIdx), 600);
        }
      });
    });
  }
};

document.getElementById('btn-spots').addEventListener('click', () => { Haptics.light(); SpotList.toggle(); }, { passive: true });
document.getElementById('sheet-overlay').addEventListener('click', () => { SpotList.close(); }, { passive: true });

document.getElementById('layers').addEventListener('click', e => {

  Haptics.light();
  document.querySelectorAll('#layers .sp-chip').forEach(btn => btn.classList.remove('active')); b.classList.add('active');

  buildWindField(State.currentHourIdx).then(() => { drawColorField(); resetParticles(); });

document.getElementById('models').addEventListener('click', e => {

  Toast.show('Vaihdetaan malliin: ' + model.replace('_',' ').toUpperCase() + '...', 3000);
  const dot = document.getElementById('refresh-dot'); dot.classList.add('pulse');
  ViewportGrid.loadGlobalCoarse().then(() => {

  }).then(() => {

      const sp = layer === 'gust' ? (ref.wx.hourly.windgusts_10m || ref.wx.hourly.windspeed_10m) : ref.wx.hourly.windspeed_10m;
      renderTimeline(ref.wx.hourly.time, sp, ref.wx.hourly.winddirection_10m, ni);

tlScroll.addEventListener('touchmove', e => e.stopPropagation(), { passive: true });

/* ── LOADING & REFRESH ────────────────────────────────────────── */
function updateLoadText(msg) { const el = document.getElementById('load-txt'); if (el) el.textContent = msg; }
function hideLoading() { const el = document.getElementById('loading'); el.classList.add('out'); setTimeout(() => { el.style.display = 'none'; }, 600); }
function scheduleRefresh() {
  clearInterval(State.refreshTimer);
  State.refreshTimer = setInterval(() => {
    const dot = document.getElementById('refresh-dot'); dot.classList.add('pulse');
    Object.keys(_batchCache).forEach(k => delete _batchCache[k]);
    ViewportGrid._points.clear();
    ViewportGrid.loadViewport(State.map).then(() => ViewportGrid.loadSpots()).then(() => {
      buildWindField(State.currentHourIdx).then(() => { drawColorField(); resetParticles(); renderSpots(State.currentHourIdx); });
      State.lastDataLoad = Date.now();
      setTimeout(() => dot.classList.remove('pulse'), 1500);
    });
  }, Config.DATA_REFRESH_MS);
}

/* ── MAIN ─────────────────────────────────────────────────────── */
function main() {
  buildLegend(); initMap(); initCanvases();
  Crosshair.init(); WeatherWidget.init(); Units.init();
  hideLoading(); startRenderLoop();

  makeSwipeable(document.getElementById('sheet'), closeSheet);
  makeSwipeable(document.getElementById('spot-list'), () => SpotList.close());

  /* Load spots first (small batch, 7-day forecast), then viewport, skip coarse global */
  const dot = document.getElementById('refresh-dot'); dot.classList.add('pulse');

  ViewportGrid.loadSpots()
    .then(() => {
      /* Spots loaded — render timeline + spots immediately */
      const ref = bestTimelineRef();
      if (ref) {
        const ni = nowIdx(ref.wx.hourly.time); State.currentHourIdx = ni;
        State._lastTlHour = ni;
        const layer = State.activeLayer;
        const sp = layer === 'gust' ? (ref.wx.hourly.windgusts_10m || ref.wx.hourly.windspeed_10m) : ref.wx.hourly.windspeed_10m;
        renderTimeline(ref.wx.hourly.time, sp, ref.wx.hourly.winddirection_10m, ni);
        renderSpots(ni);
        buildWindField(ni).then(() => { drawColorField(); resetParticles(); });
      }
    })
    .catch(e => console.warn('[loadSpots]', e))
    .then(() => {
      /* Then load fine viewport grid for heatmap */
      return ViewportGrid.loadViewport(State.map).catch(e => console.warn('[loadViewport]', e));
    })
    .then(() => {
      /* Re-render with fine data */
      const ref = bestTimelineRef();
      if (ref) {
        const ni = State.currentHourIdx;
        buildWindField(ni).then(() => { drawColorField(); resetParticles(); });
        renderSpots(ni);
      }
      loadMarineTemp();
      State.lastDataLoad = Date.now();
      scheduleRefresh();
      setTimeout(() => dot.classList.remove('pulse'), 800);
    });
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', main);
else main();
