<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UiRas Raw Debug</title>
<style>
body{font-family:monospace;background:#111;color:#0cf;padding:16px;font-size:12px}
button{display:block;width:100%;padding:14px;margin:8px 0;background:#0cf2;border:1px solid #0cf;color:#0cf;border-radius:10px;font-size:14px;cursor:pointer}
#out{background:#0002;padding:12px;border-radius:8px;margin-top:12px;white-space:pre-wrap;word-break:break-all;color:#aef}
</style>
</head>
<body>
<h3 style="color:#fff;margin:0 0 8px">UiRas Raw Debug</h3>
<button onclick="run()">Näytä raaka JSON</button>
<div id="out">Paina nappia...</div>
<script>
async function run(){
  const out=document.getElementById('out');
  out.textContent='Haetaan...\n';
  try{
    const r=await fetch('https://bri3.fvh.io/opendata/uiras/70B3D57050001AB9.geojson');
    out.textContent+='Status: '+r.status+'\n';
    const txt=await r.text();
    out.textContent+='Pituus: '+txt.length+' merkkiä\n\n';
    // Näytä ensimmäiset 2000 merkkiä
    out.textContent+='RAW (alku):\n'+txt.slice(0,2000)+'\n\n...';
    // Näytä myös loppu
    out.textContent+='\nRAW (loppu):\n'+txt.slice(-500);
  }catch(e){
    out.textContent+='VIRHE: '+e.message+'\n';
  }
}
</script>
</body>
</html>
