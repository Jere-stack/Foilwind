<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UiRas Debug</title>
<style>
body{font-family:monospace;background:#111;color:#0cf;padding:16px;font-size:13px}
button{display:block;width:100%;padding:14px;margin:8px 0;background:#0cf2;border:1px solid #0cf;color:#0cf;border-radius:10px;font-size:14px;cursor:pointer}
#out{background:#0002;padding:12px;border-radius:8px;margin-top:12px;white-space:pre-wrap;word-break:break-all;color:#aef;min-height:60px}
</style>
</head>
<body>
<h3 style="color:#fff;margin:0 0 12px">UiRas API Debug</h3>
<button onclick="run()">Testaa API</button>
<div id="out">Paina nappia...</div>
<script>
async function run(){
  const out=document.getElementById('out');
  out.textContent='Haetaan...\n';
  try{
    const r=await fetch('https://iot.fvh.fi/opendata/uiras/uiras_latest.geojson');
    out.textContent+='Status: '+r.status+'\n';
    const gj=await r.json();
    const f=gj.features||[];
    out.textContent+='Features: '+f.length+'\n\n';
    if(f.length>0){
      out.textContent+='Feature[0]:\n'+JSON.stringify(f[0],null,2)+'\n';
    }
  }catch(e){
    out.textContent+='VIRHE: '+e.message+'\n';
  }
}
</script>
</body>
</html>
